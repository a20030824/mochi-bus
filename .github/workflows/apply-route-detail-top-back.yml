name: Apply route detail top back

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.head_ref == 'agent/route-detail-top-back'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Move route back action to drawer header
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          main_path = Path('web/map/main.ts')
          main = main_path.read_text()
          main = replace_once(
              main,
              "  const change = document.createElement('button')\n  change.className = 'quiet-button'\n",
              '',
              'remove bottom button creation',
          )
          main = replace_once(
              main,
              "  change.textContent = routeViewBack(backContext()).label\n",
              '',
              'remove bottom button label',
          )
          main = replace_once(
              main,
              "  change.addEventListener('click', goBack)\n",
              '',
              'remove bottom button listener',
          )
          main = replace_once(
              main,
              "  const actions = document.createElement('div')\n  actions.className = 'route-view-actions'\n  actions.replaceChildren(change)\n",
              '',
              'remove bottom action row',
          )
          main = replace_once(
              main,
              "  drawer.replaceChildren(\n    heading(variant.routeName, variant.label),",
              "  drawer.replaceChildren(\n    drawerBack(routeViewBack(backContext()).label, goBack),\n    heading(variant.routeName, variant.label),",
              'insert top back row',
          )
          main = replace_once(
              main,
              "    timetableSummary,\n    actions,\n  )",
              "    timetableSummary,\n  )",
              'remove bottom action row from drawer',
          )
          main_path.write_text(main)

          style_path = Path('web/map/style.css')
          style = style_path.read_text()
          style = replace_once(
              style,
              ".route-view-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px; }\n.route-view-actions > :only-child { grid-column: 1 / -1; }\n",
              '',
              'remove unused route action styles',
          )
          style_path.write_text(style)

          test_path = Path('test/e2e/map-timetable.spec.ts')
          test = test_path.read_text()
          test = replace_once(
              test,
              "  const drawer = page.locator('#map-drawer')\n",
              "  const drawer = page.locator('#map-drawer')\n  // 路線 detail 跟其他抽屜次頁一致:退路在最上方，不再佔用底部整列。\n  await expect(drawer.locator(':scope > .drawer-back')).toHaveText('← 更換路線')\n  await expect(drawer.locator('.route-view-actions')).toHaveCount(0)\n",
              'add route detail back regression',
          )
          test_path.write_text(test)

          Path('.github/workflows/apply-route-detail-top-back.yml').unlink()
          PY
      - run: npm ci
      - run: npm run check
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test route detail and timetable UI
        run: npx playwright test test/e2e/map-timetable.spec.ts --reporter=line
      - name: Commit verified change
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(map): move route back action to header"
          git push origin HEAD:${{ github.head_ref }}
