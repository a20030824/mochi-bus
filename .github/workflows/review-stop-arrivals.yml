name: Apply reviewed stop arrival hardening

on:
  push:
    branches:
      - agent/batch-stop-arrivals
    paths:
      - .github/review-stop-arrivals.patch
      - .github/workflows/review-stop-arrivals.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/batch-stop-arrivals
          fetch-depth: 0

      - name: Merge latest main without committing
        run: |
          git fetch origin main
          git merge --no-commit --no-ff origin/main

      - name: Apply review fixes
        run: |
          git apply --check .github/review-stop-arrivals.patch
          git apply .github/review-stop-arrivals.patch

      - name: Install dependencies
        run: npm ci

      - name: Run focused arrival tests
        run: npm test -- src/infrastructure/tdx/stop-arrivals.test.ts src/routes/map-place-arrivals.test.ts

      - name: Run full project check
        run: npm run check

      - name: Commit clean reviewed result
        run: |
          rm .github/review-stop-arrivals.patch
          rm .github/workflows/review-stop-arrivals.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(map): harden batched stop arrivals"
          git push origin HEAD:agent/batch-stop-arrivals
