name: Export Trip controller workspace

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/extract-trip-controller'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/upload-artifact@v4
        with:
          name: trip-controller-workspace
          include-hidden-files: true
          path: |
            .
            !.git
