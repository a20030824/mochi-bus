name: Apply route ETA status model

on:
  push:
    branches:
      - agent/type-route-eta-status

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - run: node scripts/apply-route-eta-status.mjs
      - run: npx vitest run src/domain/route-eta-status.test.ts src/domain/route-timeline-fallback.test.ts src/domain/route-page-detail.test.ts src/domain/route-page-identity.test.ts
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test test/e2e/route.spec.ts
      - run: git diff --check
      - name: Commit clean Route status migration
        run: |
          rm scripts/apply-route-eta-status.mjs
          rm .github/workflows/apply-route-eta-status.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            src/domain/route-eta-status.ts \
            src/domain/route-eta-status.test.ts \
            src/domain/route-timeline-fallback.ts \
            src/domain/route-timeline-fallback.test.ts \
            src/domain/route-page-detail.ts \
            src/domain/route-page-detail.test.ts \
            src/domain/route-page-identity.test.ts \
            src/lib/tdx.ts \
            scripts/apply-route-eta-status.mjs \
            .github/workflows/apply-route-eta-status.yml
          git commit -m "refactor(route): type ETA presentation state"
          git push origin HEAD:${{ github.ref_name }}
