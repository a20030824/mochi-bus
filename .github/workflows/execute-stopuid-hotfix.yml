name: Execute StopUID hotfix once

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: execute-stopuid-hotfix
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Extract and apply focused patch
        shell: bash
        run: |
          test -f .github/workflows/apply-stopuid-hotfix.yml
          python <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-stopuid-hotfix.yml').read_text(encoding='utf-8')
          marker = "          python <<'PY'\n"
          if marker not in workflow or '\n          PY\n' not in workflow:
              raise SystemExit('Unable to locate staged hotfix source')
          block = workflow.split(marker, 1)[1].split('\n          PY\n', 1)[0]
          source = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          exec(compile(source, 'apply-stopuid-hotfix.py', 'exec'))
          PY
      - run: npm ci
      - name: Run targeted tests
        run: npx vitest run scripts/transit-snapshot/stop-place-registry.test.mjs scripts/transit-snapshot/snapshot-invariants.test.mjs scripts/transit-snapshot/validate.test.mjs
      - name: Run full checks
        run: npm run check
      - name: Commit verified hotfix and self-remove
        shell: bash
        run: |
          rm .github/workflows/apply-stopuid-hotfix.yml .github/workflows/execute-stopuid-hotfix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/sync-transit-snapshot.mjs scripts/transit-snapshot/stop-place-registry.mjs scripts/transit-snapshot/stop-place-registry.test.mjs scripts/transit-snapshot/snapshot-invariants.mjs scripts/transit-snapshot/snapshot-invariants.test.mjs scripts/transit-snapshot/validate.mjs scripts/transit-snapshot/validate.test.mjs .github/workflows/apply-stopuid-hotfix.yml .github/workflows/execute-stopuid-hotfix.yml
          git commit -m "fix(snapshot): canonicalize duplicate StopUID places"
          git push origin HEAD:main
