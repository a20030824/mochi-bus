name: Trigger route timetable implementation

on:
  push:
    branches: [feat/route-timetables]
    paths:
      - .github/workflows/route-timetables-trigger.yml

permissions:
  contents: write

jobs:
  implement:
    # This workflow exists only on the feature branch and removes itself after success.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/route-timetables
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Extract and run staged implementation
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent
          source = Path('.github/workflows/one-shot-route-timetables.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          Path('/tmp/route-timetables.py').write_text(dedent(source[start:end]))
          PY
          python /tmp/route-timetables.py
      - run: npm ci
      - run: npm run check
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Verify timetable flow
        run: npx playwright test test/e2e/map-timetable.spec.ts --reporter=line
      - name: Commit implementation
        run: |
          rm .github/workflows/one-shot-route-timetables.yml .github/workflows/route-timetables-trigger.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "feat(map): add route timetables"
          git push origin HEAD:feat/route-timetables
