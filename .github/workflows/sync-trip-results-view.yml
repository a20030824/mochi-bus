name: Sync Trip results view with latest main

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'agent/extract-trip-results-view'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Merge latest main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git merge --no-edit origin/main
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Run focused Trip presentation tests
        run: npx vitest run web/map/trip-results-view.test.ts web/map/trip-controller.test.ts web/map/main-size.test.ts
      - run: npm run check
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test desktop and touch interaction flows
        run: >-
          npx playwright test
          --project=desktop-chromium
          --project=mobile-touch
          --reporter=line,html
      - run: git diff --check origin/main...HEAD
      - name: Remove temporary workflow and push
        run: |
          rm .github/workflows/sync-trip-results-view.yml
          git add -A
          git commit -m "chore: sync Trip results view with main"
          git push origin HEAD:${{ github.head_ref }}
