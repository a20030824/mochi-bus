name: Apply trip state model

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refactor:
    if: github.head_ref == 'agent/model-trip-state'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/apply-trip-state-model.mjs
      - run: npx vitest run web/map/trip-state.test.ts web/map/trip-results-snapshot.test.ts
      - run: npx tsc --noEmit
      - run: npm run check
      - run: git diff --check
      - name: Commit clean trip state foundation
        run: |
          rm scripts/apply-trip-state-model.mjs
          rm .github/workflows/apply-trip-state-model.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/map/main.ts web/map/main-size.test.ts web/map/trip-state.ts web/map/trip-state.test.ts web/map/trip-results-snapshot.ts web/map/trip-results-snapshot.test.ts scripts/apply-trip-state-model.mjs .github/workflows/apply-trip-state-model.yml
          git commit -m "refactor(map): model trip state"
          git push origin HEAD:${{ github.head_ref }}
