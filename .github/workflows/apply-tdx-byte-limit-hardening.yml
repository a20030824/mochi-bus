name: Apply TDX byte-limit hardening

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/tdx-byte-limit-hardening.patch
      - .github/workflows/apply-tdx-byte-limit-hardening.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tdx-response-byte-limit
          fetch-depth: 1
          show-progress: false

      - name: Apply focused hardening
        run: |
          git apply --check --verbose .github/tdx-byte-limit-hardening.patch
          git apply .github/tdx-byte-limit-hardening.patch

      - name: Install dependencies
        run: npm ci

      - name: Run focused tests
        run: npm test -- src/lib/tdx-resolution.test.ts

      - name: Run full project check
        run: npm run check

      - name: Commit clean result
        run: |
          rm .github/tdx-byte-limit-hardening.patch
          rm .github/workflows/apply-tdx-byte-limit-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(tdx): harden response byte limit"
          git push origin HEAD:agent/tdx-response-byte-limit
