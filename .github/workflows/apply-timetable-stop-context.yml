name: Apply timetable stop context

on:
  push:
    branches:
      - feat/preserve-timetable-stop-context

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/preserve-timetable-stop-context
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Finish map entry patch
        shell: python
        run: |
          from pathlib import Path

          path = Path('web/map/main.ts')
          source = path.read_text(encoding='utf-8')
          replacements = [
              (
                  "  writePickerLocation: (cityCode, routeName) => {\n",
                  "  writePickerLocation: (cityCode, routeName, stopUid) => {\n",
              ),
              (
                  "      `/map?city=${encodeURIComponent(cityCode)}&route=${encodeURIComponent(routeName)}`,\n",
                  "      `/map?city=${encodeURIComponent(cityCode)}&route=${encodeURIComponent(routeName)}${stopUid ? `&stopUid=${encodeURIComponent(stopUid)}` : ''}`,\n",
              ),
              (
                  "  stopBackAction?: () => void, preferredTimetableStopUid?: string | null,\n",
                  "  stopBackAction?: () => void,\n  preferredTimetableStopUid?: string | null,\n",
              ),
              (
                  "    stopBackAction, preferredTimetableStopUid,\n",
                  "    stopBackAction,\n    preferredTimetableStopUid,\n",
              ),
              (
                  "  })\n}\n\n\nfunction stopStyleForZoom",
                  "  })\n}\nfunction stopStyleForZoom",
              ),
          ]
          for old, new in replacements:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one match, found {count}: {old!r}')
              source = source.replace(old, new)
          path.write_text(source, encoding='utf-8')
      - name: Verify focused checks
        run: |
          npm ci
          npm test -- web/map/place-routes-view.test.ts web/map/route-detail-controller.test.ts web/map/main-size.test.ts
          npm run typecheck
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/map/main.ts
          git commit -m "fix(map): preserve stop through variant selection"
          git push origin HEAD:feat/preserve-timetable-stop-context
