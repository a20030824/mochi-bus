name: Temporary shape matcher final patch

on:
  push:
    branches:
      - agent/mb-c01-shape-pattern-matcher

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[shape-matcher-final-patch]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply exact matcher payload
        shell: bash
        run: |
          set -euo pipefail
          cat src/domain/map/.shape-matcher-patch-part-* > /tmp/shape-matcher-final.b64
          base64 --decode /tmp/shape-matcher-final.b64 > /tmp/shape-matcher-final.tar.gz
          echo 'adb5ca73c12e2ceb2d2ca91803c84ea49365a69566ba536efa0c2b7ee9278b7c  /tmp/shape-matcher-final.tar.gz' | sha256sum --check
          tar -xzf /tmp/shape-matcher-final.tar.gz -C .
          rm src/domain/map/.shape-matcher-patch-part-*
          rm src/domain/map/shape-pattern-matcher.source-export.test.ts
          rm .github/workflows/temp-shape-matcher-final-patch.yml
          git diff --check
      - name: Run focused matcher regressions
        shell: bash
        run: |
          set -euo pipefail
          npm ci --silent
          npx vitest run \
            src/domain/map/shape-pattern-matcher.review3.test.ts \
            src/domain/map/shape-pattern-matcher.review2.test.ts \
            src/domain/map/shape-pattern-matcher.test.ts
      - name: Commit and push final patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(map): enforce real loop geometry and floating thresholds [shape-matcher-final-patch]'
          git diff --check origin/main...HEAD
          git push origin HEAD:agent/mb-c01-shape-pattern-matcher
