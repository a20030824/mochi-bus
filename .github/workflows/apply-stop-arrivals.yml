name: Apply stop arrival patch

on:
  push:
    branches:
      - agent/batch-stop-arrivals
    paths:
      - .github/stop-arrivals.patch
      - .github/workflows/apply-stop-arrivals.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/batch-stop-arrivals
          fetch-depth: 0

      - name: Apply focused patch
        run: |
          git apply --check .github/stop-arrivals.patch
          git apply .github/stop-arrivals.patch

      - name: Install dependencies
        run: npm ci

      - name: Run focused tests
        run: npm test -- src/infrastructure/tdx/stop-arrivals.test.ts src/routes/map-place-arrivals.test.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Commit clean result
        run: |
          rm .github/stop-arrivals.patch
          rm .github/workflows/apply-stop-arrivals.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/routes/map.ts .github/stop-arrivals.patch .github/workflows/apply-stop-arrivals.yml
          git commit -m "fix(map): batch place arrival TDX requests"
          git push origin HEAD:agent/batch-stop-arrivals
