name: Integrate Nearby Places map surface

on:
  push:
    branches:
      - agent/extract-nearby-places-map

permissions:
  contents: write

concurrency:
  group: nearby-places-map-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/extract-nearby-places-map
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply Nearby Places map extraction
        run: python .github/nearby-places-map-patch.py
      - run: npm ci --silent
      - name: Run focused tests
        run: >-
          npx vitest run
          web/map/nearby-places-map.test.ts
          web/map/nearby-places-controller.test.ts
          web/map/nearby-places-view.test.ts
          web/map/main-size.test.ts
      - run: npm run check
      - run: git diff --check
      - name: Commit clean extraction
        run: |
          rm .github/nearby-places-map-patch.py
          rm .github/workflows/nearby-places-map-integration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(map): extract Nearby Places map surface"
          git push
