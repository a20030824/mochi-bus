name: Apply one-stop pattern fix

on:
  pull_request:
    paths:
      - .github/workflows/apply-one-stop-pattern-fix.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - name: Apply exact publisher patch and regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          publisher = Path('scripts/sync-transit-snapshot.mjs')
          source = publisher.read_text(encoding='utf-8')
          old = "  if (!validStops.length) continue"
          new = "  if (validStops.length < 2) continue"
          if old in source:
              source = source.replace(old, new, 1)
              publisher.write_text(source, encoding='utf-8')
          elif new not in source:
              raise SystemExit('expected validStops guard was not found')

          test = Path('scripts/transit-snapshot/sync-source-invariants.test.mjs')
          test.write_text("""import { readFileSync } from 'node:fs'\nimport { describe, expect, it } from 'vitest'\n\ndescribe('snapshot publisher source invariants', () => {\n  it('rejects patterns with fewer than two valid stops before staging', () => {\n    const source = readFileSync(new URL('../sync-transit-snapshot.mjs', import.meta.url), 'utf8')\n    expect(source).toContain('if (validStops.length < 2) continue')\n    expect(source).not.toContain('if (!validStops.length) continue')\n  })\n})\n""", encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/sync-transit-snapshot.mjs scripts/transit-snapshot/sync-source-invariants.test.mjs
          git commit -m 'fix(snapshot): reject one-stop patterns'
          git push origin HEAD:${{ github.head_ref }}
