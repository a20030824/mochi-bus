name: Apply preview map primitives extraction

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/extract-preview-map-primitives'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed preview primitives patch
        run: |
          cat .github/preview-map-primitives.patch.part-* > /tmp/preview-map-primitives.patch
          git apply --check /tmp/preview-map-primitives.patch
          git apply /tmp/preview-map-primitives.patch
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Run focused preview primitive tests
        run: npx vitest run web/map/preview-map-primitives.test.ts web/map/journey-preview-map.test.ts web/map/main-size.test.ts web/map/route-detail-controller.test.ts
      - name: Run npm check
        run: |
          if ! npm run check; then
            echo 'Retrying once for the known shared rate-limit test-state contamination.'
            npm run check
          fi
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Test desktop and touch interaction flows
        run: npx playwright test --project=desktop-chromium --project=mobile-touch --reporter=line,html
      - name: Run git diff check
        run: git diff --check
      - name: Commit clean product diff
        run: |
          rm -f .github/preview-map-primitives.patch.part-* .github/workflows/export-preview-map-primitives.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'refactor(map): share preview map primitives'
          git push origin HEAD:${{ github.head_ref }}
