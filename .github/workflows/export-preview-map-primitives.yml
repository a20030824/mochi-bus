name: Export preview map primitives workspace

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/extract-preview-map-primitives'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/upload-artifact@v4
        with:
          name: preview-map-primitives-workspace
          include-hidden-files: true
          path: |
            .
            !.git
