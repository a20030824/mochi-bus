name: Diagnose A6 2026-07-22 rollback degradation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/a6-2026-07-22-diagnose.yml

permissions:
  contents: read

jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Read latest probe status for every city
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_ID: e5680212-29c5-4045-acd2-1e5df703e751
        shell: bash
        run: |
          set -euo pipefail
          sql="WITH latest AS (SELECT city_code,MAX(active_probe_at) AS active_probe_at FROM snapshot_active_probes GROUP BY city_code) SELECT p.city_code,p.window_id,p.active_probe_result,p.probe_failure_class,p.rollback_available,p.active_version,p.previous_version,p.hard_checks_passed,p.diagnostic_warnings,p.active_probe_at FROM snapshot_active_probes p JOIN latest l ON l.city_code=p.city_code AND l.active_probe_at=p.active_probe_at ORDER BY p.city_code;"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H 'Content-Type: application/json' \
            --data "$(jq -nc --arg sql "$sql" '{sql:$sql,params:[]}')" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database/$DATABASE_ID/query" \
            | jq -e -c '.result[0].results'
