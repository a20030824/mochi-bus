name: Apply Journey preview map extraction

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/extract-journey-preview-map'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed Journey preview map patch
        run: git apply .tmp/journey-preview-map.patch
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Run focused Journey preview map tests
        run: npx vitest run web/map/journey-preview-map.test.ts web/map/journey-preview-controller.test.ts web/map/main-size.test.ts
      - name: Run npm run check
        run: npm run check || npm run check
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test desktop and touch interaction flows
        run: >-
          npx playwright test
          --project=desktop-chromium
          --project=mobile-touch
          --reporter=line,html
      - name: Run git diff check
        run: git diff --check
      - name: Commit clean product diff
        run: |
          rm .github/workflows/export-journey-preview-map.yml
          rm -rf .tmp
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor(map): extract Journey preview map surface"
          git push origin HEAD:${{ github.head_ref }}
