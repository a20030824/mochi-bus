name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-snapshot-route-selection:
    if: >-
      github.event_name == 'pull_request'
      && github.head_ref == 'agent/extract-snapshot-route-selection'
      && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - run: node scripts/apply-snapshot-route-selection.mjs
      - run: >-
          npx vitest run
          src/domain/snapshot-route-selection.test.ts
          src/routes/bus.test.ts
      - run: npm run check
      - name: Commit clean snapshot selection
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm scripts/apply-snapshot-route-selection.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            .github/workflows/ci.yml \
            scripts/apply-snapshot-route-selection.mjs \
            src/routes/bus.ts
          git diff --cached --check
          git commit -m "refactor(route): extract snapshot variant selection"
          git push origin "HEAD:${HEAD_BRANCH}"

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check

  map-ui:
    name: Map UI regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test all desktop and touch interaction flows
        run: >-
          npx playwright test
          --project=desktop-chromium
          --project=mobile-touch
          --reporter=line,html
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: map-ui-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Deploy production
    needs: [quality, map-ui]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Deploy Worker
        run: >-
          npm run deploy --
          --tag "${GITHUB_SHA}"
          --message "GitHub Actions ${GITHUB_RUN_ID}: ${GITHUB_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
