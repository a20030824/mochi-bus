name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-back-style:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/variant-back-alignment' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Move the rule into map.css source
        run: |
          python3 <<'PY'
          from pathlib import Path

          style_path = Path('web/map/style.css')
          style = style_path.read_text(encoding='utf-8')
          old_rule = '.drawer-back { margin: 0 0 12px; padding: 6px 0; border: 0; background: transparent; }'
          new_rule = '''.drawer-back {
            align-self: flex-start;
            max-width: 100%;
            margin: 0 0 12px;
            padding: 6px 0;
            border: 0;
            background: transparent;
            text-align: left;
          }'''
          if style.count(old_rule) != 1:
              raise SystemExit(f'drawer-back rule: expected one match, found {style.count(old_rule)}')
          style_path.write_text(style.replace(old_rule, new_rule, 1), encoding='utf-8')

          page_path = Path('src/map-page.ts')
          page = page_path.read_text(encoding='utf-8')
          inline = '''  <style>
            .map-drawer[data-mode="map-list"] > .drawer-back,
            .map-drawer[data-mode="results"] > .drawer-back {
              align-self: flex-start;
              max-width: 100%;
              text-align: left;
            }
          </style>
          '''
          if page.count(inline) != 1:
              raise SystemExit(f'inline map style: expected one match, found {page.count(inline)}')
          page_path.write_text(page.replace(inline, '', 1), encoding='utf-8')
          PY
      - name: Commit stylesheet fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/map/style.css src/map-page.ts
          git commit -m "fix(map): align drawer back actions"
          git push origin HEAD:${{ github.head_ref }}

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check

  map-ui:
    name: Map UI regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test map camera, drawer, mobile entry, and timetable UI
        run: >-
          npx playwright test
          test/e2e/map-camera-padding.spec.ts
          test/e2e/map-drawer-modes.spec.ts
          test/e2e/map-mobile-entry-spacing.spec.ts
          test/e2e/map-timetable.spec.ts
          test/e2e/map-variant-back-layout.spec.ts
          --reporter=line,html
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: map-ui-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Deploy production
    needs: [quality, map-ui]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
