name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integrate-map-network-read:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 124
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Integrate network read handler
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/routes/map.ts')
          text = path.read_text()

          replacements = [
              (
                  "  getCityNetwork,\n",
                  "",
              ),
              (
                  "import { readRouteMap, readRouteTimetable } from './map-route-reads'\n",
                  "import { readRouteMap, readRouteTimetable } from './map-route-reads'\nimport { readCityNetwork } from './map-network-read'\n",
              ),
              (
                  """map.get('/api/v1/map/network', async (c) => {\n  try {\n    const city = c.req.query('city')?.trim()\n    if (!city || !supportedCityCodes.has(city)) throw new QueryValidationError('請選擇縣市')\n    const network = await getCityNetwork(c.env, city)\n    if (!network) return c.json({ error: '這個縣市尚未建立全路網資料' }, 404)\n    // R2 的 network.json 原樣串流,不在 Worker 內 parse+stringify(雙北 35MB+ 會撞\n    // isolate 記憶體上限回 503)。前端只讀 routes/places,舊快照缺 schemaVersion/city 也無妨。\n    if (network.kind === 'stream') {\n      return new Response(network.body, {\n        headers: {\n          'Content-Type': 'application/json; charset=utf-8',\n          'Cache-Control': 'public, max-age=86400',\n          'ETag': network.etag,\n        },\n      })\n    }\n    return c.json({ schemaVersion: 1, city, ...network.network }, 200, {\n      'Cache-Control': 'public, max-age=86400',\n    })\n  } catch (error) {\n    return mapJsonError(c, error, '全路網讀取失敗')\n  }\n})\n""",
                  "map.get('/api/v1/map/network', readCityNetwork)\n",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one replacement target, found {count}')
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/routes/map-network-read.test.ts
          src/routes/map-http-context.test.ts
          src/routes/map-route-reads.test.ts
          src/routes/map-place-lookups.test.ts
          src/routes/map-journey-plans.test.ts
      - run: npm run check
      - run: git diff --check
      - name: Commit clean extraction
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/routes/map.ts .github/workflows/ci.yml
          git commit -m 'Extract Map network read handler'
          git push origin HEAD:${GITHUB_HEAD_REF}
