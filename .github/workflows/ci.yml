name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose-upstream-data-client-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Capture direct client test output
        shell: bash
        run: |
          set +e
          npx vitest run src/lib/tdx/upstream-data-client.test.ts > UPSTREAM_TEST_DIAGNOSTIC.txt 2>&1
          status=$?
          set -e
          printf '\nexit_code=%s\n' "$status" >> UPSTREAM_TEST_DIAGNOSTIC.txt
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add UPSTREAM_TEST_DIAGNOSTIC.txt .github/workflows/ci.yml
          git commit -m "chore: capture upstream client test diagnostic"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
