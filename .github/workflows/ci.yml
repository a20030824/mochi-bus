name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-tdx-eta-formatting:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 129
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Integrate ETA formatting façade
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/tdx.ts')
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one match, found {count}: {old[:100]!r}')
              text = text.replace(old, new, 1)

          def replace_between(start: str, end: str) -> None:
              global text
              if text.count(start) != 1 or text.count(end) != 1:
                  raise SystemExit(f'non-unique boundary: {start!r} / {end!r}')
              start_index = text.index(start)
              end_index = text.index(end, start_index)
              text = text[:start_index] + text[end_index:]

          telemetry_import = """import type {
            TelemetryCity,
            TelemetryFailureClass,
            TelemetrySink,
            TelemetryTdxOperation,
            TelemetryTrafficClass,
          } from '../observability/telemetry'
          """
          eta_imports = """import {
            formatETALabel,
            toETAResult,
            type BusETAItem,
            type ETAResult,
            type LocalizedName,
          } from './tdx/eta-formatting'

          export { formatETALabel, formatStopStatus, toETAResult } from './tdx/eta-formatting'
          export type { BusETAItem, ETAResult } from './tdx/eta-formatting'
          """
          replace_once(telemetry_import, telemetry_import + eta_imports)
          replace_between('type LocalizedName = {\n', 'type StopOfRouteItem = {\n')
          replace_between('export type ETAResult = {\n', 'export type StopRouteSuggestion = ResolvedBusQuery & {\n')
          replace_once('const STALE_AFTER_MS = 3 * 60 * 1000\n', '')

          formatting_start = 'export function toETAResult(item: BusETAItem, query: ResolvedBusQuery, now = new Date()): ETAResult {\n'
          if text.count(formatting_start) != 1:
              raise SystemExit(f'expected one formatting block, found {text.count(formatting_start)}')
          text = text[:text.index(formatting_start)].rstrip() + '\n'

          path.write_text(text)
          PY
          grep -q "export { formatETALabel, formatStopStatus, toETAResult } from './tdx/eta-formatting'" src/lib/tdx.ts
          test "$(grep -c '^export function formatETALabel' src/lib/tdx.ts)" -eq 0
          test "$(grep -c '^export function toETAResult' src/lib/tdx.ts)" -eq 0
          wc -l src/lib/tdx.ts src/lib/tdx/eta-formatting.ts
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/lib/tdx/eta-formatting.test.ts
          src/lib/tdx.test.ts
          src/routes/map-place-arrivals-contract.test.ts
          src/routes/map-journey-eta.test.ts
          src/domain/route-page-detail.test.ts
      - name: Run npm run check
        run: npm run check
      - name: Run git diff --check
        run: git diff --check
      - name: Commit clean extraction
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/lib/tdx.ts .github/workflows/ci.yml
          git commit -m "Wire TDX ETA formatting façade"
          git push origin HEAD:agent/extract-tdx-eta-formatting
