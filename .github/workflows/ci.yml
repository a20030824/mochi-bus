name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-map-place-arrivals:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 127
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Integrate Place Arrivals handler
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('src/routes/map.ts')
          text = path.read_text()
          def one(old, new):
              global text
              if text.count(old) != 1: raise SystemExit(f'expected one match: {old[:80]!r}')
              text = text.replace(old, new, 1)
          def between(start, end, replacement):
              global text
              if text.count(start) != 1 or text.count(end) != 1: raise SystemExit(f'non-unique boundary: {start!r}')
              a = text.index(start); b = text.index(end, a)
              text = text[:a] + replacement + text[b:]
          one("import { selectBestEta } from '../domain/map/eta'\n", '')
          one("import { includeFocusedCandidate, selectRealtimeCandidates } from '../domain/map/arrival-ranking'\n", '')
          one("import { nextScheduledMinutes, scheduleClockLabel, type ScheduleItem, type ScheduleQuery } from '../domain/schedule'\nimport {\n  buildStopArrivalBatches,\n  isStopArrivalBatchPayload,\n  STOP_ARRIVAL_MAX_RESPONSE_BYTES,\n} from '../infrastructure/tdx/stop-arrivals'\n", "import type { ScheduleItem } from '../domain/schedule'\n")
          one("import {\n  getJourneyLegStopRefs,\n  getSnapshotSchedule,\n  getStopPlaceBundle,\n  getStopPlaceRoutes,\n} from '../infrastructure/transit/snapshot-repository'\n", "import {\n  getJourneyLegStopRefs,\n  getSnapshotSchedule,\n} from '../infrastructure/transit/snapshot-repository'\n")
          one("import { fetchTDXJson, formatETALabel, getBusSchedule, isRejectedUserTdxToken, isTDXRecordArray, resolveTDXJson, TDXServiceError, tdxCredentialScope, tdxRouteScope, tdxWarningFromError, type BusETAItem, type TDXEnv, type TDXWarning } from '../lib/tdx'", "import { fetchTDXJson, getBusSchedule, isRejectedUserTdxToken, isTDXRecordArray, tdxRouteScope, tdxWarningFromError, type BusETAItem, type TDXWarning } from '../lib/tdx'")
          one("import {\n  ApiInputError,\n  JOURNEY_ETA_BODY_LIMIT_BYTES,\n  optionalQueryString,\n  parseJourneyEtaInput,\n  parseOptionalDirection,\n  readJsonBody,\n  requiredQueryString,\n} from '../lib/api-input'\nimport { memoryCacheGet, memoryCacheSet } from '../lib/memory-cache'\nimport { cacheMatchFailOpen, cachePutFailOpen } from '../lib/edge-cache'\nimport {\n  journeyEtaOutcome,\n  placeArrivalsOutcome,\n} from '../observability/map-api-outcomes'\n", "import {\n  ApiInputError,\n  JOURNEY_ETA_BODY_LIMIT_BYTES,\n  parseJourneyEtaInput,\n  readJsonBody,\n} from '../lib/api-input'\nimport { journeyEtaOutcome } from '../observability/map-api-outcomes'\n")
          one("import {\n  beginMapOperation,\n  completeMapError,\n  mapJsonError,\n  tdxEnv,\n  telemetryCity,\n  type MapEnv,\n} from './map-http-context'\n", "import {\n  beginMapOperation,\n  completeMapError,\n  tdxEnv,\n  telemetryCity,\n  type MapEnv,\n} from './map-http-context'\n")
          one("import { readVehicles } from './map-vehicles-read'\n", "import { readVehicles } from './map-vehicles-read'\nimport { readPlaceArrivals } from './map-place-arrivals'\n")
          one("const REALTIME_COOLDOWN_SECONDS = 60\nconst LAST_REALTIME_SECONDS = 120\n\n", '')
          between("function arrivalCacheKey(kind: 'cooldown' | 'last', city: string, suffix = ''): Request {\n", "map.get('/map',", '')
          between("map.get('/api/v1/map/place/:placeId/arrivals', async (c) => {\n", "map.get('/api/v1/map/place/:placeId', readPlace)", "map.get('/api/v1/map/place/:placeId/arrivals', readPlaceArrivals)\n\n")
          between("// 把 domain 的估計攤成回應欄位;departureBased/headway 只有伺服器端組 label 會用。\n", 'export default map', '')
          path.write_text(text)
          PY
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/routes/map-place-arrivals-contract.test.ts
          src/routes/map-place-arrivals.test.ts
          src/routes/map-observability.test.ts
          src/routes/map-http-context.test.ts
          src/routes/map-vehicles-read.test.ts
          src/infrastructure/tdx/stop-arrivals.test.ts
      - name: Run npm run check
        run: npm run check
      - name: Run git diff --check
        run: git diff --check
      - name: Commit clean extraction
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/routes/map.ts .github/workflows/ci.yml
          git commit -m "Wire Map Place Arrivals handler"
          git push origin HEAD:agent/extract-map-place-arrivals
