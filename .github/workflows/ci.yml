name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: integrate-map-journey-plans-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integrate-map-journey-plans:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 121
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Integrate journey plan handlers
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/routes/map.ts')
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one match, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          replace_once(
          """import {
            getCityNetwork,
            getActiveSnapshotVersion,
            getDirectRoutes,
            getJourneyLegStopRefs,
            getOneTransferRoutes,
            getSnapshotRouteVariants,
            getSnapshotRouteCatalog,
            getSnapshotSchedule,
            getStopPlaceBundle,
            getStopPlaceRoutes,
          } from '../infrastructure/transit/snapshot-repository'
          """,
          """import {
            getCityNetwork,
            getActiveSnapshotVersion,
            getJourneyLegStopRefs,
            getSnapshotRouteVariants,
            getSnapshotRouteCatalog,
            getSnapshotSchedule,
            getStopPlaceBundle,
            getStopPlaceRoutes,
          } from '../infrastructure/transit/snapshot-repository'
          """,
          )

          replace_once(
          """import {
            findNearbyPlaces,
            readPlace,
            readPlaceRoutes,
            readStopPlace,
            searchPlaces,
          } from './map-place-lookups'

          const map = new Hono<MapEnv>()
          """,
          """import {
            findNearbyPlaces,
            readPlace,
            readPlaceRoutes,
            readStopPlace,
            searchPlaces,
          } from './map-place-lookups'
          import { readDirectRoutes, readTransferPlans } from './map-journey-plans'

          const map = new Hono<MapEnv>()
          """,
          )

          replace_once(
          """map.get('/api/v1/map/direct', async (c) => {
            try {
              const city = c.req.query('city')?.trim()
              const from = requiredQueryString(c.req.query('from'), '起點', 100)
              const to = requiredQueryString(c.req.query('to'), '終點', 100)
              if (!city || !supportedCityCodes.has(city)) throw new QueryValidationError('請選擇縣市')
              const routes = await getDirectRoutes(c.env, city, from, to)
              return c.json({ schemaVersion: 1, city, from, to, routes }, 200, {
                'Cache-Control': 'public, max-age=86400',
              })
            } catch (error) {
              return mapJsonError(c, error, '直達路線查詢失敗')
            }
          })

          map.get('/api/v1/map/transfer', async (c) => {
            try {
              const city = c.req.query('city')?.trim()
              const from = requiredQueryString(c.req.query('from'), '出發位置', 100)
              const to = requiredQueryString(c.req.query('to'), '目的地', 100)
              if (!city || !supportedCityCodes.has(city)) throw new QueryValidationError('請選擇縣市')
              const plans = await getOneTransferRoutes(c.env, city, from, to)
              return c.json({ schemaVersion: 1, city, from, to, plans }, 200, {
                'Cache-Control': 'public, max-age=86400',
              })
            } catch (error) {
              return mapJsonError(c, error, '轉乘路線查詢失敗')
            }
          })
          """,
          """map.get('/api/v1/map/direct', readDirectRoutes)

          map.get('/api/v1/map/transfer', readTransferPlans)
          """,
          )

          path.write_text(text)
          PY
          rm -f tmp-journey-plan-integration.txt tmp-journey-plan-patch.txt
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/routes/map-journey-plans.test.ts
          src/routes/map-http-context.test.ts
          src/routes/map-place-lookups.test.ts
          src/routes/map-place-arrivals.test.ts
          src/routes/map-observability.test.ts
      - run: npm run check
      - run: git diff --check
      - name: Commit clean extraction
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A src/routes/map.ts src/routes/map-journey-plans.ts src/routes/map-journey-plans.test.ts tmp-journey-plan-integration.txt tmp-journey-plan-patch.txt .github/workflows/ci.yml
          git diff --cached --check
          git commit -m 'refactor(map): extract journey plan handlers'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
