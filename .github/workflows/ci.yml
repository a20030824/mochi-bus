name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integrate-tdx-commute-route-presentation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Integrate commute route presentation boundary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/tdx.ts')
          text = path.read_text()
          before_lines = len(text.splitlines())

          replacements = [
              (
                  "import type { BusQuery, Direction, ResolvedBusQuery } from '../domain/bus-query'\n",
                  '',
              ),
              (
                  "import { nextScheduledMinutes, scheduleClockLabel, type ScheduleItem } from '../domain/schedule'\n",
                  "import type { ScheduleItem } from '../domain/schedule'\n",
              ),
              ("import { selectBestEta } from '../domain/map/eta'\n", ''),
              (
                  "import {\n"
                  "  routeEtaStateFromTdx,\n"
                  "  type RouteEtaPresentationState,\n"
                  "} from '../domain/route-eta-status'\n",
                  '',
              ),
              ("import { selectRouteStopGroup } from '../domain/route-stop-group-selection'\n", ''),
              (
                  "import { getSnapshotSchedule, type TransitBindings } from '../infrastructure/transit/snapshot-repository'\n",
                  "import { getSnapshotSchedule } from '../infrastructure/transit/snapshot-repository'\n",
              ),
              (
                  "import {\n"
                  "  formatETALabel,\n"
                  "  toETAResult,\n"
                  "  type BusETAItem,\n"
                  "  type ETAResult,\n"
                  "} from './tdx/eta-formatting'\n",
                  '',
              ),
              (
                  "import {\n"
                  "  BUS_ETA_CACHE_SECONDS,\n"
                  "  QueryResolutionError,\n"
                  "  createTDXBusRouteQueries,\n"
                  "  tdxRouteScope,\n"
                  "} from './tdx/bus-route-queries'\n",
                  "import { createTDXBusRouteQueries, tdxRouteScope } from './tdx/bus-route-queries'\n"
                  "import { createTDXCommuteRoutePresentation } from './tdx/commute-route-presentation'\n",
              ),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'import anchor count={text.count(old)} for {old!r}')
              text = text.replace(old, new)

          export_anchor = """export type {
            RouteCatalogItem,
            RouteStop,
            StopGroup,
            StopRouteSuggestion,
          } from './tdx/bus-route-queries'
          """
          presentation_exports = export_anchor + """export type {
            RouteDetail,
            RouteDetailWithEtaStates,
            RouteEtaTone,
          } from './tdx/commute-route-presentation'
          """
          if text.count(export_anchor) != 1:
              raise SystemExit(f'route export anchor count={text.count(export_anchor)}')
          text = text.replace(export_anchor, presentation_exports)

          types_start = text.index('// 「estimated 淡墨」')
          types_end = text.index('export { tdxWarningMessages }', types_start)
          text = text[:types_start] + text[types_end:]

          route_exports = """export const resolveBusQuery = busRouteQueries.resolveBusQuery
          export const getRouteStopGroups = busRouteQueries.getRouteStopGroups
          export const getRouteCatalog = busRouteQueries.getRouteCatalog
          export const getStopRouteSuggestions = busRouteQueries.getStopRouteSuggestions
          """
          presentation_instance = route_exports + """

          const commuteRoutePresentation = createTDXCommuteRoutePresentation({
            fetchTDXJson,
            getRouteStopGroups: busRouteQueries.getRouteStopGroups,
            getBusSchedule,
            getSnapshotSchedule,
            now: () => new Date(),
          })

          export const getCommuteETA = commuteRoutePresentation.getCommuteETA
          export const getRouteDetail = commuteRoutePresentation.getRouteDetail
          """
          if text.count(route_exports) != 1:
              raise SystemExit(f'route exports anchor count={text.count(route_exports)}')
          text = text.replace(route_exports, presentation_instance)

          commute_start = text.index('export async function getCommuteETA(')
          commute_end = text.index('export async function getBusSchedule(', commute_start)
          text = text[:commute_start] + text[commute_end:]

          detail_start = text.index('export async function getRouteDetail(')
          detail_end = text.index('export function isTDXRecordArray', detail_start)
          text = text[:detail_start] + text[detail_end:]

          forbidden = [
              "from '../domain/bus-query'",
              'nextScheduledMinutes',
              'scheduleClockLabel',
              'selectBestEta',
              'routeEtaStateFromTdx',
              'RouteEtaPresentationState',
              'selectRouteStopGroup',
              'TransitBindings',
              'BUS_ETA_CACHE_SECONDS',
              'export type RouteEtaTone',
              'export type RouteDetail',
              'export type RouteDetailWithEtaStates',
              'export async function getCommuteETA',
              'export async function getRouteDetail',
              'async function getBusETA',
              "message: 'commute_eta_realtime_failed'",
              "console.error('eta_schedule_fallback_failed'",
          ]
          remaining = [token for token in forbidden if token in text]
          if remaining:
              raise SystemExit(f'forbidden presentation tokens remain={remaining}')

          required = [
              "from './tdx/commute-route-presentation'",
              'const commuteRoutePresentation = createTDXCommuteRoutePresentation({',
              'getRouteStopGroups: busRouteQueries.getRouteStopGroups',
              'getBusSchedule,',
              'getSnapshotSchedule,',
              'now: () => new Date()',
              'export const getCommuteETA = commuteRoutePresentation.getCommuteETA',
              'export const getRouteDetail = commuteRoutePresentation.getRouteDetail',
              'export async function getBusSchedule(',
              'tdxRouteScope(',
              'export function isTDXRecordArray',
              'function telemetryCity(',
              'const tokenClient = createTDXTokenClient({',
              'const upstreamDataClient = createTDXUpstreamDataClient({',
              'const resolutionCache = createTDXResolutionCache({',
              'const busRouteQueries = createTDXBusRouteQueries({',
          ]
          missing = [token for token in required if token not in text]
          if missing:
              raise SystemExit(f'required façade tokens missing={missing}')

          path.write_text(text)
          print(f'src/lib/tdx.ts: {before_lines} -> {len(text.splitlines())} lines')
          PY
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/lib/tdx/commute-route-presentation.test.ts
          src/lib/tdx.test.ts
          src/domain/route-page-detail.test.ts
          src/routes/route-page-http.test.ts
          src/routes/route-eta.test.ts
          src/tdx-api-contract.test.ts
      - run: npm run check
      - run: git diff --check
      - name: Commit clean extraction
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git rm .github/workflows/diagnose-tdx-commute.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/tdx.ts src/lib/tdx/commute-route-presentation.ts src/lib/tdx/commute-route-presentation.test.ts .github/workflows/ci.yml
          git diff --cached --check
          git commit -m "refactor(tdx): extract commute route presentation"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
