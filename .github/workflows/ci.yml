name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-tdx-error-classification:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true
          fetch-depth: 0
      - name: Capture exact integration counts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          text = Path('src/lib/tdx.ts').read_text()
          output = [f'lines={len(text.splitlines())}']

          eta_import = """import {
            formatETALabel,
            toETAResult,
            type BusETAItem,
            type ETAResult,
            type LocalizedName,
          } from './tdx/eta-formatting'
          """
          export_anchor = """export { formatETALabel, formatStopStatus, toETAResult } from './tdx/eta-formatting'
          export type { BusETAItem, ETAResult } from './tdx/eta-formatting'
          """
          service_block = """export class TDXServiceError extends Error {
            warning?: TDXWarning
            failureKind?: TelemetryFailureClass

            constructor(
              message: string,
              readonly status?: number,
              options?: ErrorOptions & { failureKind?: TelemetryFailureClass },
            ) {
              super(message, options)
              this.name = 'TDXServiceError'
              this.failureKind = options?.failureKind
            }

            get rateLimited(): boolean {
              return this.status === 429 || this.warning === 'tdx-rate-limit' || this.warning === 'tdx-quota'
            }
          }

          export function isRejectedUserTdxToken(error: unknown, authorization?: string): boolean {
            return Boolean(authorization)
              && error instanceof TDXServiceError
              && error.status === 401
          }

          """
          tracking_end_marker = """export function resetTDXRateLimitTracking(): void {
            sharedRateLimitedSince = null
          }

          """
          observe_block = """  if (isShared && (response.status === 429 || warning === 'tdx-rate-limit' || warning === 'tdx-quota')) {
            sharedRateLimitedSince ??= Date.now()
          }
          """
          failure_block = """function responseFailureClass(status: number, warning?: TDXWarning): TelemetryFailureClass {
            if (warning === 'tdx-quota') return 'quota'
            if (status === 429 || warning === 'tdx-rate-limit') return 'rate_limited'
            if (status === 401) return 'token_rejected'
            if (status >= 400 && status <= 499) return 'upstream_4xx'
            if (status >= 500 && status <= 599) return 'upstream_5xx'
            return 'unknown'
          }

          function transportFailureClass(error: unknown): TelemetryFailureClass {
            const name = error instanceof Error ? error.name : ''
            return name === 'AbortError' || name === 'TimeoutError' ? 'timeout' : 'network_error'
          }

          """
          wrapper_block = """function asTDXServiceError(error: unknown): TDXServiceError {
            if (error instanceof TDXServiceError) return error
            return new TDXServiceError('TDX resolution failed', undefined, {
              cause: error,
              failureKind: 'unknown',
            })
          }

          """

          checks = {
            'eta_import': text.count(eta_import),
            'export_anchor': text.count(export_anchor),
            'service_block': text.count(service_block),
            'tracking_start': text.count('// 額度用完與頻率超限 TDX 都只回 429'),
            'tracking_end_marker': text.count(tracking_end_marker),
            'observe_block': text.count(observe_block),
            'classify_start': text.count('function classifyTDXWarning(status: number, body: string): TDXWarning | undefined {'),
            'classify_end_marker_total': text.count('  return undefined\n}\n\n'),
            'plain_reset_line_initial': text.count('  sharedRateLimitedSince = null\n'),
            'success_reset_line': text.count('  if (isShared) sharedRateLimitedSince = null\n'),
            'failure_block': text.count(failure_block),
            'wrapper_block': text.count(wrapper_block),
          }
          output.extend(f'{key}={value}' for key, value in checks.items())

          try:
            tracking_start = text.index('// 額度用完與頻率超限 TDX 都只回 429')
            tracking_end = text.index(tracking_end_marker, tracking_start) + len(tracking_end_marker)
            after_tracking = text[:tracking_start] + text[tracking_end:]
            output.append(f'plain_reset_after_tracking={after_tracking.count("  sharedRateLimitedSince = null" + chr(10))}')
          except Exception as error:
            output.append(f'tracking_simulation_error={type(error).__name__}:{error}')

          try:
            classify_start = text.index('function classifyTDXWarning(status: number, body: string): TDXWarning | undefined {')
            classify_end = text.index('  return undefined\n}\n\n', classify_start)
            output.append(f'classify_end_offset={classify_end - classify_start}')
          except Exception as error:
            output.append(f'classify_simulation_error={type(error).__name__}:{error}')

          Path('tdx-classification-diagnostic.txt').write_text('\n'.join(output) + '\n')
          print('\n'.join(output))
          PY
      - name: Publish diagnostic and restore canonical CI
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tdx-classification-diagnostic.txt .github/workflows/ci.yml
          git commit -m "chore: capture TDX classification integration diagnostic"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
