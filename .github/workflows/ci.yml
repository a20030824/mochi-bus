name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-tdx-resolution-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Integrate resolution cache boundary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/tdx.ts')
          text = path.read_text()

          for line in [
              "import { memoryCacheGet, memoryCacheSet } from './memory-cache'\n",
              "import { cacheMatchFailOpen, cachePutFailOpen, type BackgroundTaskScheduler } from './edge-cache'\n",
              "import { releaseIdentity } from '../observability/release-identity'\n",
              "import { beginTDXResolutionTelemetry } from '../observability/tdx-resolution'\n",
          ]:
              text = text.replace(line, '')

          telemetry_import = """import type {
            TelemetryCity,
            TelemetryFailureClass,
            TelemetrySink,
            TelemetryTdxOperation,
            TelemetryTrafficClass,
          } from '../observability/telemetry'
          """
          text = text.replace(telemetry_import, "import type { TelemetryCity } from '../observability/telemetry'\n")
          for line in ['  asTDXServiceError,\n', '  DEFAULT_TDX_JSON_MAX_RESPONSE_BYTES,\n', '  responseByteLimit,\n']:
              text = text.replace(line, '')

          upstream_import = "import { createTDXUpstreamDataClient } from './tdx/upstream-data-client'\n"
          resolution_import = """import {
            createTDXResolutionCache,
            withTDXBackgroundTasks,
            type TDXEnv,
            type TDXResolutionOptions,
            type TDXResolvedData,
          } from './tdx/resolution-cache'
          """
          text = text.replace(upstream_import, upstream_import + resolution_import)

          export_anchor = "export { tdxCredentialScope, withUserTDXAccessToken } from './tdx/token-client'\n"
          export_addition = """export { tdxCredentialScope, withUserTDXAccessToken } from './tdx/token-client'
          export { withTDXBackgroundTasks }
          export type { TDXEnv, TDXResolutionOptions, TDXResolvedData }
          """
          text = text.replace(export_anchor, export_addition)

          type_start = text.index('type TDXTelemetryContext = {')
          type_end = text.index('type StopOfRouteItem = {', type_start)
          text = text[:type_start] + text[type_end:]

          upstream_instance = """const upstreamDataClient = createTDXUpstreamDataClient({
            requestTimeoutMs: REQUEST_TIMEOUT_MS,
            assertCircuitClosed: (key) => { circuitBreaker.assertClosed(key) },
            recordCircuitFailure: (key, error, retryAfter) => circuitBreaker.recordFailure(key, error, retryAfter),
            recordCircuitSuccess: circuitBreaker.recordSuccess,
            responseError: (context, response, isShared, observation) => (
              tdxResponseError(context, response, isShared, observation)
            ),
          })
          """
          resolution_instance = upstream_instance + """

          const resolutionCache = createTDXResolutionCache({
            getTDXToken,
            fetchUpstream: upstreamDataClient.fetchUpstream,
            recordCircuitFailure: (key, error) => circuitBreaker.recordFailure(key, error),
            recordCircuitSuccess: circuitBreaker.recordSuccess,
          })

          export const fetchTDXJson = resolutionCache.fetchTDXJson
          export const resolveTDXJson = resolutionCache.resolveTDXJson
          """
          text = text.replace(upstream_instance, resolution_instance)

          resolution_start = text.index('type TDXCacheEntry<T> =')
          resolution_end = text.index('export function isTDXRecordArray', resolution_start)
          text = text[:resolution_start] + text[resolution_end:]

          helper_start = text.index('function isEmptyPayload(')
          helper_end = text.index('function dedupeStops(', helper_start)
          text = text[:helper_start] + text[helper_end:]
          path.write_text(text)
          PY
      - run: npm ci --silent
      - name: Capture split check results
        shell: bash
        run: |
          set -euo pipefail
          : > RESOLUTION_CHECK.txt
          run_stage() {
            local name="$1"
            shift
            printf '\n===== %s =====\n' "${name}" >> RESOLUTION_CHECK.txt
            set +e
            "$@" >> RESOLUTION_CHECK.txt 2>&1
            local code=$?
            set -e
            printf '\nexit_code=%s\n' "${code}" >> RESOLUTION_CHECK.txt
          }
          run_stage cf-typegen npm run cf-typegen:check
          run_stage test npm run test
          run_stage typecheck npm run typecheck
          run_stage build-map npm run build:map
          run_stage wrangler npx wrangler deploy --dry-run
      - name: Upload split diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resolution-check-diagnostics
          path: RESOLUTION_CHECK.txt
          if-no-files-found: error
          retention-days: 1
