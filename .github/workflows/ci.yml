name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-map-journey-eta:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 128
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Integrate journey ETA handler
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/routes/map.ts')
          text = path.read_text()

          import_start = "import { Hono } from 'hono'\n"
          map_start = 'const map = new Hono<MapEnv>()\n'
          if text.count(import_start) != 1 or text.count(map_start) != 1:
              raise SystemExit('map composition boundaries are not unique')
          imports = """import { Hono } from 'hono'
          import { mapCities } from '../config/map-cities'
          import { renderMapPage } from '../map-page'
          import type { MapEnv } from './map-http-context'
          import {
            findNearbyPlaces,
            readPlace,
            readPlaceRoutes,
            readStopPlace,
            searchPlaces,
          } from './map-place-lookups'
          import { readDirectRoutes, readTransferPlans } from './map-journey-plans'
          import { journeyEtaBodyLimit, readJourneyEta } from './map-journey-eta'
          import { readRouteMap, readRouteTimetable } from './map-route-reads'
          import { readCityNetwork } from './map-network-read'
          import { readRouteCatalog } from './map-route-catalog'
          import { readVehicles } from './map-vehicles-read'
          import { readPlaceArrivals } from './map-place-arrivals'

          """
          start_index = text.index(import_start)
          map_index = text.index(map_start)
          text = text[:start_index] + imports + text[map_index:]

          helper_start = 'function strongerTDXWarning('
          map_route_start = "map.get('/map',"
          if text.count(helper_start) != 1 or text.count(map_route_start) != 1:
              raise SystemExit('journey helper boundaries are not unique')
          helper_index = text.index(helper_start)
          route_index = text.index(map_route_start, helper_index)
          text = text[:helper_index] + text[route_index:]

          handler_start = "map.post('/api/v1/map/journey-eta', bodyLimit({"
          export_marker = 'export default map'
          if text.count(handler_start) != 1 or text.count(export_marker) != 1:
              raise SystemExit('journey handler boundary is not unique')
          handler_index = text.index(handler_start)
          export_index = text.index(export_marker, handler_index)
          text = (
              text[:handler_index]
              + "map.post('/api/v1/map/journey-eta', journeyEtaBodyLimit, readJourneyEta)\n\n"
              + text[export_index:]
          )

          path.write_text(text)
          PY
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/routes/map-journey-eta.test.ts
          src/routes/map-observability.test.ts
          src/routes/map-http-context.test.ts
          src/routes/map-place-arrivals-contract.test.ts
          src/lib/api-input.test.ts
      - name: Run npm run check
        run: npm run check
      - name: Run git diff --check
        run: git diff --check
      - name: Commit clean extraction
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/routes/map.ts .github/workflows/ci.yml
          git commit -m "Wire Map journey ETA handler"
          git push origin HEAD:agent/extract-map-journey-eta
