name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose-map-place-arrivals:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 127
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Capture contract output
        shell: bash
        run: |
          set +e
          npx vitest run src/routes/map-place-arrivals-contract.test.ts > place-arrivals-diagnostic.txt 2>&1
          code=$?
          echo "exit_code=${code}" >> place-arrivals-diagnostic.txt
          exit 0
      - name: Publish diagnostic text and restore CI
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add place-arrivals-diagnostic.txt .github/workflows/ci.yml
          git commit -m "Capture Place Arrivals test diagnostics"
          git push origin HEAD:agent/extract-map-place-arrivals
