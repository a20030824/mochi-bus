name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-tdx-circuit-breaker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true
          fetch-depth: 0
      - name: Count exact anchors
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          text = Path('src/lib/tdx.ts').read_text()
          token_import = """import {
            createTDXTokenClient,
            tdxCredentialScope,
            withUserTDXAccessToken,
            type TDXCredentialEnv,
          } from './tdx/token-client'
          """
          state_block = """type CircuitState = {
            failures: number
            lastFailureAt: number
            openedUntil: number
            halfOpen: boolean
            warning: TDXWarning
          }

          """
          map_block = """const tdxCircuits = new Map<string, CircuitState>()
          const dataFlights = new Map<string, Promise<TDXUpstreamOutcome>>()
          """
          anchors = {
            'lines': len(text.splitlines()),
            'token_import': text.count(token_import),
            'state_block': text.count(state_block),
            'map_block': text.count(map_block),
            'reset_line': text.count('  tdxCircuits.clear()\n'),
            'token_client_anchor': text.count('const tokenClient = createTDXTokenClient({\n'),
            'retry_start': text.count('function retryAfterMilliseconds(value: string | null, now: number): number | undefined {'),
            'circuit_end': text.count("const dataCircuitKey = (credentialKey: string) => `data/${credentialKey}`\n\n"),
            'assert_usage': text.count('assertTDXCircuitClosed('),
            'failure_usage': text.count('recordTDXCircuitFailure('),
            'success_usage': text.count('recordTDXCircuitSuccess('),
          }
          constants = [
            'MAX_CIRCUIT_ENTRIES',
            'CIRCUIT_FAILURE_THRESHOLD',
            'CIRCUIT_FAILURE_WINDOW_MS',
            'TRANSIENT_CIRCUIT_OPEN_MS',
            'QUOTA_CIRCUIT_OPEN_MS',
            'MAX_RETRY_AFTER_MS',
          ]
          for constant in constants:
            anchors[constant] = text.count(f'const {constant} =')
          Path('circuit-diagnostic.txt').write_text('\n'.join(f'{key}={value}' for key, value in anchors.items()) + '\n')
          PY
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add circuit-diagnostic.txt .github/workflows/ci.yml
          git commit -m "chore: record circuit extraction diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
