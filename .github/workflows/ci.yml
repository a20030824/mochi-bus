name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check

  map-ui:
    name: Map UI regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test all desktop and touch interaction flows
        run: >-
          npx playwright test
          --project=desktop-chromium
          --project=mobile-touch
          --reporter=line,html
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: map-ui-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  route-page-failover-migration:
    name: Apply Route page failover extraction
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/extract-route-page-failover'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - run: node scripts/apply-route-page-failover.mjs
      - run: npx vitest run src/application/route-page.test.ts src/application/snapshot-route-page.test.ts src/routes/bus.test.ts
      - run: npm run check
      - name: Commit clean Route page failover extraction
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/ci.yml
          rm scripts/apply-route-page-failover.mjs
          git add src/application/route-page.ts src/application/route-page.test.ts src/routes/bus.ts .github/workflows/ci.yml scripts/apply-route-page-failover.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "refactor(route): extract page failover policy"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  deploy:
    name: Deploy production
    needs: [quality, map-ui]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Deploy Worker
        run: >-
          npm run deploy --
          --tag "${GITHUB_SHA}"
          --message "GitHub Actions ${GITHUB_RUN_ID}: ${GITHUB_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
