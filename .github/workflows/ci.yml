name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose-upstream-data-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true
          fetch-depth: 0
      - name: Simulate integration with stage trace
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' > UPSTREAM_DIAGNOSTIC_2.txt 2>&1
          from pathlib import Path
          import traceback

          text = Path('src/lib/tdx.ts').read_text()
          print('start', len(text.splitlines()))
          try:
              for line in [
                  '  observeTDXResponseSuccess,\n',
                  '  transportFailureClass,\n',
                  '  dataCircuitKey,\n',
              ]:
                  print('import', repr(line), text.count(line))
                  assert text.count(line) == 1
                  text = text.replace(line, '')
              print('stage imports')

              bounded_end = "} from './tdx/bounded-response'\n"
              print('bounded_end', text.count(bounded_end))
              assert text.count(bounded_end) == 1
              text = text.replace(bounded_end, bounded_end + "import { createTDXUpstreamDataClient } from './tdx/upstream-data-client'\n")
              print('stage upstream import')

              print('outcome', text.count('type TDXUpstreamOutcome ='), text.count('// 測試用：模擬 isolate 重建'))
              start = text.index('type TDXUpstreamOutcome =')
              end = text.index('// 測試用：模擬 isolate 重建', start)
              text = text[:start] + text[end:]
              print('stage outcome')

              for old, new in [
                  ('  dataFlights.clear()\n', '  upstreamDataClient.resetTDXUpstreamState()\n'),
                  ('const MAX_TDX_SINGLEFLIGHT_ENTRIES = 128\n', ''),
              ]:
                  print('replace', repr(old), text.count(old))
                  assert text.count(old) == 1
                  text = text.replace(old, new)
              print('stage reset/constants')

              anchor = 'const resetTDXTokenState = tokenClient.resetTDXTokenState\n'
              print('token anchor', text.count(anchor))
              assert text.count(anchor) == 1
              text = text.replace(anchor, anchor + """

              const upstreamDataClient = createTDXUpstreamDataClient({
                requestTimeoutMs: REQUEST_TIMEOUT_MS,
                assertCircuitClosed: (key) => { circuitBreaker.assertClosed(key) },
                recordCircuitFailure: (key, error, retryAfter) => circuitBreaker.recordFailure(key, error, retryAfter),
                recordCircuitSuccess: circuitBreaker.recordSuccess,
                responseError: (context, response, isShared, observation) => (
                  tdxResponseError(context, response, isShared, observation)
                ),
              })
              """)
              print('stage instance')

              print('upstream anchors', text.count('  const circuitKey = dataCircuitKey(credentialKey)'), text.count('  retryCount = upstream.retryCount'))
              start = text.index('  const circuitKey = dataCircuitKey(credentialKey)')
              end = text.index('  retryCount = upstream.retryCount', start)
              text = text[:start] + """  let upstreamResult: Awaited<ReturnType<typeof upstreamDataClient.fetchUpstream>>
                try {
                  upstreamResult = await upstreamDataClient.fetchUpstream({
                    url,
                    maxResponseBytes,
                    operation: options.operation,
                    token,
                    isShared,
                    credentialKey,
                    ttlSeconds,
                    validatesPayload: Boolean(options.validate),
                  })
                } catch (error) {
                  return finishFailure(asTDXServiceError(error), false)
                }
                const { outcome: upstream, leader, circuitKey, resource } = upstreamResult
              """ + text[end:]
              print('stage resolution call')

              print('helper anchors', text.count('function dataFlightKey('), text.count('function validPayload'))
              start = text.index('function dataFlightKey(')
              end = text.index('function validPayload', start)
              text = text[:start] + text[end:]
              print('stage helpers removed')

              resource_line = '      resource: tdxResponseResource(url),\n'
              print('resource line', text.count(resource_line))
              assert text.count(resource_line) == 1
              text = text.replace(resource_line, '      resource,\n')
              print('stage resource')

              forbidden = [
                  'type TDXUpstreamOutcome', 'dataFlights', 'dataFlightKey(', 'joinSingleflight(',
                  'fetchTDXUpstream(', 'shouldRetryResolution(', 'tdxResponseResource(',
                  'observeTDXResponseSuccess', 'transportFailureClass', 'dataCircuitKey',
                  'MAX_TDX_SINGLEFLIGHT_ENTRIES',
              ]
              for token in forbidden:
                  print('forbidden', repr(token), text.count(token))
              print('stage forbidden')

              required = [
                  'async function tdxResponseError(',
                  'const upstreamDataClient = createTDXUpstreamDataClient({',
                  'upstreamDataClient.resetTDXUpstreamState()',
                  'const memoryKey =', "'memory'", "'edge'", "'stale_replay'",
                  'if (!validPayload(upstream.data, options.validate))',
                  'if (leader) circuitBreaker.recordSuccess(circuitKey)',
                  'await cachePutFailOpen(',
                  'const parsed = await readJsonResponse(cached, maxResponseBytes)',
              ]
              for token in required:
                  print('required', repr(token), text.count(token))
              print('done', len(text.splitlines()))
          except BaseException as error:
              print('ERROR', type(error).__name__, str(error))
              traceback.print_exc()
          PY
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add UPSTREAM_DIAGNOSTIC_2.txt .github/workflows/ci.yml
          git commit -m "chore: capture upstream integration stage trace"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
