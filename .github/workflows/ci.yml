name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check

  map-ui:
    name: Map UI regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test all desktop and touch interaction flows
        run: >-
          npx playwright test
          --project=desktop-chromium
          --project=mobile-touch
          --reporter=line,html
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: map-ui-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Deploy production
    needs: [quality, map-ui]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Deploy Worker
        run: >-
          npm run deploy --
          --tag "${GITHUB_SHA}"
          --message "GitHub Actions ${GITHUB_RUN_ID}: ${GITHUB_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  apply-stopuid-hotfix:
    name: Apply verified StopUID hotfix
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Extract and apply focused patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-stopuid-hotfix.yml').read_text(encoding='utf-8')
          marker = "          python <<'PY'\n"
          if marker not in workflow or '\n          PY\n' not in workflow:
              raise SystemExit('Unable to locate staged hotfix source')
          block = workflow.split(marker, 1)[1].split('\n          PY\n', 1)[0]
          source = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          exec(compile(source, 'apply-stopuid-hotfix.py', 'exec'))
          PY
      - run: npm ci
      - name: Run targeted tests
        run: npx vitest run scripts/transit-snapshot/stop-place-registry.test.mjs scripts/transit-snapshot/snapshot-invariants.test.mjs scripts/transit-snapshot/validate.test.mjs
      - name: Run full checks
        run: npm run check
      - name: Commit verified hotfix and remove staging hooks
        shell: bash
        run: |
          rm .github/workflows/apply-stopuid-hotfix.yml
          git show HEAD^:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/sync-transit-snapshot.mjs scripts/transit-snapshot/stop-place-registry.mjs scripts/transit-snapshot/stop-place-registry.test.mjs scripts/transit-snapshot/snapshot-invariants.mjs scripts/transit-snapshot/snapshot-invariants.test.mjs scripts/transit-snapshot/validate.mjs scripts/transit-snapshot/validate.test.mjs .github/workflows/ci.yml .github/workflows/apply-stopuid-hotfix.yml
          git commit -m "fix(snapshot): canonicalize duplicate StopUID places"
          git push origin HEAD:main
