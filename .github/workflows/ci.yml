name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check

  map-ui:
    name: Map UI regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test all desktop and touch interaction flows
        run: >-
          npx playwright test
          --project=desktop-chromium
          --project=mobile-touch
          --reporter=line,html
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: map-ui-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  remove-unused-compatibility-surfaces:
    name: Remove unused compatibility surfaces
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/remove-unused-compatibility-surfaces'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Measure production source maps
        shell: bash
        run: |
          set -euo pipefail
          npm run build:map >/tmp/build-with-maps.log
          with_total=$(find public/assets -type f -printf '%s\n' | awk '{ total += $1 } END { print total + 0 }')
          map_bytes=$(find public/assets -type f -name '*.map' -printf '%s\n' | awk '{ total += $1 } END { print total + 0 }')
          map_files=$(find public/assets -type f -name '*.map' | wc -l)
          cp vite.config.ts /tmp/vite.config.ts
          node --input-type=module -e "import fs from 'node:fs'; const p='vite.config.ts'; const s=fs.readFileSync(p,'utf8'); if (!s.includes('sourcemap: true')) throw new Error('missing sourcemap flag'); fs.writeFileSync(p,s.replace('sourcemap: true','sourcemap: false'))"
          npm run build:map >/tmp/build-without-maps.log
          without_total=$(find public/assets -type f -printf '%s\n' | awk '{ total += $1 } END { print total + 0 }')
          cp /tmp/vite.config.ts vite.config.ts
          echo "SOURCE_MAP_MEASUREMENT with_total=${with_total} map_bytes=${map_bytes} map_files=${map_files} without_total=${without_total} saved=$((with_total - without_total))"
      - name: Apply cleanup and validate
        run: |
          node scripts/remove-unused-compatibility-surfaces.mjs
          npm run check
          git diff --check
      - name: Push clean product commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm scripts/remove-unused-compatibility-surfaces.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "chore: remove unused compatibility surfaces"
          git push origin HEAD:${{ github.head_ref }}

  deploy:
    name: Deploy production
    needs: [quality, map-ui]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Deploy Worker
        run: >-
          npm run deploy --
          --tag "${GITHUB_SHA}"
          --message "GitHub Actions ${GITHUB_RUN_ID}: ${GITHUB_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}