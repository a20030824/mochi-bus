name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose-tdx-upstream-data-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true
          fetch-depth: 0
      - name: Diagnose exact integration stages
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' > UPSTREAM_DIAGNOSTIC.txt 2>&1
          from pathlib import Path
          import traceback

          text = Path('src/lib/tdx.ts').read_text()
          print(f'lines={len(text.splitlines())}')
          try:
              error_import = """import {
                TDXServiceError,
                asTDXServiceError,
                classifyTDXWarning,
                isRejectedUserTdxToken,
                observeTDXResponseFailure,
                observeTDXResponseSuccess,
                resetTDXRateLimitTracking,
                responseFailureClass,
                tdxWarningFromError,
                transportFailureClass,
              } from './tdx/error-classification'
              """
              error_replacement = """import {
                TDXServiceError,
                asTDXServiceError,
                classifyTDXWarning,
                isRejectedUserTdxToken,
                observeTDXResponseFailure,
                resetTDXRateLimitTracking,
                responseFailureClass,
                tdxWarningFromError,
              } from './tdx/error-classification'
              """
              print('error_import', text.count(error_import))
              assert text.count(error_import) == 1
              text = text.replace(error_import, error_replacement)

              circuit_import = """import {
                createTDXCircuitBreaker,
                dataCircuitKey,
              } from './tdx/circuit-breaker'
              """
              print('circuit_import', text.count(circuit_import))
              assert text.count(circuit_import) == 1
              text = text.replace(circuit_import, "import { createTDXCircuitBreaker } from './tdx/circuit-breaker'\n")

              bounded_end = "} from './tdx/bounded-response'\n"
              print('bounded_end', text.count(bounded_end))
              assert text.count(bounded_end) == 1
              text = text.replace(bounded_end, bounded_end + "import { createTDXUpstreamDataClient } from './tdx/upstream-data-client'\n")

              print('outcome_start', text.count('type TDXUpstreamOutcome ='))
              print('outcome_end', text.count('// 測試用：模擬 isolate 重建'))
              outcome_start = text.index('type TDXUpstreamOutcome =')
              outcome_end = text.index('// 測試用：模擬 isolate 重建', outcome_start)
              text = text[:outcome_start] + text[outcome_end:]

              print('reset_line', text.count('  dataFlights.clear()\n'))
              assert text.count('  dataFlights.clear()\n') == 1
              text = text.replace('  dataFlights.clear()\n', '  upstreamDataClient.resetTDXUpstreamState()\n')

              print('max_line', text.count('const MAX_TDX_SINGLEFLIGHT_ENTRIES = 128\n'))
              assert text.count('const MAX_TDX_SINGLEFLIGHT_ENTRIES = 128\n') == 1
              text = text.replace('const MAX_TDX_SINGLEFLIGHT_ENTRIES = 128\n', '')

              token_reset = 'const resetTDXTokenState = tokenClient.resetTDXTokenState\n'
              print('token_reset', text.count(token_reset))
              assert text.count(token_reset) == 1
              text = text.replace(token_reset, token_reset + """

              const upstreamDataClient = createTDXUpstreamDataClient({
                requestTimeoutMs: REQUEST_TIMEOUT_MS,
                assertCircuitClosed: (key) => { circuitBreaker.assertClosed(key) },
                recordCircuitFailure: (key, error, retryAfter) => circuitBreaker.recordFailure(key, error, retryAfter),
                recordCircuitSuccess: circuitBreaker.recordSuccess,
                responseError: (context, response, isShared, observation) => (
                  tdxResponseError(context, response, isShared, observation)
                ),
              })
              """)

              print('upstream_start', text.count('  const circuitKey = dataCircuitKey(credentialKey)'))
              print('retry_anchor', text.count('  retryCount = upstream.retryCount'))
              upstream_start = text.index('  const circuitKey = dataCircuitKey(credentialKey)')
              upstream_end = text.index('  retryCount = upstream.retryCount', upstream_start)
              replacement = """  let upstreamResult: Awaited<ReturnType<typeof upstreamDataClient.fetchUpstream>>
                try {
                  upstreamResult = await upstreamDataClient.fetchUpstream({
                    url,
                    maxResponseBytes,
                    operation: options.operation,
                    token,
                    isShared,
                    credentialKey,
                    ttlSeconds,
                    validatesPayload: Boolean(options.validate),
                  })
                } catch (error) {
                  return finishFailure(asTDXServiceError(error), false)
                }
                const { outcome: upstream, leader, circuitKey, resource } = upstreamResult
              """
              text = text[:upstream_start] + replacement + text[upstream_end:]

              resource_line = '      resource: tdxResponseResource(url),\n'
              print('resource_line', text.count(resource_line))
              assert text.count(resource_line) == 1
              text = text.replace(resource_line, '      resource,\n')

              print('helpers_start', text.count('function dataFlightKey('))
              print('helpers_end', text.count('function validPayload'))
              helpers_start = text.index('function dataFlightKey(')
              helpers_end = text.index('function validPayload', helpers_start)
              text = text[:helpers_start] + text[helpers_end:]

              forbidden = [
                  'type TDXUpstreamOutcome', 'dataFlights', 'dataFlightKey(', 'joinSingleflight(',
                  'fetchTDXUpstream(', 'shouldRetryResolution(', 'tdxResponseResource(',
                  'observeTDXResponseSuccess', 'transportFailureClass', 'dataCircuitKey',
                  'MAX_TDX_SINGLEFLIGHT_ENTRIES',
              ]
              for token in forbidden:
                  print('forbidden', repr(token), token in text)

              required = [
                  'async function tdxResponseError(',
                  'const upstreamDataClient = createTDXUpstreamDataClient({',
                  'upstreamDataClient.resetTDXUpstreamState()',
                  'const memoryKey =',
                  "return completeData(\n      memoized.data,\n      'memory'",
                  "return completeData(\n          typed,\n          'edge'",
                  "return completeData(\n            stale.data,\n            'stale_replay'",
                  'if (!validPayload(upstream.data, options.validate))',
                  'if (leader) circuitBreaker.recordSuccess(circuitKey)',
                  'await cachePutFailOpen(',
                  'const parsed = await readJsonResponse(cached, maxResponseBytes)',
              ]
              for token in required:
                  print('required', repr(token), token in text)
              print(f'transformed_lines={len(text.splitlines())}')
          except BaseException as error:
              print('ERROR', type(error).__name__, str(error))
              traceback.print_exc()
          PY
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add UPSTREAM_DIAGNOSTIC.txt .github/workflows/ci.yml
          git commit -m "chore: capture upstream integration diagnostic"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
