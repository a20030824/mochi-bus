name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integrate-tdx-resolution-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Fix focused contract helper
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('src/lib/tdx/resolution-cache.test.ts')
          text = path.read_text()
          old = """  return {
            resolver: createTDXResolutionCache(dependencies),
            getTDXToken,
            fetchUpstream,
            recordCircuitFailure,
            recordCircuitSuccess,
          }
          """
          new = """  return {
            resolver: createTDXResolutionCache(dependencies),
            getTDXToken: dependencies.getTDXToken,
            fetchUpstream: dependencies.fetchUpstream,
            recordCircuitFailure: dependencies.recordCircuitFailure,
            recordCircuitSuccess: dependencies.recordCircuitSuccess,
          }
          """
          if text.count(old) != 1:
              raise SystemExit(f'test helper count={text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
      - name: Integrate resolution cache boundary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/tdx.ts')
          text = path.read_text()
          before_lines = len(text.splitlines())

          for line in [
              "import { memoryCacheGet, memoryCacheSet } from './memory-cache'\n",
              "import { cacheMatchFailOpen, cachePutFailOpen, type BackgroundTaskScheduler } from './edge-cache'\n",
              "import { releaseIdentity } from '../observability/release-identity'\n",
              "import { beginTDXResolutionTelemetry } from '../observability/tdx-resolution'\n",
          ]:
              if text.count(line) != 1:
                  raise SystemExit(f'import count for {line.strip()}={text.count(line)}')
              text = text.replace(line, '')

          telemetry_import = """import type {
            TelemetryCity,
            TelemetryFailureClass,
            TelemetrySink,
            TelemetryTdxOperation,
            TelemetryTrafficClass,
          } from '../observability/telemetry'
          """
          telemetry_replacement = "import type { TelemetryCity } from '../observability/telemetry'\n"
          if text.count(telemetry_import) != 1:
              raise SystemExit(f'telemetry import count={text.count(telemetry_import)}')
          text = text.replace(telemetry_import, telemetry_replacement)

          for line in [
              '  asTDXServiceError,\n',
              '  DEFAULT_TDX_JSON_MAX_RESPONSE_BYTES,\n',
              '  responseByteLimit,\n',
          ]:
              if text.count(line) != 1:
                  raise SystemExit(f'import member count for {line.strip()}={text.count(line)}')
              text = text.replace(line, '')

          upstream_import = "import { createTDXUpstreamDataClient } from './tdx/upstream-data-client'\n"
          resolution_import = """import {
            createTDXResolutionCache,
            withTDXBackgroundTasks,
            type TDXEnv,
            type TDXResolutionOptions,
            type TDXResolvedData,
          } from './tdx/resolution-cache'
          """
          if text.count(upstream_import) != 1:
              raise SystemExit(f'upstream import count={text.count(upstream_import)}')
          text = text.replace(upstream_import, upstream_import + resolution_import)

          export_anchor = "export { tdxCredentialScope, withUserTDXAccessToken } from './tdx/token-client'\n"
          export_addition = """export { tdxCredentialScope, withUserTDXAccessToken } from './tdx/token-client'
          export { withTDXBackgroundTasks }
          export type { TDXEnv, TDXResolutionOptions, TDXResolvedData }
          """
          if text.count(export_anchor) != 1:
              raise SystemExit(f'export anchor count={text.count(export_anchor)}')
          text = text.replace(export_anchor, export_addition)

          type_start = text.index('type TDXTelemetryContext = {')
          type_end = text.index('type StopOfRouteItem = {', type_start)
          text = text[:type_start] + text[type_end:]

          upstream_instance_end = """const upstreamDataClient = createTDXUpstreamDataClient({
            requestTimeoutMs: REQUEST_TIMEOUT_MS,
            assertCircuitClosed: (key) => { circuitBreaker.assertClosed(key) },
            recordCircuitFailure: (key, error, retryAfter) => circuitBreaker.recordFailure(key, error, retryAfter),
            recordCircuitSuccess: circuitBreaker.recordSuccess,
            responseError: (context, response, isShared, observation) => (
              tdxResponseError(context, response, isShared, observation)
            ),
          })
          """
          resolution_instance = upstream_instance_end + """

          const resolutionCache = createTDXResolutionCache({
            getTDXToken,
            fetchUpstream: upstreamDataClient.fetchUpstream,
            recordCircuitFailure: (key, error) => circuitBreaker.recordFailure(key, error),
            recordCircuitSuccess: circuitBreaker.recordSuccess,
          })

          export const fetchTDXJson = resolutionCache.fetchTDXJson
          export const resolveTDXJson = resolutionCache.resolveTDXJson
          """
          if text.count(upstream_instance_end) != 1:
              raise SystemExit(f'upstream instance count={text.count(upstream_instance_end)}')
          text = text.replace(upstream_instance_end, resolution_instance)

          resolution_start = text.index('type TDXCacheEntry<T> =')
          resolution_end = text.index('export function isTDXRecordArray', resolution_start)
          text = text[:resolution_start] + text[resolution_end:]

          helper_start = text.index('function isEmptyPayload(')
          helper_end = text.index('function dedupeStops(', helper_start)
          text = text[:helper_start] + text[helper_end:]

          forbidden = [
              'memoryCacheGet',
              'memoryCacheSet',
              'cacheMatchFailOpen',
              'cachePutFailOpen',
              'releaseIdentity',
              'beginTDXResolutionTelemetry',
              'BackgroundTaskScheduler',
              'TelemetryFailureClass',
              'TelemetrySink',
              'TelemetryTdxOperation',
              'TelemetryTrafficClass',
              'asTDXServiceError',
              'DEFAULT_TDX_JSON_MAX_RESPONSE_BYTES',
              'responseByteLimit',
              'type TDXTelemetryContext',
              'type TDXCacheEntry',
              'export async function fetchTDXJson',
              'export async function resolveTDXJson',
              'function validPayload',
              'function isEmptyPayload',
              'function parsedCacheTimestamp',
              'function telemetryNow',
          ]
          for token in forbidden:
              if token in text:
                  raise SystemExit(f'forbidden token remains: {token}')

          required = [
              'async function tdxResponseError(',
              'const tokenClient = createTDXTokenClient({',
              'const upstreamDataClient = createTDXUpstreamDataClient({',
              'const resolutionCache = createTDXResolutionCache({',
              'export const fetchTDXJson = resolutionCache.fetchTDXJson',
              'export const resolveTDXJson = resolutionCache.resolveTDXJson',
              'export async function resolveBusQuery(',
              'export async function getBusSchedule(',
              'export async function getRouteStopGroups(',
              'export async function getRouteCatalog(',
              'function telemetryCity(',
              'function dedupeStops(',
          ]
          for token in required:
              if token not in text:
                  raise SystemExit(f'required token missing: {token}')

          path.write_text(text)
          after_lines = len(text.splitlines())
          print(f'src/lib/tdx.ts: {before_lines} -> {after_lines} lines')
          PY
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/lib/tdx/resolution-cache.test.ts
          src/lib/tdx-resolution.test.ts
          src/lib/tdx/upstream-data-client.test.ts
          src/lib/tdx/bounded-response.test.ts
          src/lib/tdx/circuit-breaker.test.ts
          src/lib/tdx/token-client.test.ts
          src/lib/tdx/error-classification.test.ts
          src/lib/tdx.test.ts
          src/routes/map-place-arrivals-contract.test.ts
          src/routes/map-journey-eta.test.ts
          src/routes/map-vehicles-read.test.ts
          src/routes/route-eta.test.ts
      - run: npm run check
      - run: git diff --check
      - name: Commit clean extraction
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/tdx.ts src/lib/tdx/resolution-cache.ts src/lib/tdx/resolution-cache.test.ts .github/workflows/ci.yml
          git diff --cached --check
          git commit -m "refactor(tdx): extract resolution cache boundary"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
