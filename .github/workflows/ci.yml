name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-map-route-catalog:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 125
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Integrate route catalog handler
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/routes/map.ts')
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one match, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          replace_once(
          """import {
            getActiveSnapshotVersion,
            getJourneyLegStopRefs,
            getSnapshotRouteCatalog,
            getSnapshotSchedule,
            getStopPlaceBundle,
            getStopPlaceRoutes,
          } from '../infrastructure/transit/snapshot-repository'
          """,
          """import {
            getJourneyLegStopRefs,
            getSnapshotSchedule,
            getStopPlaceBundle,
            getStopPlaceRoutes,
          } from '../infrastructure/transit/snapshot-repository'
          """,
          )
          replace_once(
              "import { fetchTDXJson, formatETALabel, getBusSchedule, getRouteCatalog, isRejectedUserTdxToken, isTDXRecordArray, resolveTDXJson, TDXServiceError, tdxCredentialScope, tdxRouteScope, tdxWarningFromError, type BusETAItem, type TDXEnv, type TDXWarning } from '../lib/tdx'",
              "import { fetchTDXJson, formatETALabel, getBusSchedule, isRejectedUserTdxToken, isTDXRecordArray, resolveTDXJson, TDXServiceError, tdxCredentialScope, tdxRouteScope, tdxWarningFromError, type BusETAItem, type TDXEnv, type TDXWarning } from '../lib/tdx'",
          )
          replace_once(
          """import {
            journeyEtaOutcome,
            mapRoutesOutcome,
            placeArrivalsOutcome,
            vehiclesOutcome,
          } from '../observability/map-api-outcomes'
          """,
          """import {
            journeyEtaOutcome,
            placeArrivalsOutcome,
            vehiclesOutcome,
          } from '../observability/map-api-outcomes'
          """,
          )
          replace_once(
              "import { readCityNetwork } from './map-network-read'\n",
              "import { readCityNetwork } from './map-network-read'\nimport { readRouteCatalog } from './map-route-catalog'\n",
          )
          replace_once(
          """map.get('/api/v1/map/routes', async (c) => {
            const tracker = beginMapOperation(c, 'map_routes', telemetryCity(c.req.query('city')?.trim()))
            try {
              const city = c.req.query('city')?.trim()
              if (!city || !supportedCityCodes.has(city)) throw new QueryValidationError('請選擇縣市')
              const snapshotRoutes = await getSnapshotRouteCatalog(c.env, city)
              const routes = snapshotRoutes.length ? snapshotRoutes : await getRouteCatalog(tdxEnv(c), city)
              const snapshotVersion = snapshotRoutes.length ? await getActiveSnapshotVersion(c.env, city) : null
              const response = c.json({
                schemaVersion: 2,
                city,
                source: snapshotRoutes.length ? 'snapshot' : 'tdx',
                snapshotVersion,
                routes,
              }, 200, {
                'Cache-Control': `public, max-age=${snapshotRoutes.length ? 86400 : 300}`,
              })
              tracker.complete({
                ...mapRoutesOutcome({
                  snapshotRouteCount: snapshotRoutes.length,
                  routeCount: routes.length,
                  snapshotVersion,
                }),
                httpStatus: 200,
                city: telemetryCity(city),
              })
              return response
            } catch (error) {
              return completeMapError(c, tracker, error, '路線目錄讀取失敗')
            }
          })
          """,
          """map.get('/api/v1/map/routes', readRouteCatalog)
          """,
          )

          path.write_text(text)
          PY
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/routes/map-route-catalog.test.ts
          src/routes/map-observability.test.ts
          src/routes/map-http-context.test.ts
          src/routes/map-route-reads.test.ts
          src/routes/map-network-read.test.ts
      - name: Run npm run check
        run: npm run check
      - name: Run git diff --check
        run: git diff --check
      - name: Commit clean extraction
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/routes/map.ts .github/workflows/ci.yml
          git commit -m "Wire Map route catalog handler"
          git push origin HEAD:agent/extract-map-route-catalog
