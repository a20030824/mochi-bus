name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect browser changes
    runs-on: ubuntu-latest
    outputs:
      browser: ${{ steps.filter.outputs.browser }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Detect browser-relevant changes
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            echo "browser=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          changed_files="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")"
          printf '%s\n' "${changed_files}"

          if grep -Eq '^(src/|web/|public/|test/e2e/|\.github/workflows/ci\.yml$|playwright\.config\.(ts|js|mjs|cjs)$|vite\.config\.(ts|js|mjs|cjs)$|wrangler\.(toml|jsonc?)$|package\.json$|package-lock\.json$)' <<< "${changed_files}"; then
            echo "browser=true" >> "${GITHUB_OUTPUT}"
          else
            echo "browser=false" >> "${GITHUB_OUTPUT}"
          fi

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Run quality checks
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee quality-check.log
      - name: Upload quality diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-check-log
          path: quality-check.log
          if-no-files-found: error
          retention-days: 7

  map-ui:
    name: Map UI regression
    needs: changes
    if: needs.changes.outputs.browser == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test desktop and touch interaction flows
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report/ui
        run: >-
          npx playwright test
          --project=desktop-chromium
          --project=mobile-touch
          --output=test-results/ui
          --reporter=line,html
      - name: Test isolated Worker module state
        env:
          PLAYWRIGHT_WORKER_STATEFUL: '1'
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report/stateful
        run: >-
          npx playwright test
          --project=worker-stateful-chromium
          --workers=1
          --output=test-results/stateful
          --reporter=line,html
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: map-ui-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  visual:
    name: Visual regression
    needs: changes
    if: needs.changes.outputs.browser == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Generate Linux visual baselines
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report/visual
        run: >-
          npx playwright test
          --project=visual-chromium
          --workers=1
          --update-snapshots
          --output=test-results/visual
          --reporter=line,html
      - name: Commit generated Linux baselines
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            test/e2e/map-visual.spec.ts-snapshots/*-linux.png \
            test/e2e/ui-visual.spec.ts-snapshots/*-linux.png
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'test(visual): add Linux screenshot baselines'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
      - name: Upload visual baselines and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-playwright-report
          path: |
            playwright-report/visual
            test-results/visual
            test/e2e/map-visual.spec.ts-snapshots/*-linux.png
            test/e2e/ui-visual.spec.ts-snapshots/*-linux.png
          if-no-files-found: error
          retention-days: 7
