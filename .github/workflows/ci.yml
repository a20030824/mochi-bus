name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sync-tdx-circuit-breaker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Merge latest main and restore canonical CI
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-edit origin/main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/lib/tdx/circuit-breaker.test.ts
          src/lib/tdx/token-client.test.ts
          src/lib/tdx/error-classification.test.ts
          src/lib/tdx.test.ts
          src/routes/map-place-arrivals-contract.test.ts
          src/routes/map-journey-eta.test.ts
          src/routes/map-vehicles-read.test.ts
          src/routes/route-eta.test.ts
      - run: npm run check
      - run: git diff --check
      - name: Push synchronized branch
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --quiet -- .github/workflows/ci.yml; then
            git add .github/workflows/ci.yml
            git diff --cached --check
            git commit -m "chore: restore canonical CI after main sync"
          fi
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
