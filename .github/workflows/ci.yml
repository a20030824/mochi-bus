name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # BEGIN ROUTE TIMETABLE IMPLEMENTATION
  implement-route-timetables:
    name: Implement route timetables
    if: github.event_name == 'pull_request' && github.head_ref == 'feat/route-timetables'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply staged timetable implementation
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          source = Path('.github/staging/route-timetables.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = dedent(source[start:end])
          script = script.replace(".write_text(r'''", ".write_text((r'''")
          script = script.replace(".replace('          ', '')", ".lstrip('\\n')")
          Path('/tmp/route-timetables.py').write_text(script)
          PY
          set +e
          python /tmp/route-timetables.py > /tmp/route-timetables-implementation.log 2>&1
          status=$?
          set -e
          cat /tmp/route-timetables-implementation.log
          exit "$status"
      - name: Upload implementation error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: route-timetable-implementation-error
          path: /tmp/route-timetables-implementation.log
          retention-days: 2
      - run: npm ci
      - name: Validate timetable implementation
        run: |
          set +e
          npm run check > /tmp/route-timetables-validation.log 2>&1
          status=$?
          set -e
          cat /tmp/route-timetables-validation.log
          exit "$status"
      - name: Upload validation error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: route-timetable-validation-error
          path: /tmp/route-timetables-validation.log
          retention-days: 2
      - name: Preserve generated sources for repair
        if: failure()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/domain/map/timetable.ts src/domain/map/timetable.test.ts src/routes/map.ts web/map/main.ts web/map/style.css test/e2e/map-timetable.spec.ts .github/workflows/ci.yml
          if ! git diff --cached --quiet; then
            git commit -m "wip(map): stage route timetable implementation"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Verify timetable flow
        run: npx playwright test test/e2e/map-timetable.spec.ts --reporter=line
      - name: Remove staging and temporary CI job
        run: |
          rm .github/staging/route-timetables.yml
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          start_marker = '  # BEGIN ROUTE TIMETABLE IMPLEMENTATION\n'
          end_marker = '  # END ROUTE TIMETABLE IMPLEMENTATION\n'
          start = text.index(start_marker)
          end = text.index(end_marker, start) + len(end_marker)
          path.write_text(text[:start] + text[end:])
          PY
      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "feat(map): add route timetables"
          git push origin HEAD:${{ github.head_ref }}
  # END ROUTE TIMETABLE IMPLEMENTATION

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check

  map-ui:
    name: Map UI regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test map camera and mobile entry UI
        run: npx playwright test test/e2e/map-camera-padding.spec.ts --reporter=line,html
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: map-ui-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Deploy production
    needs: [quality, map-ui]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
