name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integrate-tdx-bounded-response:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Integrate bounded response boundary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/tdx.ts')
          text = path.read_text()
          before_lines = len(text.splitlines())

          circuit_import = """import {
            createTDXCircuitBreaker,
            dataCircuitKey,
          } from './tdx/circuit-breaker'
          """
          bounded_import = """import {
            DEFAULT_TDX_JSON_MAX_RESPONSE_BYTES,
            TDX_ERROR_MAX_RESPONSE_BYTES,
            TDXPayloadTooLargeError,
            logTDXResponseSize,
            logTDXResponseTooLarge,
            parsedContentLength,
            readJsonResponse,
            readTextResponse,
            responseByteLimit,
            type TDXBoundedTextResponse,
            type TDXResponseObservation,
          } from './tdx/bounded-response'
          """
          if text.count(circuit_import) != 1:
              raise SystemExit(f'circuit import count={text.count(circuit_import)}')
          text = text.replace(circuit_import, circuit_import + bounded_import)

          type_start_marker = '// 共用憑證的 cache key 是 source + client_id + client_secret 的 SHA-256 指紋；\n'
          type_end_marker = 'type TDXUpstreamOutcome =\n'
          if text.count(type_start_marker) != 1 or text.count(type_end_marker) != 1:
              raise SystemExit('bounded type block anchors are not unique')
          type_start = text.index(type_start_marker)
          type_end = text.index(type_end_marker, type_start)
          text = text[:type_start] + text[type_end:]

          for line in [
              'const DEFAULT_TDX_JSON_MAX_RESPONSE_BYTES = 8 * 1024 * 1024\n',
              'const TDX_ERROR_MAX_RESPONSE_BYTES = 32 * 1024\n',
          ]:
              if text.count(line) != 1:
                  raise SystemExit(f'constant count for {line.strip()}={text.count(line)}')
              text = text.replace(line, '')

          implementation_start_marker = 'class TDXPayloadTooLargeError extends TDXServiceError {\n'
          implementation_end_marker = 'function tdxResponseResource(url: URL): string {\n'
          if text.count(implementation_start_marker) != 1 or text.count(implementation_end_marker) != 1:
              raise SystemExit('bounded implementation anchors are not unique')
          implementation_start = text.index(implementation_start_marker)
          implementation_end = text.index(implementation_end_marker, implementation_start)
          text = text[:implementation_start] + text[implementation_end:]

          content_length_start_marker = 'function parsedContentLength(value: string | null): number | undefined {\n'
          content_length_end_marker = 'function validPayload<T>(value: unknown, validate?: (value: unknown) => value is T): value is T {\n'
          if text.count(content_length_start_marker) != 1 or text.count(content_length_end_marker) != 1:
              raise SystemExit('Content-Length parser anchors are not unique')
          content_length_start = text.index(content_length_start_marker)
          content_length_end = text.index(content_length_end_marker, content_length_start)
          text = text[:content_length_start] + text[content_length_end:]

          forbidden = [
              "type TDXResponseSizeSource =",
              'type TDXResponseObservation =',
              'type TDXBoundedTextResponse =',
              'type TDXParsedJsonResponse =',
              'class TDXPayloadTooLargeError',
              'function normalizedResponseByteLimit(',
              'function responseByteLimit(',
              'async function readJsonResponse(',
              'async function readTextResponse(',
              'function logTDXResponseTooLarge(',
              'function logTDXResponseSize(',
              'function responseSizeBucket(',
              'function responseLimitUsageBucket(',
              'function parsedContentLength(',
          ]
          for token in forbidden:
              if token in text:
                  raise SystemExit(f'forbidden token remains: {token}')

          required = [
              'async function tdxResponseError(',
              'async function fetchTDXUpstream(',
              'function dataFlightKey(',
              'function joinSingleflight<T>(',
              'const dataFlights = new Map<string, Promise<TDXUpstreamOutcome>>()',
              'const tokenClient = createTDXTokenClient({',
              'readJsonResponse,',
              'logResponseSize: logTDXResponseSize,',
              'const maxResponseBytes = responseByteLimit(options.maxResponseBytes)',
              'const body: TDXBoundedTextResponse = await readTextResponse(',
          ]
          for token in required:
              if token not in text:
                  raise SystemExit(f'required token missing: {token}')

          path.write_text(text)
          after_lines = len(text.splitlines())
          print(f'src/lib/tdx.ts: {before_lines} -> {after_lines} lines')
          PY
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/lib/tdx/bounded-response.test.ts
          src/lib/tdx/token-client.test.ts
          src/lib/tdx/circuit-breaker.test.ts
          src/lib/tdx/error-classification.test.ts
          src/lib/tdx-resolution.test.ts
          src/lib/tdx.test.ts
          src/routes/map-place-arrivals-contract.test.ts
          src/routes/map-journey-eta.test.ts
          src/routes/map-vehicles-read.test.ts
          src/routes/route-eta.test.ts
      - run: npm run check
      - run: git diff --check
      - name: Commit clean extraction
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/tdx.ts src/lib/tdx/bounded-response.ts src/lib/tdx/bounded-response.test.ts .github/workflows/ci.yml
          git diff --cached --check
          git commit -m "refactor(tdx): extract bounded response boundary"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
