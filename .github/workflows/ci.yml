name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integrate-map-route-reads:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 123
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/extract-map-route-reads
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Integrate route read handlers
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/routes/map.ts')
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one match, found {count}: {old!r}')
              text = text.replace(old, new, 1)

          replace_once("import { buildRouteTimetable } from '../domain/map/timetable'\n", '')
          replace_once("import { getRouteMapVariants } from '../infrastructure/tdx/map'\n", '')
          replace_once(
              "  getJourneyLegStopRefs,\n  getSnapshotRouteVariants,\n",
              "  getJourneyLegStopRefs,\n",
          )
          replace_once(
              "import { readDirectRoutes, readTransferPlans } from './map-journey-plans'\n",
              "import { readDirectRoutes, readTransferPlans } from './map-journey-plans'\n"
              "import { readRouteMap, readRouteTimetable } from './map-route-reads'\n",
          )

          start = "map.get('/api/v1/map/route', async (c) => {"
          end = "map.get('/api/v1/map/network', async (c) => {"
          if text.count(start) != 1 or text.count(end) != 1:
              raise SystemExit('route/timetable boundary is not unique')
          start_index = text.index(start)
          end_index = text.index(end)
          if start_index >= end_index:
              raise SystemExit('route/timetable boundary order changed')
          text = (
              text[:start_index]
              + "map.get('/api/v1/map/route', readRouteMap)\n\n"
              + "map.get('/api/v1/map/timetable', readRouteTimetable)\n\n"
              + text[end_index:]
          )
          path.write_text(text)
          PY
      - run: npm ci --silent
      - name: Run focused contracts
        run: >-
          npx vitest run
          src/routes/map-route-reads.test.ts
          src/routes/map-http-context.test.ts
          src/routes/map-place-lookups.test.ts
          src/routes/map-journey-plans.test.ts
          src/routes/map-place-arrivals.test.ts
          src/routes/map-observability.test.ts
      - run: npm run check
      - run: git diff --check
      - name: Commit clean extraction
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/routes/map.ts .github/workflows/ci.yml
          git commit -m "Extract Map route read handlers"
          git push origin HEAD:agent/extract-map-route-reads
