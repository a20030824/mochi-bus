name: Apply route detail surface refactor

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refactor:
    if: github.head_ref == 'agent/extract-route-detail-surface'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply extraction
        run: node scripts/refactor-route-detail-surface.mjs
      - name: Focused presentation tests
        run: npx vitest run web/map/route-detail-presentation.test.ts
      - name: Full checks
        run: npm run check
      - name: Verify diff
        run: git diff --check
      - name: Commit clean refactor
        run: |
          rm scripts/refactor-route-detail-surface.mjs
          rm .github/workflows/refactor-route-detail-surface.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/map/main.ts web/map/main-size.test.ts web/map/route-detail-presentation.ts web/map/route-detail-presentation.test.ts web/map/route-detail-surface.ts scripts/refactor-route-detail-surface.mjs .github/workflows/refactor-route-detail-surface.yml
          git commit -m "refactor(map): extract route detail surface"
          git push origin HEAD:${{ github.head_ref }}
