name: Apply A7 exact smoke patch

on:
  push:
    branches:
      - agent/snapshot-rollback-authority
    paths:
      - .github/workflows/a7-exact-smoke-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/snapshot-rollback-authority
      - name: Pin rollback smoke to exact route variant
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/transit-snapshot/rollback.mjs')
          source = path.read_text()
          old = "        `/api/v1/map/route?city=${encodeURIComponent(city)}&route=${encodeURIComponent(evidence.sample.routeName)}&${cacheBust}`)"
          new = "        `/api/v1/map/route?city=${encodeURIComponent(city)}&route=${encodeURIComponent(evidence.sample.routeName)}&routeUid=${encodeURIComponent(evidence.sample.routeUid)}&patternId=${encodeURIComponent(evidence.sample.patternId)}&${cacheBust}`)"
          if old not in source and 'routeUid=${encodeURIComponent(evidence.sample.routeUid)}' not in source:
              raise SystemExit('rollback route smoke anchor mismatch')
          path.write_text(source.replace(old, new, 1))
          PY
          node --check scripts/transit-snapshot/rollback.mjs
          git diff --check
      - name: Commit exact smoke
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/transit-snapshot/rollback.mjs
          git commit -m "fix(snapshot): pin rollback smoke to exact variant [skip ci]"
          git push origin HEAD:agent/snapshot-rollback-authority
