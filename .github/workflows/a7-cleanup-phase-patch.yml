name: Apply A7 cleanup phase patch

on:
  push:
    branches:
      - agent/snapshot-rollback-authority
    paths:
      - .github/workflows/a7-cleanup-phase-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/snapshot-rollback-authority
      - name: Add durable cleanup phase
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          contract = Path('scripts/transit-snapshot/window-contract.mjs')
          source = contract.read_text()
          if "'snapshot_cleanup'," not in source:
              source = source.replace("  'snapshot_finalize',\n", "  'snapshot_finalize',\n  'snapshot_cleanup',\n", 1)
              source = source.replace("'stage', 'remote_validation', 'activate', 'smoke', 'rollback', 'finalize',\n", "'stage', 'remote_validation', 'activate', 'smoke', 'rollback', 'finalize', 'cleanup',\n", 1)
              contract.write_text(source)

          publisher = Path('scripts/sync-transit-snapshot.mjs')
          source = publisher.read_text()
          old = "    cleanup: async () => {\n      if (cleanupFile) await runD1(cleanupFile)"
          new = "    cleanup: async () => {\n      console.log(JSON.stringify(snapshotProgressMarker(CITY, 'cleanup', { lastSourceCheckAt, previousVersion })))\n      if (cleanupFile) await runD1(cleanupFile)"
          if old not in source and "snapshotProgressMarker(CITY, 'cleanup'" not in source:
              raise SystemExit('publisher cleanup anchor mismatch')
          source = source.replace(old, new, 1)
          publisher.write_text(source)

          test = Path('scripts/transit-snapshot/window-contract.test.mjs')
          source = test.read_text()
          old = "    expect(snapshotFailureClass('remote_validation')).toBe('snapshot_remote_validation')\n"
          new = old + "    expect(snapshotFailureClass('cleanup')).toBe('snapshot_cleanup')\n"
          if old not in source and "snapshotFailureClass('cleanup')" not in source:
              raise SystemExit('window contract test anchor mismatch')
          source = source.replace(old, new, 1)
          test.write_text(source)
          PY
          node --check scripts/transit-snapshot/window-contract.mjs
          node --check scripts/sync-transit-snapshot.mjs
          git diff --check
      - name: Commit cleanup phase
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/transit-snapshot/window-contract.mjs scripts/transit-snapshot/window-contract.test.mjs scripts/sync-transit-snapshot.mjs
          git commit -m "fix(snapshot): classify cleanup failures [skip ci]"
          git push origin HEAD:agent/snapshot-rollback-authority
