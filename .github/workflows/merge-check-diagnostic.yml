name: Merge check diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Capture complete check
        id: check
        continue-on-error: true
        run: |
          set -o pipefail
          npm run check 2>&1 | tee merge-check.log
      - name: Upload complete log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-check-log
          path: merge-check.log
          if-no-files-found: error
          retention-days: 1
      - name: Preserve check result
        if: always()
        env:
          CHECK_OUTCOME: ${{ steps.check.outcome }}
        run: test "$CHECK_OUTCOME" = success
