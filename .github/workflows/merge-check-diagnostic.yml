name: Fix Nearby origin boundary

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Copy readonly origin at Leaflet boundary
        run: python .github/fix-nearby-origin.py
      - run: npm ci --silent
      - run: npm run check
      - run: git diff --check
      - name: Commit origin fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/map/main.ts
          if ! git diff --cached --quiet; then
            git commit -m "fix(map): copy Nearby origin for Leaflet"
            git push
          fi
