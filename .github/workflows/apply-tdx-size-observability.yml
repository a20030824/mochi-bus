name: Apply TDX size observability

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/tdx-size-observability.py'
      - '.github/workflows/apply-tdx-size-observability.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/tdx-body-singleflight'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/tdx-body-singleflight
          fetch-depth: 0
      - name: Apply guarded observability changes
        run: python .github/tdx-size-observability.py
      - name: Install dependencies
        run: npm ci
      - name: Run focused tests
        run: npm test -- src/lib/tdx-resolution.test.ts src/lib/tdx.test.ts
      - name: Run full project check
        run: npm run check
      - name: Commit clean result
        run: |
          rm .github/tdx-size-observability.py
          rm .github/workflows/apply-tdx-size-observability.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/lib/tdx.ts src/lib/tdx-resolution.test.ts .github
          git commit -m "fix(tdx): observe response size limits"
          git push origin HEAD:agent/tdx-body-singleflight
