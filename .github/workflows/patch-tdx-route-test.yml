name: Patch TDX route catalog fixture

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          persist-credentials: true
      - name: Preserve last-write route catalog semantics
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('src/lib/tdx/bus-route-queries.test.ts')
          text = path.read_text()
          old = """      { RouteUID: 'R10', RouteName: { Zh_tw: '10' }, DepartureStopNameZh: '甲', DestinationStopNameZh: '乙' },
                { RouteUID: 'R2', RouteName: { Zh_tw: '2' }, DepartureStopNameZh: '丙', DestinationStopNameZh: '丁' },
                { RouteUID: 'R2', RouteName: { Zh_tw: '重複' } },
          """
          new = """      { RouteUID: 'R10', RouteName: { Zh_tw: '10' }, DepartureStopNameZh: '甲', DestinationStopNameZh: '乙' },
                { RouteUID: 'R2', RouteName: { Zh_tw: '重複' } },
                { RouteUID: 'R2', RouteName: { Zh_tw: '2' }, DepartureStopNameZh: '丙', DestinationStopNameZh: '丁' },
          """
          if text.count(old) != 1:
              raise SystemExit(f'fixture anchor count={text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          git rm .github/workflows/patch-tdx-route-test.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/tdx/bus-route-queries.test.ts
          git diff --cached --check
          git commit -m "test(tdx): preserve route catalog last-write semantics"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
