name: A6 production remediation

on:
  push:
    branches:
      - main
    paths:
      - .github/a6-remediation-2026-07-20

permissions:
  contents: read
  issues: write

concurrency:
  group: transit-snapshot
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Apply transit database migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply mochi-transit --remote
      - name: Republish Taipei and Tainan
        shell: bash
        env:
          SNAPSHOT_FORCE: '1'
          SNAPSHOT_WINDOW_TYPE: manual
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          failed=""
          for city in Taipei Tainan; do
            echo "::group::Publish $city"
            if ! npm run snapshot:window -- "$city"; then
              failed="$failed $city"
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "Production remediation failed for:$failed" >&2
            exit 1
          fi
      - name: Probe all public snapshot cities
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run snapshot:public-probe
      - name: Report remediation result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment 52 --body "A6 production remediation finished with **${JOB_STATUS}**. Run: ${RUN_URL}"
