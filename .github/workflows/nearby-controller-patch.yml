name: Nearby controller integration

on:
  push:
    branches:
      - refactor/nearby-places-controller
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply integration patch
        run: python .github/nearby-controller-patch.py
      - run: npm ci --silent
      - name: Run focused tests
        id: focused
        continue-on-error: true
        run: |
          set -o pipefail
          npx vitest run \
            web/map/nearby-places-controller.test.ts \
            web/map/nearby-places-view.test.ts \
            web/map/main-size.test.ts 2>&1 | tee /tmp/focused.log
      - name: Run complete check
        id: complete
        if: steps.focused.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run check 2>&1 | tee /tmp/complete.log
      - name: Check whitespace
        id: whitespace
        continue-on-error: true
        run: git diff --check
      - name: Commit integration result
        if: always()
        env:
          FOCUSED_OUTCOME: ${{ steps.focused.outcome }}
          COMPLETE_OUTCOME: ${{ steps.complete.outcome }}
          WHITESPACE_OUTCOME: ${{ steps.whitespace.outcome }}
        run: |
          if [ "$FOCUSED_OUTCOME" = success ] && [ "$COMPLETE_OUTCOME" = success ] && [ "$WHITESPACE_OUTCOME" = success ]; then
            rm .github/nearby-controller-patch.py
            rm .github/workflows/nearby-controller-patch.yml
            rm -f .github/nearby-controller-diagnostic.txt
            message="refactor(map): extract nearby places controller"
          else
            {
              echo "focused=$FOCUSED_OUTCOME"
              echo "complete=$COMPLETE_OUTCOME"
              echo "whitespace=$WHITESPACE_OUTCOME"
              echo
              cat /tmp/focused.log 2>/dev/null || true
              cat /tmp/complete.log 2>/dev/null || true
            } > .github/nearby-controller-diagnostic.txt
            message="chore: preserve nearby controller diagnostics"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$message"
          git push
          test "$FOCUSED_OUTCOME" = success
          test "$COMPLETE_OUTCOME" = success
          test "$WHITESPACE_OUTCOME" = success
