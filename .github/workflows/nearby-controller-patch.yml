name: Nearby controller integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Correct architecture line lock
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('web/map/main-size.test.ts')
          text = path.read_text()
          old = 'const MAP_MAIN_LINE_LIMIT = 1826'
          if text.count(old) != 1:
              raise RuntimeError('expected one line-limit match')
          path.write_text(text.replace(old, 'const MAP_MAIN_LINE_LIMIT = 1827', 1))
          PY
      - run: npm ci --silent
      - name: Run focused tests
        run: >-
          npx vitest run
          web/map/nearby-places-controller.test.ts
          web/map/nearby-places-view.test.ts
          web/map/main-size.test.ts
      - run: npm run check
      - run: git diff --check
      - name: Commit integrated slice
        run: |
          rm .github/nearby-controller-patch.py
          rm .github/nearby-controller-diagnostic.txt
          rm .github/workflows/nearby-controller-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(map): extract nearby places controller"
          git push
