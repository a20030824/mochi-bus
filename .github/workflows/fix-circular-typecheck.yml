name: Fix circular query type narrowing

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'fix/circular-journey-segments'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/circular-journey-segments
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Replace generic filter predicate
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('src/infrastructure/transit/snapshot-repository.ts')
          text = path.read_text()
          old = """  return checked.filter((row): row is ReachableLeg<T> => row !== null)
"""
          new = """  const reachable: Array<ReachableLeg<T>> = []
  for (const row of checked) {
    if (row) reachable.push(row)
  }
  return reachable
"""
          if old in text:
              path.write_text(text.replace(old, new))
          PY
      - run: npm ci --silent
      - run: npm run check
      - name: Commit source fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/infrastructure/transit/snapshot-repository.ts
          git diff --cached --quiet && exit 0
          git commit -m 'fix(map): narrow reachable circular legs safely'
          git push origin HEAD:fix/circular-journey-segments
