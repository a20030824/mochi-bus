name: Apply TDX singleflight identity hardening

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/apply-tdx-singleflight-key-hardening.py
      - .github/workflows/apply-tdx-singleflight-key-hardening.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch quietly
        run: |
          git clone --quiet --depth 1 --branch agent/tdx-body-singleflight \
            https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git repo

      - name: Apply guarded hardening
        working-directory: repo
        run: python .github/apply-tdx-singleflight-key-hardening.py

      - name: Install dependencies
        working-directory: repo
        run: npm ci

      - name: Run focused tests
        working-directory: repo
        run: npm test -- src/lib/tdx-resolution.test.ts

      - name: Run full project check
        working-directory: repo
        run: npm run check

      - name: Commit clean result
        working-directory: repo
        run: |
          rm .github/apply-tdx-singleflight-key-hardening.py
          rm .github/workflows/apply-tdx-singleflight-key-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(tdx): isolate singleflight cache policies"
          git push origin HEAD:agent/tdx-body-singleflight
