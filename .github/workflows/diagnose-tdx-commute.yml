name: Diagnose TDX commute presentation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Capture direct contracts
        shell: bash
        run: |
          set +e
          npx vitest run src/lib/tdx/commute-route-presentation.test.ts > COMMUTE_TESTS.txt 2>&1
          code=$?
          echo "exit_code=${code}" >> COMMUTE_TESTS.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: commute-presentation-tests
          path: COMMUTE_TESTS.txt
          if-no-files-found: error
          retention-days: 1
