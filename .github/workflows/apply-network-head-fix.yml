name: Apply network HEAD metadata fix

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-network-head-fix
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply network HEAD metadata fix
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one replacement, found {count}: {old!r}')
              file.write_text(text.replace(old, new), encoding='utf-8')

          replace_once(
              'scripts/transit-snapshot/active-probe.mjs',
              '    if (!networkHead || !networkArtifact || Number(networkHead.size) !== Number(networkArtifact.bytes)) {',
              '    if (!artifactHeadMatches(networkHead, networkArtifact)) {',
          )
          replace_once(
              'scripts/transit-snapshot/active-probe.mjs',
              '        && Number(network.size) === Number(networkArtifact.bytes)',
              '        && artifactHeadMatches(network, networkArtifact)',
          )
          replace_once(
              'scripts/transit-snapshot/active-probe.mjs',
              'function sameCoreCounts(manifestCounts, counts) {',
              '''export function artifactHeadMatches(head, artifact) {
  if (!head || !artifact) return false
  const expectedBytes = Number(artifact.bytes)
  if (!Number.isSafeInteger(expectedBytes) || expectedBytes < 1) return false
  const observedBytes = Number(head.size)
  return !Number.isSafeInteger(observedBytes) || observedBytes <= 0 || observedBytes === expectedBytes
}

function sameCoreCounts(manifestCounts, counts) {''',
          )
          replace_once(
              'scripts/transit-snapshot/active-probe.test.mjs',
              '  deterministicSampleCaseId,',
              '  artifactHeadMatches,\n  deterministicSampleCaseId,',
          )

          test = Path('scripts/transit-snapshot/active-probe.test.mjs')
          text = test.read_text(encoding='utf-8')
          text += '''

describe('network object HEAD metadata', () => {
  it('accepts active and previous network objects when HEAD omits Content-Length', async () => {
    const options = fixture()
    const original = options.r2.head
    options.r2.head = vi.fn(async (key) => key.endsWith('network.json')
      ? { size: null }
      : original(key))

    await expect(probeActiveSnapshot(options)).resolves.toMatchObject({
      activeProbeResult: 'success',
      rollbackAvailable: true,
      hardChecksPassed: 11,
    })
  })

  it('keeps exact byte checks when HEAD provides a trustworthy size', () => {
    expect(artifactHeadMatches({ size: null }, { bytes: 100 })).toBe(true)
    expect(artifactHeadMatches({ size: 0 }, { bytes: 100 })).toBe(true)
    expect(artifactHeadMatches({}, { bytes: 100 })).toBe(true)
    expect(artifactHeadMatches({ size: 100 }, { bytes: 100 })).toBe(true)
    expect(artifactHeadMatches({ size: 99 }, { bytes: 100 })).toBe(false)
    expect(artifactHeadMatches(null, { bytes: 100 })).toBe(false)
    expect(artifactHeadMatches({ size: 100 }, { bytes: 0 })).toBe(false)
  })
})
'''
          test.write_text(text, encoding='utf-8')
          PY
      - run: npm ci
      - name: Run targeted checks
        run: |
          node --check scripts/transit-snapshot/active-probe.mjs
          npx vitest run scripts/transit-snapshot/active-probe.test.mjs
      - name: Run full checks
        run: npm run check
      - name: Commit verified fix and self-remove
        shell: bash
        run: |
          rm .github/workflows/apply-network-head-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/transit-snapshot/active-probe.mjs scripts/transit-snapshot/active-probe.test.mjs .github/workflows/apply-network-head-fix.yml
          git commit -m "fix(snapshot): tolerate missing network HEAD size"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
