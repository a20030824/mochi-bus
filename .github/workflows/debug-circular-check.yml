name: Debug circular query typecheck

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'fix/circular-journey-segments'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/circular-journey-segments
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Capture TypeScript output
        run: npm run typecheck > typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: circular-typecheck
          path: typecheck.log
          if-no-files-found: error
      # Temporary diagnostic workflow; removed after the source fix is verified.
