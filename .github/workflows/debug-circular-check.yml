name: Debug circular query checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'fix/circular-journey-segments'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/circular-journey-segments
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Cloudflare typegen check
        run: npm run cf-typegen:check
      - name: Unit tests
        run: npm test -- --reporter=verbose
      - name: TypeScript
        run: npm run typecheck
      - name: Vite build
        run: npm run build:map
      - name: Wrangler dry-run
        run: npx wrangler deploy --dry-run
