name: Patch watchdog telemetry status

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/patch-watchdog-telemetry.yml
      - .github/watchdog-telemetry-patch

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
      - name: Add the telemetry enum and semantic validator
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/observability/telemetry.ts')
          source = path.read_text(encoding='utf-8')
          if "  'published_rollback_degraded'," in source:
              print('Telemetry status already patched')
              raise SystemExit(0)

          replacements = [
              (
                  "export const telemetryWatchdogStatuses = [\n  'published',\n  'unchanged_healthy',",
                  "export const telemetryWatchdogStatuses = [\n  'published',\n  'published_rollback_degraded',\n  'unchanged_healthy',",
              ),
              (
                  "  const degraded = status === 'unchanged_rollback_degraded' || status === 'failed_active_healthy'",
                  "  const degraded = status === 'published_rollback_degraded'\n    || status === 'unchanged_rollback_degraded'\n    || status === 'failed_active_healthy'",
              ),
              (
                  "  if (status === 'published'\n    && !(value.windowResult === 'published' && value.probeResult === 'success')) return false\n",
                  "  if (status === 'published'\n    && !(value.windowResult === 'published' && value.probeResult === 'success')) return false\n  if (status === 'published_rollback_degraded'\n    && !(value.windowResult === 'published'\n      && value.probeResult === 'degraded'\n      && value.rollbackAvailable === false)) return false\n",
              ),
          ]
          for old, new in replacements:
              if source.count(old) != 1:
                  raise SystemExit(f'Expected one telemetry anchor, found {source.count(old)}: {old!r}')
              source = source.replace(old, new, 1)
          path.write_text(source, encoding='utf-8')
          PY
      - name: Commit the generated edit
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- src/observability/telemetry.ts; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/observability/telemetry.ts
          git commit -m "fix(snapshot): align watchdog telemetry status"
          git push origin HEAD:${{ github.head_ref }}
