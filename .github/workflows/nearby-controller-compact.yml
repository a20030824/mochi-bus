name: Compact Nearby controller wiring

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  compact:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Compact app-shell wiring
        run: |
          if grep -q 'type NearbyPlacesController' web/map/main.ts; then
            python .github/nearby-controller-compact.py
          fi
      - run: npm ci --silent
      - name: Run focused tests
        run: >-
          npx vitest run
          web/map/nearby-places-controller.test.ts
          web/map/nearby-places-view.test.ts
          web/map/main-size.test.ts
      - name: Run complete check
        id: complete
        continue-on-error: true
        run: |
          set -o pipefail
          npm run check 2>&1 | tee /tmp/complete.log
      - name: Check whitespace
        id: whitespace
        continue-on-error: true
        run: git diff --check
      - name: Preserve compact wiring and diagnostics
        if: always()
        env:
          COMPLETE_OUTCOME: ${{ steps.complete.outcome }}
          WHITESPACE_OUTCOME: ${{ steps.whitespace.outcome }}
        run: |
          {
            echo "complete=$COMPLETE_OUTCOME"
            echo "whitespace=$WHITESPACE_OUTCOME"
            echo
            cat /tmp/complete.log 2>/dev/null || true
          } > .github/nearby-controller-compact-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/map/main.ts web/map/main-size.test.ts .github/nearby-controller-compact-diagnostic.txt
          if ! git diff --cached --quiet; then
            git commit -m "refactor(map): compact nearby controller wiring"
            git push
          fi
          test "$COMPLETE_OUTCOME" = success
          test "$WHITESPACE_OUTCOME" = success
