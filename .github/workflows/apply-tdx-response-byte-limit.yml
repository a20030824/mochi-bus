name: Apply TDX response byte limit

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/tdx-response-byte-limit.patch
      - .github/workflows/apply-tdx-response-byte-limit.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tdx-response-byte-limit
          fetch-depth: 0

      - name: Apply focused patch
        run: |
          git apply --check .github/tdx-response-byte-limit.patch
          git apply .github/tdx-response-byte-limit.patch

      - name: Install dependencies
        run: npm ci

      - name: Run focused tests
        run: npm test -- src/lib/tdx-resolution.test.ts src/infrastructure/tdx/stop-arrivals.test.ts src/routes/map-place-arrivals.test.ts

      - name: Run full project check
        run: npm run check

      - name: Commit clean result
        run: |
          rm .github/tdx-response-byte-limit.patch
          rm .github/workflows/apply-tdx-response-byte-limit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(tdx): bound response body size"
          git push origin HEAD:agent/tdx-response-byte-limit
