name: Apply mobile camera padding fix

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Fix exact camera call sites
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('web/map/main.ts')
          text = path.read_text()
          old = """        activeCity = city
              if (routeName) {
"""
          new = """        activeCity = city
        map.setView(city.center, 11)
        if (routeName) {
"""
          if text.count(old) != 1:
              raise RuntimeError('deep-link camera anchor mismatch')
          text = text.replace(old, new, 1)
          old = """  selectedDirectIndex = 0
  map.setView(city.center, 11)
  setDocumentTitle(`${city.name}公車地圖`)
"""
          new = """  selectedDirectIndex = 0
  setDocumentTitle(`${city.name}公車地圖`)
"""
          if text.count(old) != 1:
              raise RuntimeError('chooseCity camera anchor mismatch')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/apply-mobile-camera-padding.yml').unlink()
          Path('.github/workflows/cleanup-mobile-camera-patch.yml').unlink()
          PY
      - run: npm ci --silent
      - run: npm run check
      - name: Commit verified cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(map): target drawer-aware city camera"
          git push origin HEAD:fix/mobile-city-camera-padding
