name: Apply mobile camera padding fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/mobile-city-camera-padding'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: python3 scripts/apply-mobile-camera-padding.py
      - run: rm scripts/apply-mobile-camera-padding.py .github/workflows/apply-mobile-camera-padding.yml
      - run: npm ci --silent
      - run: npm run check
      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(map): keep city camera clear of mobile drawer"
          git push origin HEAD:fix/mobile-city-camera-padding
