name: Diagnose A6 Taipei run

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-a6-taipei-run.yml

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download failed publisher log
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          curl --fail --location --silent --show-error
          -H 'Accept: application/vnd.github+json'
          -H "Authorization: Bearer $GH_TOKEN"
          -H 'X-GitHub-Api-Version: 2022-11-28'
          'https://api.github.com/repos/a20030824/mochi-bus/actions/jobs/88238189493/logs'
          --output failed-job.log
      - name: Show publisher failure
        run: >-
          grep -Ei 'error|exception|failed|failure|quota|limit|exceed|too many|d1|sqlite|validation|snapshot publication|rollback|routes-without-pattern'
          failed-job.log | tail -n 30
