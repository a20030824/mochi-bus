name: Apply A7 authority test coverage

on:
  push:
    branches:
      - agent/snapshot-rollback-authority
    paths:
      - .github/workflows/a7-authority-tests-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/snapshot-rollback-authority
      - name: Insert authority regressions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/transit-snapshot/rollback-operations.test.mjs')
          source = path.read_text()
          marker = "  it('fails before mutation when D1 and R2 authority diverge', async () => {"
          block = """  it('supports consecutive rollback by swapping active and previous', async () => {
            let activeVersion = 'v2'
            let state = { schemaVersion: 2, version: 'v2', previousVersion: 'v1' }
            const options = {
              city: 'Taipei',
              readAuthority: vi.fn(async () => ({ activeVersion, importedAt: '2026-07-21T00:00:00.000Z' })),
              readState: vi.fn(async () => state),
              validateVersion: vi.fn(async (version) => validated(version)),
              transition: vi.fn(async ({ expectedVersion, targetVersion }) => {
                if (activeVersion !== expectedVersion) return false
                activeVersion = targetVersion
                return true
              }),
              smoke: vi.fn(async () => undefined),
              writeState: vi.fn(async (value) => { state = value }),
              now: () => new Date('2026-07-22T00:00:00.000Z'),
            }
            await expect(executeRollback(options)).resolves.toMatchObject({ activeVersion: 'v1', previousVersion: 'v2' })
            await expect(executeRollback(options)).resolves.toMatchObject({ activeVersion: 'v2', previousVersion: 'v1' })
            expect(options.transition).toHaveBeenCalledTimes(2)
            expect(state).toMatchObject({ version: 'v2', previousVersion: 'v1' })
          })

"""
          if 'supports consecutive rollback by swapping active and previous' not in source:
            if marker not in source:
              raise SystemExit('consecutive rollback marker missing')
            source = source.replace(marker, block + marker, 1)

          marker = "  it('is idempotent and skips an identical state write', async () => {"
          block = """  it('does not write when D1 authority changes after validation', async () => {
            const readAuthority = vi.fn()
              .mockResolvedValueOnce({ activeVersion: 'v2', importedAt: '2026-07-21T00:00:00.000Z' })
              .mockResolvedValueOnce({ activeVersion: 'v3', importedAt: '2026-07-22T00:00:00.000Z' })
            const options = reconcileHarness({ explicitPrevious: 'v1', readAuthority })
            await expect(executeReconcile(options)).rejects.toMatchObject({ code: 'authority_mismatch' })
            expect(options.writeState).not.toHaveBeenCalled()
          })

"""
          if 'does not write when D1 authority changes after validation' not in source:
            if marker not in source:
              raise SystemExit('reconcile race marker missing')
            source = source.replace(marker, block + marker, 1)
          path.write_text(source)

          path = Path('scripts/transit-snapshot/rollback-authority.test.mjs')
          source = path.read_text()
          marker = "    expect(() => resolveRollbackAuthority({ city: 'Taipei', state: { schemaVersion: 2, version: 'v0' }, d1ActiveVersion: 'v1' }))"
          block = """    expect(() => resolveRollbackAuthority({ city: 'Taipei', state: { schemaVersion: 1, version: 'v1' }, d1ActiveVersion: 'v1' }))
              .toThrowError(expect.objectContaining({ code: 'state_invalid' }))
"""
          if 'schemaVersion: 1' not in source:
            if marker not in source:
              raise SystemExit('invalid state marker missing')
            source = source.replace(marker, block + marker, 1)
          path.write_text(source)
          PY
          node --check scripts/transit-snapshot/rollback-operations.test.mjs
          node --check scripts/transit-snapshot/rollback-authority.test.mjs
          git diff --check
      - name: Commit test coverage
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/transit-snapshot/rollback-operations.test.mjs scripts/transit-snapshot/rollback-authority.test.mjs
          git commit -m "test(snapshot): cover repeated and raced authority operations [skip ci]"
          git push origin HEAD:agent/snapshot-rollback-authority
