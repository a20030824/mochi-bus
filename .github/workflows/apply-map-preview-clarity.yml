name: Apply map preview clarity

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'fix/map-preview-clarity'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/map-preview-clarity
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Reduce preview clutter and selected-card weight
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              return text.replace(old, new, 1)

          main_path = Path('web/map/main.ts')
          main = main_path.read_text()
          replacements = [
              (
                  "        pane: 'previewDotPane', radius, weight, color: '#fffaf0', fillColor: color, fillOpacity: .6,\n        interactive: false,",
                  "        pane: 'previewDotPane', radius, weight, color: '#fffaf0', fillColor: color, fillOpacity: .6,\n        className: 'preview-stop-dot',\n        interactive: false,",
                  'preview dot class',
              ),
              (
                  "    if (selected) {\n      const selectedNote = document.createElement('small')\n      selectedNote.className = 'direct-route-selected-note'\n      selectedNote.textContent = '目前預覽'\n      button.appendChild(selectedNote)\n    }\n",
                  "",
                  'selected note',
              ),
              (
                  "} {\n  const { line: fullLine, target: fullLineTarget } = bindSelectableLine(variant.shape, 'routePreviewPane', previewLayer, {\n    color, weight: 3.5, opacity: .2, lineCap: 'round', lineJoin: 'round',\n  })",
                  "} {\n  const selected = options.selected !== false\n  const { line: fullLine, target: fullLineTarget } = bindSelectableLine(variant.shape, 'routePreviewPane', previewLayer, {\n    color, weight: selected ? 3.5 : 2.5, opacity: selected ? .18 : .08, lineCap: 'round', lineJoin: 'round',\n  })",
                  'preview base style',
              ),
              (
                  "        weight: options.selected === false ? 5 : 7,\n        opacity: options.selected === false ? .38 : .92,",
                  "        weight: selected ? 7 : 4,\n        opacity: selected ? .92 : .26,",
                  'preview segment style',
              ),
              (
                  "  if (board && alight) {\n    addPreviewStopDots(variant.stops, color, previewLayer)",
                  "  if (board && alight && selected) {\n    addPreviewStopDots(variant.stops, color, previewLayer)",
                  'selected preview details',
              ),
          ]
          for old, new, label in replacements:
              main = replace_once(main, old, new, label)
          main_path.write_text(main)

          style_path = Path('web/map/style.css')
          style = style_path.read_text()
          style_replacements = [
              (
                  ".direct-route-card.selected { border-color: #292a25; border-left-color: var(--route-color); box-shadow: 0 0 0 2px rgba(41, 42, 37, .12); }",
                  ".direct-route-card.selected { border-color: #b8ad99; border-left-color: var(--route-color); background: #f4efe4; }",
                  'direct selected style',
              ),
              (
                  ".direct-route-selected-note { color: #4f685b !important; font-weight: 750; }\n",
                  "",
                  'selected note style',
              ),
              (
                  ".transfer-plan.selected { border-color: #292a25; box-shadow: 0 0 0 2px rgba(41, 42, 37, .12); }",
                  ".transfer-plan.selected { border-color: #b8ad99; background: #f4efe4; }",
                  'transfer selected style',
              ),
          ]
          for old, new, label in style_replacements:
              style = replace_once(style, old, new, label)
          style_path.write_text(style)

          test_path = Path('test/e2e/map-direct.spec.ts')
          test = test_path.read_text()
          anchor = "    await expect(cards.nth(1).locator('.direct-route-select')).toHaveAttribute('aria-pressed', 'false')\n    await expect(page.getByRole('heading', { name: '起點 → 終點', exact: true })).toBeVisible()"
          addition = "    await expect(cards.nth(1).locator('.direct-route-select')).toHaveAttribute('aria-pressed', 'false')\n    await expect.poll(() => routeDetailCalls.length).toBe(2)\n    await expect(page.locator('.direct-route-selected-note')).toHaveCount(0)\n    const journeyLabels = page.locator('.leaflet-tooltip').filter({ hasText: /^(上車|下車) · / })\n    await expect(journeyLabels).toHaveCount(2)\n    await expect(page.locator('.preview-stop-dot')).toHaveCount(3)\n    await expect.poll(() => cards.nth(0).evaluate((card) => getComputedStyle(card).boxShadow)).toBe('none')\n    await expect.poll(async () => {\n      const selectedBackground = await cards.nth(0).evaluate((card) => getComputedStyle(card).backgroundColor)\n      const candidateBackground = await cards.nth(1).evaluate((card) => getComputedStyle(card).backgroundColor)\n      return selectedBackground !== candidateBackground\n    }).toBe(true)\n    await expect(page.getByRole('heading', { name: '起點 → 終點', exact: true })).toBeVisible()"
          test = replace_once(test, anchor, addition, 'initial clarity assertions')
          anchor = "    await expect.poll(() => routeDetailCalls.length).toBe(4)\n\n    const zoomIn"
          addition = "    await expect.poll(() => routeDetailCalls.length).toBe(4)\n    await expect(journeyLabels).toHaveCount(2)\n    await expect(page.locator('.preview-stop-dot')).toHaveCount(3)\n    await expect(page.locator('.direct-route-selected-note')).toHaveCount(0)\n    await expect.poll(() => cards.nth(1).evaluate((card) => getComputedStyle(card).boxShadow)).toBe('none')\n\n    const zoomIn"
          test = replace_once(test, anchor, addition, 'selected candidate clarity assertions')
          test_path.write_text(test)
          PY
      - run: npm ci
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test test/e2e/map-direct.spec.ts test/e2e/map-transfer-keyboard.spec.ts
      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/map/main.ts web/map/style.css test/e2e/map-direct.spec.ts
          git commit -m "fix(map): reduce journey preview clutter"
          git push origin HEAD:fix/map-preview-clarity
