name: Sync transit snapshots

on:
  schedule:
    # 每天跑,城市按星期分片(見下方 case):
    # 單日 D1 寫入量才不會超過免費方案 10 萬列/天的額度。
    - cron: '17 19 * * *'
  workflow_dispatch:
    inputs:
      city:
        description: TDX city code
        required: true
        default: Chiayi

concurrency:
  group: transit-snapshot
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Write local TDX credentials
        shell: bash
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: |
          printf 'TDX_CLIENT_ID=%s\nTDX_CLIENT_SECRET=%s\n' \
            "$TDX_CLIENT_ID" \
            "$TDX_CLIENT_SECRET" > .dev.vars
      - name: Build and publish snapshot
        shell: bash
        env:
          INPUT_CITY: ${{ inputs.city }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$INPUT_CITY" ]; then
            cities="$INPUT_CITY"
            # 手動觸發視為要求重匯,略過「內容未變更就跳過」檢查
            export SNAPSHOT_FORCE=1
          else
            # 城市分片:之後加新城市時掛到還有空位的星期,
            # 大城市(台北/新北)一定要獨占一天。1=週一 … 7=週日
            case "$(date -u +%u)" in
              1) cities="Chiayi" ;;
              2) cities="Tainan" ;;
              3) cities="ChiayiCounty" ;;
              5) cities="YunlinCounty" ;;
              *) cities="" ;;
            esac
          fi
          if [ -z "$cities" ]; then
            echo "今天沒有排程的城市"
            exit 0
          fi
          for city in $cities; do
            npm run snapshot:city -- "$city"
          done
