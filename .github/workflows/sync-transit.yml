name: Sync transit snapshots

on:
  schedule:
    # 每天跑,城市按星期分片(見下方 case):
    # 單日 D1 寫入量才不會超過免費方案 10 萬列/天的額度。
    - cron: '17 19 * * *'
  workflow_dispatch:
    inputs:
      city:
        description: TDX city code
        required: true
        default: Chiayi
      force_publish:
        description: Publish even when the source hash is unchanged
        required: true
        type: boolean
        default: false
      window_type:
        description: Attach this run to the latest scheduled window or an explicit manual window
        required: true
        type: choice
        options:
          - scheduled
          - manual
        default: scheduled
      window_date:
        description: Optional Asia/Taipei date (YYYY-MM-DD); required for legacy previous repair
        required: false
      repair_legacy_previous:
        description: Require exact degraded preflight and healthy rollback postflight
        required: true
        type: boolean
        default: false
      expected_active:
        description: Exact active snapshot version expected before legacy previous repair
        required: false
      expected_previous:
        description: Exact legacy previous snapshot version expected before repair
        required: false

concurrency:
  group: transit-snapshot
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Apply transit database migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply mochi-transit --remote
      - name: Build and publish snapshot
        shell: bash
        env:
          INPUT_CITY: ${{ inputs.city }}
          INPUT_FORCE_PUBLISH: ${{ inputs.force_publish }}
          INPUT_REPAIR_LEGACY_PREVIOUS: ${{ inputs.repair_legacy_previous }}
          INPUT_EXPECTED_ACTIVE: ${{ inputs.expected_active }}
          INPUT_EXPECTED_PREVIOUS: ${{ inputs.expected_previous }}
          SNAPSHOT_WINDOW_TYPE: ${{ inputs.window_type }}
          SNAPSHOT_WINDOW_DATE: ${{ inputs.window_date }}
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          repair_mode="${INPUT_REPAIR_LEGACY_PREVIOUS:-false}"

          if [ -n "$INPUT_CITY" ]; then
            cities="$INPUT_CITY"
            if [ "$INPUT_FORCE_PUBLISH" = "true" ]; then
              export SNAPSHOT_FORCE=1
            fi
            if [ "$repair_mode" = "true" ]; then
              if [[ "$INPUT_CITY" =~ [[:space:]] ]]; then
                echo 'Legacy previous repair accepts exactly one city' >&2
                exit 1
              fi
              if [ "$INPUT_FORCE_PUBLISH" != "true" ]; then
                echo 'Legacy previous repair requires force_publish=true' >&2
                exit 1
              fi
              if [ "$SNAPSHOT_WINDOW_TYPE" != "manual" ]; then
                echo 'Legacy previous repair requires window_type=manual' >&2
                exit 1
              fi
              if [ -z "$SNAPSHOT_WINDOW_DATE" ]; then
                echo 'Legacy previous repair requires an explicit window_date' >&2
                exit 1
              fi
              npm run snapshot:repair-legacy-previous -- \
                preflight "$INPUT_CITY" "$INPUT_EXPECTED_ACTIVE" "$INPUT_EXPECTED_PREVIOUS" "$SNAPSHOT_WINDOW_DATE"
            fi
          else
            if [ "$repair_mode" = "true" ]; then
              echo 'Scheduled runs cannot enable legacy previous repair' >&2
              exit 1
            fi
            # 城市分片:單日 D1 寫入量要留在額度內,大城市獨占或成對一天、小縣市成組。
            # 內容沒變的城市會被 hash 檢查跳過,實際寫入只發生在資料有更新的日子。
            # 1=週一 … 7=週日(UTC)
            cities="$(node scripts/transit-snapshot/scheduled-cities.mjs)"
          fi
          if [ -z "$cities" ]; then
            echo "今天沒有排程的城市"
            exit 0
          fi
          failed=""
          for city in $cities; do
            if ! npm run snapshot:window -- "$city"; then
              failed="$failed $city"
            fi
          done
          node scripts/transit-snapshot/window-summary.mjs $cities
          if [ -n "$failed" ]; then
            echo "Snapshot publication failed for:$failed" >&2
            exit 1
          fi
          if [ "$repair_mode" = "true" ]; then
            npm run snapshot:repair-legacy-previous -- \
              postflight "$INPUT_CITY" "$INPUT_EXPECTED_ACTIVE" "$INPUT_EXPECTED_PREVIOUS" "$SNAPSHOT_WINDOW_DATE"
          fi
