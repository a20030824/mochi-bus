name: Sync transit snapshots

on:
  schedule:
    - cron: '17 19 * * 0'
  workflow_dispatch:
    inputs:
      city:
        description: TDX city code
        required: true
        default: Chiayi

concurrency:
  group: transit-snapshot
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Write local TDX credentials
        shell: bash
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: |
          printf 'TDX_CLIENT_ID=%s\nTDX_CLIENT_SECRET=%s\n' \
            "$TDX_CLIENT_ID" \
            "$TDX_CLIENT_SECRET" > .dev.vars
      - name: Build and publish snapshot
        shell: bash
        env:
          INPUT_CITY: ${{ inputs.city }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$INPUT_CITY" ]; then
            cities="$INPUT_CITY"
          else
            cities="Chiayi ChiayiCounty YunlinCounty"
          fi
          for city in $cities; do
            npm run snapshot:city -- "$city"
          done
