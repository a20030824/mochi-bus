name: One-shot route timetables

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  implement:
    if: github.head_ref == 'feat/route-timetables'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/route-timetables
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Implement timetable data and UI
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str):
              p = Path(path)
              text = p.read_text()
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected one match, found {text.count(old)}')
              p.write_text(text.replace(old, new, 1))

          Path('src/domain/map/timetable.ts').write_text(r'''import type { Direction } from '../bus-query'
          import type { ScheduleFrequency, ScheduleItem, ScheduleStopTime, ScheduleTimetable } from '../schedule'

          const DAY_KEYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'] as const
          const DAY_LABELS = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'] as const

          export type TimetableStop = {
            stopUid: string
            stopName: string
            sequence: number
            hasTimes: boolean
          }

          export type TimetablePeriod = {
            startTime: string
            endTime: string
            minHeadwayMinutes: number
            maxHeadwayMinutes: number
          }

          export type TimetableService = {
            id: string
            label: string
            days: number[]
            today: boolean
            times: string[]
            periods: TimetablePeriod[]
            firstTime: string | null
            lastTime: string | null
          }

          export type RouteTimetable = {
            mode: 'stop' | 'departure' | 'frequency' | 'none'
            selectedStop: Omit<TimetableStop, 'hasTimes'> | null
            departureStop: Omit<TimetableStop, 'hasTimes'> | null
            stops: TimetableStop[]
            timedStopCount: number
            services: TimetableService[]
          }

          export type TimetableVariant = {
            direction: Direction
            subRouteUid?: string
            stops: Array<{ stopUid: string; stopName: string; sequence: number }>
          }

          type ServiceBuilder = {
            days: number[]
            times: Set<string>
            periods: Map<string, TimetablePeriod>
          }

          export function buildRouteTimetable(
            schedules: ScheduleItem[],
            variant: TimetableVariant,
            requestedStopUid?: string,
            now = new Date(),
          ): RouteTimetable {
            const stops = variant.stops.slice().sort((a, b) => a.sequence - b.sequence)
            const directionMatches = schedules.filter((item) => item.Direction === variant.direction)
            const exactMatches = directionMatches.filter((item) =>
              !variant.subRouteUid || !item.SubRouteUID || item.SubRouteUID === variant.subRouteUid)
            const matched = exactMatches.some(hasScheduleData) ? exactMatches : directionMatches

            const timedStops = new Set(stops
              .filter((stop) => matched.some((item) => item.Timetables?.some((table) => timesForStop(table, stop).length)))
              .map((stop) => stop.stopUid))
            const stopModels = stops.map((stop) => ({ ...stop, hasTimes: timedStops.has(stop.stopUid) }))
            const selected = stops.find((stop) => stop.stopUid === requestedStopUid) ?? stops[0] ?? null
            const hasSelectedTimes = selected
              ? matched.some((item) => item.Timetables?.some((table) => timesForStop(table, selected).length))
              : false
            const hasAnyTimes = matched.some((item) => item.Timetables?.some((table) => Boolean(earliestTime(table))))
            const hasFrequency = matched.some((item) => item.Frequencys?.some(validFrequency))
            const mode: RouteTimetable['mode'] = timedStops.size >= 2 && hasSelectedTimes
              ? 'stop'
              : hasAnyTimes
                ? 'departure'
                : hasFrequency ? 'frequency' : 'none'

            const builders = new Map<string, ServiceBuilder>()
            const ensureBuilder = (serviceDay?: Record<string, number>) => {
              const days = serviceDays(serviceDay)
              const id = days.length ? days.join('-') : 'unspecified'
              let builder = builders.get(id)
              if (!builder) {
                builder = { days, times: new Set(), periods: new Map() }
                builders.set(id, builder)
              }
              return builder
            }

            for (const item of matched) {
              if (mode === 'stop' || mode === 'departure') {
                for (const table of item.Timetables ?? []) {
                  const builder = ensureBuilder(table.ServiceDay)
                  const values = mode === 'stop' && selected
                    ? timesForStop(table, selected)
                    : [earliestTime(table)].filter((value): value is string => Boolean(value))
                  values.forEach((value) => builder.times.add(value))
                }
              }
              if (mode === 'frequency') {
                for (const frequency of item.Frequencys ?? []) {
                  const period = normalizeFrequency(frequency)
                  if (!period) continue
                  const builder = ensureBuilder(frequency.ServiceDay)
                  builder.periods.set(`${period.startTime}-${period.endTime}-${period.minHeadwayMinutes}-${period.maxHeadwayMinutes}`, period)
                }
              }
            }

            const todayIndex = taipeiDayIndex(now)
            const services = [...builders.entries()].map(([id, builder]): TimetableService => {
              const times = [...builder.times].sort(compareTimes)
              const periods = [...builder.periods.values()].sort((a, b) => compareTimes(a.startTime, b.startTime))
              return {
                id,
                label: serviceDayLabel(builder.days),
                days: builder.days,
                today: builder.days.includes(todayIndex),
                times,
                periods,
                firstTime: times[0] ?? periods[0]?.startTime ?? null,
                lastTime: times.at(-1) ?? periods.at(-1)?.endTime ?? null,
              }
            }).filter((service) => service.times.length || service.periods.length)
              .sort((a, b) => Number(b.today) - Number(a.today) || (a.days[0] ?? 8) - (b.days[0] ?? 8))

            const departure = stops[0] ?? null
            return {
              mode,
              selectedStop: selected ? stripHasTimes(selected) : null,
              departureStop: departure ? stripHasTimes(departure) : null,
              stops: stopModels,
              timedStopCount: timedStops.size,
              services,
            }
          }

          function hasScheduleData(item: ScheduleItem): boolean {
            return Boolean(item.Timetables?.some((table) => Boolean(earliestTime(table)))
              || item.Frequencys?.some(validFrequency))
          }

          function stripHasTimes(stop: { stopUid: string; stopName: string; sequence: number }) {
            return { stopUid: stop.stopUid, stopName: stop.stopName, sequence: stop.sequence }
          }

          function timeValue(value?: string): number | null {
            if (!value || !/^\d{2}:\d{2}$/.test(value)) return null
            const [hour, minute] = value.split(':').map(Number)
            if (!Number.isFinite(hour) || !Number.isFinite(minute) || minute > 59) return null
            return hour * 60 + minute
          }

          function compareTimes(a: string, b: string): number {
            return (timeValue(a) ?? Number.POSITIVE_INFINITY) - (timeValue(b) ?? Number.POSITIVE_INFINITY)
          }

          function stopTimeValue(stop: ScheduleStopTime): string | null {
            const value = stop.ArrivalTime ?? stop.DepartureTime
            return timeValue(value) === null ? null : value ?? null
          }

          function timesForStop(table: ScheduleTimetable, stop: TimetableVariant['stops'][number]): string[] {
            return (table.StopTimes ?? [])
              .filter((candidate) => candidate.StopUID === stop.stopUid
                || (!candidate.StopUID && candidate.StopSequence === stop.sequence))
              .map(stopTimeValue)
              .filter((value): value is string => Boolean(value))
          }

          function earliestTime(table: ScheduleTimetable): string | null {
            return (table.StopTimes ?? [])
              .map((stop) => ({ stop, value: stopTimeValue(stop) }))
              .filter((entry): entry is { stop: ScheduleStopTime; value: string } => Boolean(entry.value))
              .sort((a, b) => (a.stop.StopSequence ?? Number.POSITIVE_INFINITY) - (b.stop.StopSequence ?? Number.POSITIVE_INFINITY))[0]?.value ?? null
          }

          function validFrequency(frequency: ScheduleFrequency): boolean {
            return normalizeFrequency(frequency) !== null
          }

          function normalizeFrequency(frequency: ScheduleFrequency): TimetablePeriod | null {
            if (timeValue(frequency.StartTime) === null || timeValue(frequency.EndTime) === null) return null
            if (typeof frequency.MaxHeadwayMins !== 'number') return null
            return {
              startTime: frequency.StartTime!,
              endTime: frequency.EndTime!,
              minHeadwayMinutes: frequency.MinHeadwayMins ?? frequency.MaxHeadwayMins,
              maxHeadwayMinutes: frequency.MaxHeadwayMins,
            }
          }

          function serviceDays(serviceDay?: Record<string, number>): number[] {
            if (!serviceDay) return []
            return DAY_KEYS.flatMap((key, index) => serviceDay[key] === 1 ? [index] : [])
          }

          function serviceDayLabel(days: number[]): string {
            const signature = days.join(',')
            if (signature === '0,1,2,3,4,5,6') return '每日'
            if (signature === '1,2,3,4,5') return '平日'
            if (signature === '0,6') return '週末'
            if (signature === '6') return '週六'
            if (signature === '0') return '週日'
            return days.length ? days.map((day) => DAY_LABELS[day]).join('、') : '日期未標示'
          }

          function taipeiDayIndex(now: Date): number {
            const weekday = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Taipei', weekday: 'long' }).format(now)
            const index = DAY_KEYS.indexOf(weekday as typeof DAY_KEYS[number])
            return index < 0 ? 0 : index
          }
          ''').replace('          ', ''))

          Path('src/domain/map/timetable.test.ts').write_text(r'''import { describe, expect, it } from 'vitest'
          import { buildRouteTimetable } from './timetable'
          import type { ScheduleItem } from '../schedule'

          const stops = [
            { stopUid: 'C1', stopName: '嘉義公園', sequence: 1 },
            { stopUid: 'C2', stopName: '嘉義火車站', sequence: 2 },
            { stopUid: 'C3', stopName: '朴子轉運站', sequence: 3 },
          ]
          const weekday = { Monday: 1, Tuesday: 1, Wednesday: 1, Thursday: 1, Friday: 1 }

          describe('buildRouteTimetable', () => {
            it('builds a selectable per-stop timetable when multiple stops have times', () => {
              const schedules: ScheduleItem[] = [{
                SubRouteUID: 'CHI-7211', Direction: 0, Timetables: [
                  { ServiceDay: weekday, StopTimes: [
                    { StopUID: 'C1', StopSequence: 1, DepartureTime: '06:00' },
                    { StopUID: 'C2', StopSequence: 2, ArrivalTime: '06:12' },
                    { StopUID: 'C3', StopSequence: 3, ArrivalTime: '07:00' },
                  ] },
                  { ServiceDay: weekday, StopTimes: [
                    { StopUID: 'C1', StopSequence: 1, DepartureTime: '07:00' },
                    { StopUID: 'C2', StopSequence: 2, ArrivalTime: '07:12' },
                    { StopUID: 'C3', StopSequence: 3, ArrivalTime: '08:00' },
                  ] },
                ],
              }]
              const result = buildRouteTimetable(schedules, { direction: 0, subRouteUid: 'CHI-7211', stops }, 'C2', new Date('2026-07-13T02:00:00Z'))
              expect(result.mode).toBe('stop')
              expect(result.timedStopCount).toBe(3)
              expect(result.selectedStop?.stopName).toBe('嘉義火車站')
              expect(result.services[0]).toMatchObject({ label: '平日', today: true, times: ['06:12', '07:12'] })
            })

            it('labels a single-stop schedule as departure-only instead of pretending every stop has times', () => {
              const schedules: ScheduleItem[] = [{ Direction: 0, Timetables: [
                { ServiceDay: weekday, StopTimes: [{ StopUID: 'C1', StopSequence: 1, DepartureTime: '06:00' }] },
                { ServiceDay: weekday, StopTimes: [{ StopUID: 'C1', StopSequence: 1, DepartureTime: '07:00' }] },
              ] }]
              const result = buildRouteTimetable(schedules, { direction: 0, stops }, 'C2', new Date('2026-07-13T02:00:00Z'))
              expect(result.mode).toBe('departure')
              expect(result.selectedStop?.stopUid).toBe('C2')
              expect(result.departureStop?.stopUid).toBe('C1')
              expect(result.services[0].times).toEqual(['06:00', '07:00'])
            })

            it('normalizes frequency windows when no fixed departures exist', () => {
              const schedules: ScheduleItem[] = [{ Direction: 1, Frequencys: [{
                ServiceDay: weekday, StartTime: '06:00', EndTime: '09:00', MinHeadwayMins: 10, MaxHeadwayMins: 15,
              }] }]
              const result = buildRouteTimetable(schedules, { direction: 1, stops }, undefined, new Date('2026-07-13T02:00:00Z'))
              expect(result.mode).toBe('frequency')
              expect(result.services[0]).toMatchObject({
                firstTime: '06:00', lastTime: '09:00',
                periods: [{ startTime: '06:00', endTime: '09:00', minHeadwayMinutes: 10, maxHeadwayMinutes: 15 }],
              })
            })

            it('prefers the selected subroute over another schedule in the same direction', () => {
              const schedules: ScheduleItem[] = [
                { SubRouteUID: 'A', Direction: 0, Timetables: [{ ServiceDay: weekday, StopTimes: [{ StopUID: 'C1', StopSequence: 1, DepartureTime: '06:00' }] }] },
                { SubRouteUID: 'B', Direction: 0, Timetables: [{ ServiceDay: weekday, StopTimes: [{ StopUID: 'C1', StopSequence: 1, DepartureTime: '09:00' }] }] },
              ]
              const result = buildRouteTimetable(schedules, { direction: 0, subRouteUid: 'B', stops }, undefined, new Date('2026-07-13T02:00:00Z'))
              expect(result.services[0].times).toEqual(['09:00'])
            })
          })
          ''').replace('          ', ''))

          replace_once('src/routes/map.ts',
          "import { selectBestEta } from '../domain/map/eta'\n",
          "import { selectBestEta } from '../domain/map/eta'\nimport { buildRouteTimetable } from '../domain/map/timetable'\n")

          endpoint = r'''map.get('/api/v1/map/timetable', async (c) => {
            try {
              const city = c.req.query('city')?.trim()
              const routeName = c.req.query('route')?.trim()
              const routeUid = optionalQueryString(c.req.query('routeUid'), 'RouteUID', 100)
              const variantKey = optionalQueryString(c.req.query('variant'), '路線方向識別碼', 200)
              const subRouteUid = optionalQueryString(c.req.query('subRouteUid'), 'SubRouteUID', 100)
              const stopUid = optionalQueryString(c.req.query('stopUid'), 'StopUID', 100)
              const direction = parseOptionalDirection(c.req.query('direction'))
              if (!city || !supportedCityCodes.has(city)) throw new QueryValidationError('請選擇有效縣市')
              if (!routeName || routeName.length > 40) throw new QueryValidationError('請選擇有效路線')
              if (direction === undefined) throw new QueryValidationError('請選擇行駛方向')

              const snapshotVariants = await getSnapshotRouteVariants(c.env, city, routeName)
              const variants = snapshotVariants.length
                ? snapshotVariants
                : await getRouteMapVariants(tdxEnv(c), city, routeName)
              const variant = variants.find((candidate) =>
                candidate.direction === direction
                && (!variantKey || candidate.variantKey === variantKey)
                && (!routeUid || candidate.routeUid === routeUid)
                && (!subRouteUid || candidate.subRouteUid === subRouteUid))
              if (!variant) return c.json({ error: '找不到這個方向的站序' }, 404)

              const snapshotSchedules = await getSnapshotSchedule(c.env, city, routeName, variant.routeUid)
              const schedules = snapshotSchedules ?? await getBusSchedule(tdxEnv(c), city, routeName, variant.routeUid)
              const timetable = buildRouteTimetable(schedules, {
                direction: variant.direction,
                subRouteUid: variant.subRouteUid,
                stops: variant.stops.features.map((feature) => ({
                  stopUid: feature.properties.stopUid,
                  stopName: feature.properties.stopName,
                  sequence: feature.properties.sequence,
                })),
              }, stopUid, new Date())
              return c.json({
                schemaVersion: 1,
                city,
                routeName,
                variantKey: variant.variantKey,
                routeUid: variant.routeUid,
                direction: variant.direction,
                source: snapshotSchedules ? 'snapshot' : 'tdx',
                timetable,
              }, 200, { 'Cache-Control': 'public, max-age=300' })
            } catch (error) {
              return mapJsonError(c, error, '時刻表讀取失敗')
            }
          })

          '''
          replace_once('src/routes/map.ts', "map.get('/api/v1/map/network', async (c) => {\n", endpoint + "map.get('/api/v1/map/network', async (c) => {\n")

          timetable_types = r'''
          type TimetableStop = {
            stopUid: string
            stopName: string
            sequence: number
            hasTimes: boolean
          }

          type TimetablePeriod = {
            startTime: string
            endTime: string
            minHeadwayMinutes: number
            maxHeadwayMinutes: number
          }

          type TimetableService = {
            id: string
            label: string
            days: number[]
            today: boolean
            times: string[]
            periods: TimetablePeriod[]
            firstTime: string | null
            lastTime: string | null
          }

          type RouteTimetable = {
            mode: 'stop' | 'departure' | 'frequency' | 'none'
            selectedStop: Omit<TimetableStop, 'hasTimes'> | null
            departureStop: Omit<TimetableStop, 'hasTimes'> | null
            stops: TimetableStop[]
            timedStopCount: number
            services: TimetableService[]
          }

          type RouteTimetableResponse = {
            schemaVersion: number
            city: string
            routeName: string
            variantKey: string
            routeUid: string
            direction: 0 | 1 | 2
            source: 'snapshot' | 'tdx'
            timetable: RouteTimetable
          }
          '''
          replace_once('web/map/main.ts', "type JourneyLegPreviewOptions = {\n", timetable_types + "\ntype JourneyLegPreviewOptions = {\n")
          replace_once('web/map/main.ts', "let previewRequest = 0\n", "let previewRequest = 0\nlet timetableRequest = 0\n")

          timetable_ui = r'''
          function timetableUrl(variant: RouteMapVariant, stopUid?: string): string {
            const params = new URLSearchParams({
              city: activeCity!.code,
              route: variant.routeName,
              routeUid: variant.routeUid,
              variant: variant.variantKey,
              direction: String(variant.direction),
            })
            if (variant.subRouteUid) params.set('subRouteUid', variant.subRouteUid)
            if (stopUid) params.set('stopUid', stopUid)
            return `/api/v1/map/timetable?${params}`
          }

          async function fetchRouteTimetable(variant: RouteMapVariant, stopUid?: string, signal?: AbortSignal): Promise<RouteTimetableResponse> {
            const response = await tdxFetch(timetableUrl(variant, stopUid), { signal })
            const data = await response.json() as RouteTimetableResponse & { error?: string }
            if (!response.ok) throw new Error(data.error ?? '目前無法取得時刻表')
            return data
          }

          function currentTimetableService(timetable: RouteTimetable): TimetableService | undefined {
            return timetable.services.find((service) => service.today) ?? timetable.services[0]
          }

          function timetableSummaryText(timetable: RouteTimetable): string | null {
            const service = currentTimetableService(timetable)
            if (!service?.firstTime || !service.lastTime) return null
            if (timetable.mode === 'frequency') {
              const headways = service.periods.flatMap((period) => [period.minHeadwayMinutes, period.maxHeadwayMinutes])
              const minimum = headways.length ? Math.min(...headways) : null
              const maximum = headways.length ? Math.max(...headways) : null
              const headway = minimum !== null && maximum !== null
                ? minimum === maximum ? `${minimum} 分一班` : `${minimum}–${maximum} 分一班`
                : ''
              return `營運 ${service.firstTime}–${service.lastTime}${headway ? ` · ${headway}` : ''}`
            }
            const prefix = timetable.mode === 'departure'
              ? `${timetable.departureStop?.stopName ?? '起點'}發車`
              : timetable.selectedStop?.stopName ?? ''
            return `${prefix}${prefix ? ' · ' : ''}首班 ${service.firstTime} · 末班 ${service.lastTime}`
          }

          async function hydrateRouteTimetableSummary(
            variant: RouteMapVariant,
            summary: HTMLElement,
            button: HTMLButtonElement,
            bounds: L.LatLngBounds,
            requestId: number,
          ) {
            try {
              const data = await fetchRouteTimetable(variant)
              if (requestId !== timetableRequest || !drawer.contains(summary)) return
              if (data.timetable.mode === 'none' || !data.timetable.services.length) return
              const text = timetableSummaryText(data.timetable)
              if (text) {
                summary.textContent = text
                summary.hidden = false
              }
              button.hidden = false
              button.addEventListener('click', () => void openRouteTimetable(variant))
              if (bounds.isValid()) map.fitBounds(bounds, drawerAwareCameraPadding())
            } catch {
              // 時刻是輔助資訊，失敗時不打斷路線地圖與車輛定位。
            }
          }

          async function openRouteTimetable(variant: RouteMapVariant, stopUid?: string) {
            stopVehicleRefresh()
            const back = () => drawVariant(variant)
            const { requestId, signal } = beginNavRequest()
            timetableRequest += 1
            drawer.replaceChildren(
              drawerBack(`返回 ${variant.routeName}`, back),
              heading('時刻', variant.label),
              paragraph('正在整理表定班次…'),
            )
            setStatus(`${variant.routeName} · 正在讀取時刻`)
            setViewBack(back)
            try {
              const data = await fetchRouteTimetable(variant, stopUid, signal)
              if (isStaleNav(requestId)) return
              renderRouteTimetable(variant, data.timetable)
            } catch (error) {
              if (isStaleNav(requestId)) return
              const message = error instanceof Error ? error.message : '目前無法取得時刻表'
              drawer.replaceChildren(
                drawerBack(`返回 ${variant.routeName}`, back),
                heading('時刻', message),
                retryButton(() => void openRouteTimetable(variant, stopUid)),
              )
              setStatus(message, true)
            }
          }

          function renderRouteTimetable(variant: RouteMapVariant, timetable: RouteTimetable) {
            const back = () => drawVariant(variant)
            const panel = document.createElement('div')
            panel.className = 'timetable-panel'
            if (timetable.mode === 'none' || !timetable.services.length) {
              panel.appendChild(paragraph('這個方向目前沒有公開的表定班次資料。'))
              drawer.replaceChildren(drawerBack(`返回 ${variant.routeName}`, back), heading('時刻', variant.label), panel)
              setStatus(`${variant.routeName} · 無公開時刻資料`)
              setViewBack(back)
              return
            }

            const timedStops = timetable.stops.filter((stop) => stop.hasTimes)
            if (timetable.mode === 'stop' && timedStops.length > 1) {
              const field = document.createElement('label')
              field.className = 'timetable-stop-field'
              const label = document.createElement('span')
              label.textContent = '站牌'
              const select = document.createElement('select')
              select.setAttribute('aria-label', '站牌')
              timedStops.forEach((stop) => {
                const option = document.createElement('option')
                option.value = stop.stopUid
                option.textContent = `${stop.sequence}. ${stop.stopName}`
                option.selected = stop.stopUid === timetable.selectedStop?.stopUid
                select.appendChild(option)
              })
              select.addEventListener('change', () => void openRouteTimetable(variant, select.value))
              field.append(label, select)
              panel.appendChild(field)
            }

            const tabs = document.createElement('div')
            tabs.className = 'timetable-tabs'
            tabs.setAttribute('role', 'tablist')
            tabs.setAttribute('aria-label', '服務日期')
            const content = document.createElement('div')
            content.className = 'timetable-content'
            const renderService = (service: TimetableService, activeButton: HTMLButtonElement) => {
              tabs.querySelectorAll<HTMLButtonElement>('button').forEach((candidate) => {
                const active = candidate === activeButton
                candidate.classList.toggle('active', active)
                candidate.setAttribute('aria-selected', String(active))
              })
              content.replaceChildren(timetableServiceContent(timetable, service))
            }
            timetable.services.forEach((service, index) => {
              const button = document.createElement('button')
              button.type = 'button'
              button.className = 'timetable-tab'
              button.setAttribute('role', 'tab')
              button.textContent = service.today ? '今天' : service.label
              if (service.today) button.title = service.label
              button.addEventListener('click', () => renderService(service, button))
              tabs.appendChild(button)
              if (index === 0) queueMicrotask(() => renderService(service, button))
            })
            panel.append(tabs, content)
            drawer.replaceChildren(drawerBack(`返回 ${variant.routeName}`, back), heading('時刻', variant.label), panel)
            const context = timetable.mode === 'stop'
              ? timetable.selectedStop?.stopName
              : timetable.mode === 'departure' ? `${timetable.departureStop?.stopName ?? '起點'}發車` : '班距'
            setStatus(`${variant.routeName} · ${context ?? '時刻'}`)
            setViewBack(back)
          }

          function timetableServiceContent(timetable: RouteTimetable, service: TimetableService): HTMLElement {
            const fragment = document.createElement('div')
            const overview = document.createElement('div')
            overview.className = 'timetable-overview'
            const context = document.createElement('span')
            context.textContent = timetable.mode === 'stop'
              ? timetable.selectedStop?.stopName ?? '所選站牌'
              : timetable.mode === 'departure'
                ? `${timetable.departureStop?.stopName ?? '起點'}發車`
                : service.label
            const range = document.createElement('strong')
            range.textContent = service.firstTime && service.lastTime
              ? `${service.firstTime} — ${service.lastTime}`
              : '班次資料'
            overview.append(context, range)
            fragment.appendChild(overview)

            if (service.times.length) fragment.appendChild(timetableHourList(service))
            if (service.periods.length) {
              const periods = document.createElement('div')
              periods.className = 'timetable-period-list'
              service.periods.forEach((period) => {
                const row = document.createElement('div')
                row.className = 'timetable-period'
                const hours = document.createElement('strong')
                hours.textContent = `${period.startTime}–${period.endTime}`
                const headway = document.createElement('span')
                headway.textContent = period.minHeadwayMinutes === period.maxHeadwayMinutes
                  ? `${period.minHeadwayMinutes} 分一班`
                  : `${period.minHeadwayMinutes}–${period.maxHeadwayMinutes} 分一班`
                row.append(hours, headway)
                periods.appendChild(row)
              })
              fragment.appendChild(periods)
            }

            const note = document.createElement('p')
            note.className = 'timetable-note'
            note.textContent = timetable.mode === 'stop'
              ? '表定到站時間，實際仍可能受路況影響。'
              : timetable.mode === 'departure'
                ? '目前只提供起點發車時間，沿途到站時間會受路況影響。'
                : '此路線以班距提供服務，實際發車仍可能調整。'
            fragment.appendChild(note)
            return fragment
          }

          function timetableHourList(service: TimetableService): HTMLElement {
            const list = document.createElement('div')
            list.className = 'timetable-hour-list'
            const grouped = new Map<string, string[]>()
            service.times.forEach((time) => {
              const [hour, minute] = time.split(':')
              const minutes = grouped.get(hour) ?? []
              minutes.push(minute)
              grouped.set(hour, minutes)
            })
            const nowMinutes = taipeiClockMinutes()
            const next = service.today ? service.times.find((time) => timetableMinutes(time) >= nowMinutes) : undefined
            grouped.forEach((minutes, hour) => {
              const row = document.createElement('div')
              row.className = 'timetable-hour-row'
              const hourNode = document.createElement('strong')
              hourNode.textContent = hour
              const minuteList = document.createElement('div')
              minutes.forEach((minute) => {
                const value = `${hour}:${minute}`
                const chip = document.createElement('span')
                chip.className = 'timetable-minute'
                chip.textContent = minute
                chip.setAttribute('aria-label', value)
                if (value === next) {
                  chip.classList.add('next')
                  chip.title = '下一班'
                }
                minuteList.appendChild(chip)
              })
              row.append(hourNode, minuteList)
              list.appendChild(row)
            })
            return list
          }

          function timetableMinutes(value: string): number {
            const [hour, minute] = value.split(':').map(Number)
            return hour * 60 + minute
          }

          function taipeiClockMinutes(): number {
            const parts = new Intl.DateTimeFormat('en-US', {
              timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', hourCycle: 'h23',
            }).formatToParts(new Date())
            const hour = Number(parts.find((part) => part.type === 'hour')?.value ?? 0)
            const minute = Number(parts.find((part) => part.type === 'minute')?.value ?? 0)
            return hour * 60 + minute
          }

          '''
