name: Diagnose TDX commute full check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Replay the canonical integration script
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/ci.yml').read_text()
          marker = '      - name: Integrate commute route presentation boundary\n'
          section = workflow.index(marker)
          opener = "          python - <<'PY'\n"
          start = workflow.index(opener, section) + len(opener)
          end = workflow.index("\n          PY", start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines)
          exec(compile(script, 'commute-integration.py', 'exec'))
          PY
      - run: npm ci --silent
      - name: Capture check stages
        shell: bash
        run: |
          set +e
          : > COMMUTE_FULL_CHECK.txt
          run_stage() {
            name="$1"
            shift
            echo "===== ${name} =====" >> COMMUTE_FULL_CHECK.txt
            "$@" >> COMMUTE_FULL_CHECK.txt 2>&1
            code=$?
            echo "exit_code=${code}" >> COMMUTE_FULL_CHECK.txt
            echo >> COMMUTE_FULL_CHECK.txt
          }
          run_stage cf-typegen npm run cf-typegen:check
          run_stage tests npm run test
          run_stage typecheck npm run typecheck
          run_stage vite npm run build:map
          run_stage wrangler npx wrangler deploy --dry-run
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: commute-full-check
          path: COMMUTE_FULL_CHECK.txt
          if-no-files-found: error
          retention-days: 1
