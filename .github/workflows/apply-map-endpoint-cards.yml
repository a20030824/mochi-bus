name: Apply map endpoint cards

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'fix/map-endpoint-cards'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/map-endpoint-cards
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Build compact endpoint cards
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              return text.replace(old, new, 1)

          main_path = Path('web/map/main.ts')
          main = main_path.read_text()
          old = '''function tripMatchedSummary(kind: TripSelectionKind): HTMLElement | undefined {
            const pending = pendingTripSelection(kind)
            if (!pending) return
            const summary = document.createElement('div')
            summary.className = 'trip-matched-summary'
            const copy = document.createElement('p')
            const label = kind === 'from' ? '出發' : '目的地'
            copy.textContent = `${label}：${pending.selected.name} · ${formatTripDistance(pending.selected.distanceMeters)}`
            summary.appendChild(copy)
            const warning = tripDistanceWarning(pending.selected.distanceMeters)
            if (warning) summary.appendChild(warning)
            const change = document.createElement('button')
            change.type = 'button'
            change.className = 'trip-nearby-change'
            change.textContent = '更換'
            change.addEventListener('click', () => renderPendingTripCandidates(kind))
            summary.appendChild(change)
            return summary
          }
          '''
          old = old.replace('\n          ', '\n').lstrip()
          new = '''function tripMatchedSummary(kind: TripSelectionKind): HTMLElement | undefined {
            const selected = kind === 'from' ? selectedFrom : selectedTo
            if (!selected) return
            const pending = pendingTripSelection(kind)
            const label = kind === 'from' ? '出發' : '目的地'
            const summary = document.createElement('button')
            summary.type = 'button'
            summary.className = 'trip-matched-summary'
            summary.setAttribute('aria-label', `更換${label}站牌：${selected.name}`)
            const labelNode = document.createElement('span')
            labelNode.className = 'trip-endpoint-label'
            labelNode.textContent = label
            const action = document.createElement('span')
            action.className = 'trip-endpoint-action'
            action.textContent = '↻'
            action.setAttribute('aria-hidden', 'true')
            const name = document.createElement('strong')
            name.className = 'trip-endpoint-name'
            name.textContent = selected.name
            summary.appendChild(labelNode)
            summary.appendChild(action)
            summary.appendChild(name)
            if (pending) {
              const distance = document.createElement('span')
              distance.className = 'trip-endpoint-distance'
              distance.textContent = formatTripDistance(pending.selected.distanceMeters)
              if (pending.selected.distanceMeters > TRIP_NEARBY_FAR_DISTANCE_METERS) {
                distance.classList.add('far')
                distance.title = '距離較遠'
              }
              summary.appendChild(distance)
            }
            summary.addEventListener('click', () => {
              if (pendingTripSelection(kind)) {
                renderPendingTripCandidates(kind)
                return
              }
              resumeTripEndpointSelection(kind)
            })
            return summary
          }

          function resumeTripEndpointSelection(kind: TripSelectionKind) {
            if (kind === 'from') resumeOriginSelection()
            else resumeDestinationSelection()
          }

          function reselectTripEndpointButton(kind: TripSelectionKind): HTMLButtonElement {
            const button = document.createElement('button')
            button.type = 'button'
            button.className = 'quiet-button trip-endpoint-reselect'
            button.textContent = kind === 'from' ? '重新選出發位置' : '重新選目的地位置'
            button.addEventListener('click', () => resumeTripEndpointSelection(kind))
            return button
          }
          '''
          new = new.replace('\n          ', '\n').lstrip()
          main = replace_once(main, old, new, 'endpoint card component')
          main = replace_once(
              main,
              "      '點選正確的站牌。',\n    ),\n    list,\n  )",
              "      '點選附近站牌，或重新選位置。',\n    ),\n    list,\n    reselectTripEndpointButton(kind),\n  )",
              'candidate reselect action',
          )
          main = replace_once(
              main,
              "  const existing = existingKind === 'from' ? selectedFrom : selectedTo\n  const existingSummary = tripMatchedSummary(existingKind)\n  const existingLabel = existingKind === 'from' ? '出發' : '目的地'\n  const explicitSummary = existing && !existingSummary ? paragraph(`${existingLabel}：${existing.name}`) : undefined",
              "  const existingSummary = tripMatchedSummary(existingKind)",
              'search selected endpoint card',
          )
          main = replace_once(
              main,
              "    existingSummary ?? explicitSummary ?? document.createDocumentFragment(),",
              "    existingSummary ?? document.createDocumentFragment(),",
              'selection step summary',
          )
          main = replace_once(
              main,
              "    list,\n    changeOriginButton(),\n    reset,",
              "    list,\n    reset,",
              'direct redundant origin button',
          )
          main = replace_once(
              main,
              "    list,\n    changeOriginButton(),\n    tripModeButton(),",
              "    list,\n    tripModeButton(),",
              'transfer redundant origin button',
          )
          old = '''function changeOriginButton(): HTMLButtonElement {
            const button = document.createElement('button')
            button.className = 'quiet-button change-origin-button'
            button.textContent = '重選出發位置'
            button.addEventListener('click', resumeOriginSelection)
            return button
          }

          '''
          old = old.replace('\n          ', '\n').lstrip()
          main = replace_once(main, old, '', 'obsolete origin button')
          main_path.write_text(main)

          style_path = Path('web/map/style.css')
          style = style_path.read_text()
          old = '''.trip-matched-controls { display: grid; gap: 7px; margin-bottom: 10px; }
          .trip-matched-summary {
            display: grid;
            gap: 7px;
            padding: 10px 12px;
            border: 1px solid #c9c2b4;
            border-left: 4px solid #4f685b;
            border-radius: 3px;
            background: #f4efe4;
          }
          .trip-matched-summary p { margin: 0; color: #292a25; font-size: 13px; }
          .trip-nearby-change {
            justify-self: start;
            padding: 5px 8px;
            border: 1px solid #b8ad99;
            border-radius: 3px;
            background: transparent;
            color: #4f685b;
            font-size: 12px;
            font-weight: 750;
          }
          .trip-nearby-change:hover { border-color: #4f685b; background: #ebe5d9; }
          '''
          old = old.replace('\n          ', '\n').lstrip()
          new = '''.trip-matched-controls { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px; margin-bottom: 10px; }
          .trip-matched-summary {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 3px 8px;
            min-width: 0;
            padding: 9px 10px;
            border: 1px solid #c9c2b4;
            border-left: 4px solid #b85f49;
            border-radius: 3px;
            background: #f4efe4;
            color: #292a25;
            text-align: left;
          }
          .trip-matched-summary:nth-child(2) { border-left-color: #55718a; }
          .trip-matched-summary:only-child { grid-column: 1 / -1; }
          .trip-matched-summary:hover { border-color: #4f685b; background: #fffaf0; }
          .trip-matched-summary:focus-visible { outline: 2px solid #4f685b; outline-offset: 2px; }
          .trip-endpoint-label { overflow: hidden; color: #67685f; font-size: 11px; font-weight: 750; text-overflow: ellipsis; white-space: nowrap; }
          .trip-endpoint-action { color: #847d70; font-size: 13px; }
          .trip-endpoint-name { grid-column: 1 / -1; overflow: hidden; font-size: 13px; text-overflow: ellipsis; white-space: nowrap; }
          .trip-endpoint-distance { grid-column: 1 / -1; color: #847d70; font-size: 11px; font-variant-numeric: tabular-nums; }
          .trip-endpoint-distance.far { color: #9b4735; font-weight: 750; }
          .trip-endpoint-reselect { width: 100%; margin-top: 10px; }
          '''
          new = new.replace('\n          ', '\n').lstrip()
          style = replace_once(style, old, new, 'endpoint card styles')
          style = replace_once(
              style,
              ".trip-nearby-candidate.selected { border-color: #292a25; background: #f4efe4; box-shadow: 0 0 0 2px rgba(41, 42, 37, .12); }",
              ".trip-nearby-candidate.selected { border-color: #b8ad99; background: #f4efe4; }",
              'candidate selected weight',
          )
          style = replace_once(style, ".change-origin-button { width: 100%; margin-top: 10px; }\n", '', 'obsolete origin style')
          style_path.write_text(style)

          test_path = Path('test/e2e/map-trip-stop-matching.spec.ts')
          test = test_path.read_text()
          replacements = [
              (
                  "  await expect(page.getByText('出發：起點 A · 86 m', { exact: true })).toBeVisible()\n  const changeButtons = page.getByRole('button', { name: '更換', exact: true })\n  await expect(changeButtons).toHaveCount(1)\n  await changeButtons.click()",
                  "  const originCard = page.getByRole('button', { name: '更換出發站牌：起點 A', exact: true })\n  await expect(originCard).toHaveCount(1)\n  await expect(originCard).toContainText('86 m')\n  await originCard.click()",
                  'initial endpoint card',
              ),
              (
                  "  await expect(page.getByText('點選正確的站牌。', { exact: true })).toBeVisible()",
                  "  await expect(page.getByText('點選附近站牌，或重新選位置。', { exact: true })).toBeVisible()\n  await expect(page.getByRole('button', { name: '重新選出發位置', exact: true })).toBeVisible()",
                  'candidate chooser copy',
              ),
              (
                  "  await expect(page.getByText('出發：起點 B · 300 m', { exact: true })).toBeVisible()\n  await expect(page.getByText('距離較遠', { exact: true })).toBeVisible()",
                  "  const updatedOriginCard = page.getByRole('button', { name: '更換出發站牌：起點 B', exact: true })\n  await expect(updatedOriginCard).toContainText('300 m')\n  await expect(updatedOriginCard.locator('.trip-endpoint-distance')).toHaveClass(/far/)",
                  'updated endpoint card',
              ),
              (
                  "  await expect(page.getByText('目的地：終點 A · 42 m', { exact: true })).toBeVisible()",
                  "  await expect(page.getByRole('button', { name: '更換目的地站牌：終點 A', exact: true })).toContainText('42 m')",
                  'destination endpoint card',
              ),
              (
                  "  await matchedControls.nth(1).getByRole('button', { name: '更換', exact: true }).click()",
                  "  await matchedControls.nth(1).click()",
                  'destination card click',
              ),
              (
                  "  await page.locator('.trip-matched-summary').nth(1).getByRole('button', { name: '更換', exact: true }).click()",
                  "  await page.locator('.trip-matched-summary').nth(1).click()",
                  'destination card click after return',
              ),
              (
                  "  await page.locator('.change-origin-button').click()",
                  "  await page.locator('.trip-matched-summary').nth(0).click()\n  await page.getByRole('button', { name: '重新選出發位置', exact: true }).click()",
                  'full origin reselection',
              ),
              (
                  "  await originMatchedControls.nth(0).getByRole('button', { name: '更換', exact: true }).click()",
                  "  await originMatchedControls.nth(0).click()",
                  'origin candidate click',
              ),
              (
                  "  await expect(page.getByText('出發：明確站', { exact: true })).toBeVisible()\n  await expect(page.getByRole('button', { name: '更換', exact: true })).toHaveCount(0)",
                  "  await expect(page.getByRole('button', { name: '更換出發站牌：明確站', exact: true })).toHaveCount(1)",
                  'search selected endpoint card',
              ),
              (
                  "  await summaries.nth(1).getByRole('button', { name: '更換', exact: true }).click()",
                  "  await summaries.nth(1).click()",
                  'atomic destination card',
              ),
              (
                  "  await page.locator('.trip-matched-summary').nth(0).getByRole('button', { name: '更換', exact: true }).click()",
                  "  await page.locator('.trip-matched-summary').nth(0).click()",
                  'atomic origin candidate card',
              ),
          ]
          for old, new, label in replacements:
              test = test.replace(old, new)
              if old in test:
                  raise SystemExit(f'{label}: replacement did not finish')
          if '.change-origin-button' in test or "name: '更換'" in test:
              raise SystemExit('obsolete endpoint selector remains')
          test_path.write_text(test)
          PY
      - run: npm ci
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test test/e2e/map-trip-stop-matching.spec.ts test/e2e/map-direct.spec.ts test/e2e/map-transfer-keyboard.spec.ts
      - name: Commit changes
        run: |
          if git diff --quiet -- web/map/main.ts web/map/style.css test/e2e/map-trip-stop-matching.spec.ts; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/map/main.ts web/map/style.css test/e2e/map-trip-stop-matching.spec.ts
          git commit -m "fix(map): compact trip endpoint controls"
          git push origin HEAD:fix/map-endpoint-cards
