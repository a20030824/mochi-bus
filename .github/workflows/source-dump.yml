name: Source dump

on:
  push:
    branches:
      - fix/setup-multi-route-board-loss

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/upload-artifact@v4
        with:
          name: setup-multi-route-source
          path: |
            web/eta/main.ts
            web/setup/main.ts
            test/e2e/setup.spec.ts
          retention-days: 1
