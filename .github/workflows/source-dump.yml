name: Apply multi-route hotfix

on:
  push:
    branches:
      - fix/setup-multi-route-board-loss

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: fix/setup-multi-route-board-loss
      - name: Apply patch and remove temporary files
        run: |
          git apply --check .github/setup-multi-route.patch
          git apply .github/setup-multi-route.patch
          rm .github/setup-multi-route.patch .github/workflows/source-dump.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/eta/main.ts test/e2e/setup-multi-route.spec.ts .github/setup-multi-route.patch .github/workflows/source-dump.yml
          git commit -m "fix(setup): preserve multi-route boards"
          git push origin HEAD:fix/setup-multi-route-board-loss
