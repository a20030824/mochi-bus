name: Observe A6 remediation

on:
  pull_request:
    paths:
      - .github/workflows/observe-a6-remediation.yml

permissions:
  actions: read
  contents: read

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Show recent remediation runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/a20030824/mochi-bus/actions/workflows/a6-production-remediation.yml/runs?branch=main&event=push&per_page=5' \
          | jq -c '{total_count, runs: [.workflow_runs[] | {id,status,conclusion,head_sha,created_at,updated_at,html_url}]}'
