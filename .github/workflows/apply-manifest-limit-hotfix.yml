name: Apply bounded manifest hotfix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-manifest-limit-hotfix.yml
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-bounded-manifest-hotfix
  cancel-in-progress: false

jobs:
  hotfix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply focused manifest bound fix
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one replacement, found {count}')
              file.write_text(text.replace(old, new), encoding='utf-8')

          Path('scripts/transit-snapshot/manifest-read-limit.mjs').write_text(r'''const MEBIBYTE = 1024 * 1024
          const MANIFEST_READ_SLACK_BYTES = 64 * 1024

          export const DEFAULT_JSON_READ_LIMIT = MEBIBYTE
          export const MAX_MANIFEST_READ_LIMIT = 16 * MEBIBYTE

          export function manifestReadLimit(expectedManifest) {
            const expectedBytes = Buffer.byteLength(JSON.stringify(expectedManifest))
            const requestedBytes = Math.max(
              DEFAULT_JSON_READ_LIMIT,
              expectedBytes + MANIFEST_READ_SLACK_BYTES,
            )
            if (requestedBytes > MAX_MANIFEST_READ_LIMIT) {
              throw new Error('Snapshot manifest exceeds the remote validation safety limit')
            }
            return requestedBytes
          }
          ''', encoding='utf-8')

          Path('scripts/transit-snapshot/manifest-read-limit.test.mjs').write_text(r'''import { describe, expect, it } from 'vitest'
          import {
            DEFAULT_JSON_READ_LIMIT,
            MAX_MANIFEST_READ_LIMIT,
            manifestReadLimit,
          } from './manifest-read-limit.mjs'

          describe('snapshot manifest remote read limit', () => {
            it('keeps the existing one MiB floor for small JSON objects', () => {
              expect(manifestReadLimit({ schemaVersion: 2, artifacts: [] })).toBe(DEFAULT_JSON_READ_LIMIT)
            })

            it('scales above one MiB from the locally generated expected manifest size', () => {
              const manifest = { schemaVersion: 2, artifacts: [{ key: 'x'.repeat(1_100_000) }] }
              const expectedBytes = Buffer.byteLength(JSON.stringify(manifest))
              const limit = manifestReadLimit(manifest)
              expect(limit).toBeGreaterThan(expectedBytes)
              expect(limit).toBeGreaterThan(DEFAULT_JSON_READ_LIMIT)
              expect(limit - expectedBytes).toBe(64 * 1024)
            })

            it('rejects manifests that would exceed the absolute safety ceiling', () => {
              const manifest = { schemaVersion: 2, artifacts: [{ key: 'x'.repeat(MAX_MANIFEST_READ_LIMIT) }] }
              expect(() => manifestReadLimit(manifest)).toThrow('Snapshot manifest exceeds the remote validation safety limit')
            })
          })
          ''', encoding='utf-8')

          replace_once(
              'scripts/sync-transit-snapshot.mjs',
              "import { patternStopPlaceMismatchQuery } from './transit-snapshot/snapshot-invariants.mjs'\n",
              "import { patternStopPlaceMismatchQuery } from './transit-snapshot/snapshot-invariants.mjs'\nimport { manifestReadLimit } from './transit-snapshot/manifest-read-limit.mjs'\n",
          )
          replace_once(
              'scripts/sync-transit-snapshot.mjs',
              '    const remoteManifest = await s3GetJson(manifestKey)\n',
              '    const remoteManifest = await s3GetJson(manifestKey, manifestReadLimit(expectedManifest))\n',
          )
          replace_once(
              'scripts/sync-transit-snapshot.mjs',
              '''async function s3GetJson(key) {
          const response = await r2.client.fetch(objectUrl(key))
          if (response.status === 404) {
            await response.arrayBuffer()
            return null
          }
          if (!response.ok) {
            await response.arrayBuffer()
            throw new Error(`R2 GET ${key} failed (${response.status})`)
          }
          return await readBoundedResponseJson(response, 1024 * 1024)
          }
          ''',
              '''async function s3GetJson(key, maximumBytes = 1024 * 1024) {
          const response = await r2.client.fetch(objectUrl(key))
          if (response.status === 404) {
            await response.arrayBuffer()
            return null
          }
          if (!response.ok) {
            await response.arrayBuffer()
            throw new Error(`R2 GET ${key} failed (${response.status})`)
          }
          return await readBoundedResponseJson(response, maximumBytes)
          }
          ''',
          )
          PY
      - run: npm ci
      - name: Run targeted tests
        run: |
          node --check scripts/sync-transit-snapshot.mjs
          npx vitest run scripts/transit-snapshot/manifest-read-limit.test.mjs scripts/transit-snapshot/active-probe.test.mjs
      - name: Run full checks
        run: npm run check
      - name: Commit verified hotfix and self-remove
        shell: bash
        run: |
          rm .github/workflows/apply-manifest-limit-hotfix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/sync-transit-snapshot.mjs scripts/transit-snapshot/manifest-read-limit.mjs scripts/transit-snapshot/manifest-read-limit.test.mjs .github/workflows/apply-manifest-limit-hotfix.yml
          git commit -m "fix(snapshot): size manifest validation bounds dynamically"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
