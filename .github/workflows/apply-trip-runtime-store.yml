name: Apply trip runtime store

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refactor:
    if: github.head_ref == 'agent/use-trip-runtime-store'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/apply-trip-runtime-store.mjs
      - name: Normalize generated Trip access
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('web/map/main.ts')
          source = path.read_text()
          source = source.replace('trip.trip.', 'trip.')
          path.write_text(source)
          PY
      - run: npx vitest run web/map/trip-state.test.ts web/map/trip-runtime-store.test.ts web/map/trip-results-snapshot.test.ts
      - run: npx tsc --noEmit
      - name: Capture full check
        id: check
        continue-on-error: true
        run: npm run check > trip-runtime-check.log 2>&1
      - uses: actions/upload-artifact@v4
        if: steps.check.outcome == 'failure'
        with:
          name: trip-runtime-check
          path: trip-runtime-check.log
      - name: Require full check
        if: steps.check.outcome == 'failure'
        run: |
          tail -n 160 trip-runtime-check.log
          exit 1
      - run: git diff --check
      - name: Commit clean runtime migration
        run: |
          rm scripts/apply-trip-runtime-store.mjs
          rm .github/workflows/apply-trip-runtime-store.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/map/main.ts web/map/main-size.test.ts web/map/trip-state.ts web/map/trip-runtime-store.ts web/map/trip-runtime-store.test.ts scripts/apply-trip-runtime-store.mjs .github/workflows/apply-trip-runtime-store.yml
          git commit -m "refactor(map): use trip runtime store"
          git push origin HEAD:${{ github.head_ref }}
