name: Sync TDX reliability branch with main

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/sync-tdx-body-singleflight-main.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch quietly
        run: |
          git clone --quiet --branch agent/tdx-body-singleflight \
            https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git repo

      - name: Merge latest main
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --quiet origin main
          git merge --no-edit origin/main

      - name: Install dependencies
        working-directory: repo
        run: npm ci

      - name: Run focused tests
        working-directory: repo
        run: npm test -- src/lib/tdx-resolution.test.ts

      - name: Run full project check
        working-directory: repo
        run: npm run check

      - name: Remove workflow and publish merge
        working-directory: repo
        run: |
          rm .github/workflows/sync-tdx-body-singleflight-main.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:agent/tdx-body-singleflight
