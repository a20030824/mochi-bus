name: Fix route detail surface policy

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/extract-route-detail-surface'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/fix-route-detail-surface-policy.mjs
      - run: npx vitest run web/map/route-detail-presentation.test.ts
      - run: npm run check
      - run: git diff --check
      - name: Commit clean fix
        run: |
          rm scripts/fix-route-detail-surface-policy.mjs
          rm .github/workflows/fix-route-detail-surface-policy.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/map/route-detail-presentation.ts web/map/route-detail-surface.ts scripts/fix-route-detail-surface-policy.mjs .github/workflows/fix-route-detail-surface-policy.yml
          git commit -m "fix(map): preserve initial route marker stroke"
          git push origin HEAD:${{ github.head_ref }}
