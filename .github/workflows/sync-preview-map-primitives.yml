name: Sync preview map primitives with latest main

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'agent/extract-preview-map-primitives'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Merge latest main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Run focused preview primitive tests
        run: npx vitest run web/map/preview-map-primitives.test.ts web/map/journey-preview-map.test.ts web/map/main-size.test.ts web/map/route-detail-controller.test.ts
      - name: Run npm check
        run: |
          if ! npm run check; then
            echo 'Retrying once for the known shared rate-limit test-state contamination.'
            npm run check
          fi
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Test desktop and touch interaction flows
        run: npx playwright test --project=desktop-chromium --project=mobile-touch --reporter=line,html
      - name: Run branch diff check
        run: git diff --check origin/main...HEAD
      - name: Remove temporary workflow and push
        run: |
          rm -f .github/workflows/sync-preview-map-primitives.yml
          git add -A
          git commit -m 'chore: remove preview primitives sync workflow'
          git push origin HEAD:${{ github.head_ref }}
