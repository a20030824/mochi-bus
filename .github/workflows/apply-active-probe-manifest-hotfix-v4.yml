name: Apply active probe manifest hotfix v4

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-active-probe-manifest-hotfix
  cancel-in-progress: false

jobs:
  hotfix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply active probe manifest fix
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def load(path):
              file = Path(path)
              return file, file.read_text(encoding='utf-8').splitlines()

          def save(file, lines):
              file.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          def one(lines, predicate, label):
              hits = [i for i, line in enumerate(lines) if predicate(i, line)]
              if len(hits) != 1:
                  raise SystemExit(f'{label}: expected 1 match, found {len(hits)}')
              return hits[0]

          Path('scripts/transit-snapshot/manifest-read-limit.mjs').write_text(dedent('''\
          const MEBIBYTE = 1024 * 1024
          const MANIFEST_READ_SLACK_BYTES = 64 * 1024

          export const DEFAULT_JSON_READ_LIMIT = MEBIBYTE
          export const MAX_MANIFEST_READ_LIMIT = 16 * MEBIBYTE

          export function manifestReadLimitFromBytes(expectedBytes) {
            if (!Number.isSafeInteger(expectedBytes) || expectedBytes < 0) {
              throw new Error('Snapshot manifest size is unavailable')
            }
            if (expectedBytes > MAX_MANIFEST_READ_LIMIT) {
              throw new Error('Snapshot manifest exceeds the remote validation safety limit')
            }
            return Math.max(
              DEFAULT_JSON_READ_LIMIT,
              Math.min(MAX_MANIFEST_READ_LIMIT, expectedBytes + MANIFEST_READ_SLACK_BYTES),
            )
          }

          export function manifestReadLimit(expectedManifest) {
            return manifestReadLimitFromBytes(Buffer.byteLength(JSON.stringify(expectedManifest)))
          }

          export async function readManifestJson({ key, head, getJson }) {
            const metadata = await head(key)
            if (!metadata) return null
            return getJson(key, manifestReadLimitFromBytes(metadata.size))
          }
          '''), encoding='utf-8')

          Path('scripts/transit-snapshot/manifest-read-limit.test.mjs').write_text(dedent('''\
          import { describe, expect, it, vi } from 'vitest'
          import {
            DEFAULT_JSON_READ_LIMIT,
            MAX_MANIFEST_READ_LIMIT,
            manifestReadLimit,
            manifestReadLimitFromBytes,
            readManifestJson,
          } from './manifest-read-limit.mjs'

          describe('snapshot manifest remote read limit', () => {
            it('keeps the one MiB floor and scales from object size', () => {
              expect(manifestReadLimit({ schemaVersion: 2, artifacts: [] })).toBe(DEFAULT_JSON_READ_LIMIT)
              expect(manifestReadLimitFromBytes(1_100_000)).toBe(1_100_000 + 64 * 1024)
            })

            it('uses HEAD metadata for active probe reads', async () => {
              const getJson = vi.fn(async () => ({ schemaVersion: 2 }))
              await expect(readManifestJson({
                key: 'manifest.json',
                head: vi.fn(async () => ({ size: 1_100_000 })),
                getJson,
              })).resolves.toEqual({ schemaVersion: 2 })
              expect(getJson).toHaveBeenCalledWith('manifest.json', 1_100_000 + 64 * 1024)
            })

            it('returns null only for a missing object', async () => {
              const getJson = vi.fn()
              await expect(readManifestJson({
                key: 'manifest.json',
                head: vi.fn(async () => null),
                getJson,
              })).resolves.toBeNull()
              expect(getJson).not.toHaveBeenCalled()
            })

            it('fails closed for unavailable or oversized metadata', () => {
              expect(() => manifestReadLimitFromBytes(Number.NaN)).toThrow('Snapshot manifest size is unavailable')
              expect(manifestReadLimitFromBytes(MAX_MANIFEST_READ_LIMIT)).toBe(MAX_MANIFEST_READ_LIMIT)
              expect(() => manifestReadLimitFromBytes(MAX_MANIFEST_READ_LIMIT + 1))
                .toThrow('Snapshot manifest exceeds the remote validation safety limit')
            })
          })
          '''), encoding='utf-8')

          file, lines = load('scripts/transit-snapshot/active-probe.mjs')
          i = one(lines, lambda _i, x: x.strip() == "'manifest_missing',", 'probe failure class')
          if not any(x.strip() == "'manifest_read_failed'," for x in lines):
              lines.insert(i + 1, lines[i].replace('manifest_missing', 'manifest_read_failed'))

          i = one(lines, lambda _i, x: 'manifest = await r2.getJson(`${prefix}manifest.json`)' in x, 'active manifest read')
          lines[i] = lines[i].replace('r2.getJson', 'r2.getManifest')
          j = one(
              lines,
              lambda k, x: i < k <= i + 4 and x.strip() == "throw probeFailure('manifest_missing')",
              'active manifest error mapping',
          )
          lines[j] = lines[j].replace('manifest_missing', 'manifest_read_failed')

          i = one(lines, lambda _i, x: 'const manifest = await r2.getJson(`${prefix}manifest.json`)' in x, 'previous manifest read')
          lines[i] = lines[i].replace('r2.getJson', 'r2.getManifest')
          save(file, lines)

          file, lines = load('scripts/sync-transit-snapshot.mjs')
          i = one(lines, lambda _i, x: x.strip() == "import { manifestReadLimit } from './transit-snapshot/manifest-read-limit.mjs'", 'manifest import')
          lines[i] = lines[i].replace('{ manifestReadLimit }', '{ manifestReadLimit, readManifestJson }')

          i = one(
              lines,
              lambda k, x: x.strip() == 'getJson: s3GetJson,'
                  and k > 0 and lines[k - 1].strip() == 'r2: {'
                  and k + 1 < len(lines) and lines[k + 1].strip() == 'head: s3HeadObject,',
              'active probe R2 adapter',
          )
          indent = lines[i][:-len(lines[i].lstrip())]
          lines.insert(i, indent + 'getManifest: s3GetManifest,')

          i = one(lines, lambda _i, x: x.strip() == 'async function s3GetJson(key, maximumBytes = 1024 * 1024) {', 's3GetJson')
          lines[i:i] = [
              'async function s3GetManifest(key) {',
              '  return readManifestJson({ key, head: s3HeadObject, getJson: s3GetJson })',
              '}',
          ]
          save(file, lines)

          file, lines = load('scripts/transit-snapshot/active-probe.test.mjs')
          i = one(lines, lambda _i, x: x.strip() == 'getJson: vi.fn(async (key) => key.includes(previousVersion)', 'manifest fixture')
          lines[i] = lines[i].replace('getJson:', 'getManifest:')
          lines = [x.replace('options.r2.getJson', 'options.r2.getManifest') for x in lines]
          i = one(lines, lambda _i, x: "['manifest_missing'," in x and 'options.r2.getManifest' in x, 'missing manifest case')
          indent = lines[i][:-len(lines[i].lstrip())]
          lines.insert(i + 1, indent + "['manifest_read_failed', (options) => { options.r2.getManifest = vi.fn(async () => { throw new Error('oversized manifest') }) }],")
          save(file, lines)

          file, lines = load('src/observability/telemetry.ts')
          i = one(lines, lambda _i, x: x.strip() == "'manifest_missing',", 'telemetry failure class')
          if not any(x.strip() == "'manifest_read_failed'," for x in lines):
              lines.insert(i + 1, lines[i].replace('manifest_missing', 'manifest_read_failed'))
          save(file, lines)
          PY
      - run: npm ci
      - name: Run targeted checks
        run: |
          node --check scripts/sync-transit-snapshot.mjs
          node --check scripts/transit-snapshot/active-probe.mjs
          npx vitest run scripts/transit-snapshot/manifest-read-limit.test.mjs scripts/transit-snapshot/active-probe.test.mjs src/observability/telemetry.test.ts
      - name: Run full checks
        run: npm run check
      - name: Commit verified hotfix and remove executors
        shell: bash
        run: |
          rm .github/workflows/apply-active-probe-manifest-hotfix.yml
          rm .github/workflows/apply-active-probe-manifest-hotfix-v2.yml
          rm .github/workflows/apply-active-probe-manifest-hotfix-v3.yml
          rm .github/workflows/apply-active-probe-manifest-hotfix-v4.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/sync-transit-snapshot.mjs scripts/transit-snapshot/active-probe.mjs scripts/transit-snapshot/active-probe.test.mjs scripts/transit-snapshot/manifest-read-limit.mjs scripts/transit-snapshot/manifest-read-limit.test.mjs src/observability/telemetry.ts .github/workflows/apply-active-probe-manifest-hotfix.yml .github/workflows/apply-active-probe-manifest-hotfix-v2.yml .github/workflows/apply-active-probe-manifest-hotfix-v3.yml .github/workflows/apply-active-probe-manifest-hotfix-v4.yml
          git commit -m "fix(snapshot): bound active probe manifest reads by object size"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
