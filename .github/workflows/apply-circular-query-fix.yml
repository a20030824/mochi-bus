name: Circular query final type fix payload

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  payload:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Payload read by the existing one-time runner
        run: |
          python3 <<'PY'
          from pathlib import Path

          tests = Path('src/infrastructure/transit/snapshot-repository.test.ts')
          text = tests.read_text()
          marker = "it('keeps the shortest occurrence pair for a repeated circular stop'"
          start = text.index(marker)
          before = text[:start]
          after = text[start:]
          old = '    } as D1Database\n'
          new = '    } as unknown as D1Database\n'
          if old not in after:
              raise SystemExit('repeated-stop database cast anchor not found')
          tests.write_text(before + after.replace(old, new, 1))

          source = Path('src/infrastructure/transit/snapshot-repository.ts')
          prefix = '// circular-query-diagnostic-base64:'
          cleaned = '\n'.join(
              line for line in source.read_text().splitlines()
              if not line.startswith(prefix)
          ).rstrip()
          source.write_text(f'{cleaned}\n')
          PY
