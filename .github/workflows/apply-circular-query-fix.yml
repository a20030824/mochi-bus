name: Final circular direction fix payload

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  payload:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Payload read by the existing one-time runner
        run: |
          python3 <<'PY'
          from pathlib import Path
          import subprocess

          test_path = Path('src/api-protection.test.ts')
          text = test_path.read_text()
          old = '/api/v1/map/vehicles?city=Taipei&route=307&direction=2'
          new = '/api/v1/map/vehicles?city=Taipei&route=307&direction=3'
          if text.count(old) != 1:
              raise SystemExit(f'expected one API direction test anchor, found {text.count(old)}')
          test_path.write_text(text.replace(old, new, 1))

          repository = Path('src/infrastructure/transit/snapshot-repository.ts')
          text = repository.read_text()
          marker = '\n// tdx-direction-diagnostic-base64: '
          if marker not in text:
              raise SystemExit('diagnostic marker not found')
          repository.write_text(text.split(marker, 1)[0].rstrip() + '\n')

          Path('.github/workflows/apply-circular-query-fix.yml').unlink()
          Path('docs/TDX-CIRCULAR-DIRECTION-STAGING.txt').unlink()
          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
          subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], check=True)
          subprocess.run(['git', 'add', '-A'], check=True)
          subprocess.run(['git', 'reset', '--', 'src/infrastructure/transit/snapshot-repository.ts'], check=True)
          subprocess.run(['git', 'commit', '-m', 'test(api): accept circular direction'], check=True)
          PY
