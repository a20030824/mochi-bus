name: Circular query diagnostic payload

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  payload:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Payload read by the existing one-time runner
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import json
          import subprocess

          install = subprocess.run(['npm', 'ci', '--silent'], text=True, capture_output=True)
          checks = []
          if install.returncode:
              checks.append({'stage': 'npm-ci', 'code': install.returncode, 'output': (install.stdout + install.stderr)[-3000:]})
          else:
              commands = [
                  ('cf-typegen', ['npm', 'run', 'cf-typegen:check']),
                  ('unit-tests', ['npm', 'test', '--', '--reporter=verbose']),
                  ('typecheck', ['npm', 'run', 'typecheck']),
                  ('vite-build', ['npm', 'run', 'build:map']),
                  ('wrangler-dry-run', ['npx', 'wrangler', 'deploy', '--dry-run']),
              ]
              for stage, command in commands:
                  result = subprocess.run(command, text=True, capture_output=True)
                  checks.append({
                      'stage': stage,
                      'code': result.returncode,
                      'output': (result.stdout + result.stderr)[-3000:],
                  })
                  if result.returncode:
                      break

          report = base64.b64encode(json.dumps(checks, ensure_ascii=False).encode()).decode()
          path = Path('src/infrastructure/transit/snapshot-repository.ts')
          text = path.read_text()
          prefix = '// circular-query-diagnostic-base64:'
          text = '\n'.join(line for line in text.splitlines() if not line.startswith(prefix)).rstrip()
          path.write_text(f'{text}\n{prefix} {report}\n')
          PY
