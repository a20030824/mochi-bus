name: Circular query typecheck diagnostic payload

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  payload:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Payload read by the existing one-time runner
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import subprocess

          install = subprocess.run(['npm', 'ci', '--silent'], text=True, capture_output=True)
          if install.returncode:
              stage = 'npm-ci'
              output = install.stdout + install.stderr
          else:
              result = subprocess.run(['npm', 'run', 'typecheck'], text=True, capture_output=True)
              stage = 'typecheck'
              output = result.stdout + result.stderr

          report = base64.b64encode(f'{stage}\n{output[-6000:]}'.encode()).decode()
          path = Path('src/infrastructure/transit/snapshot-repository.ts')
          text = path.read_text()
          prefix = '// circular-query-diagnostic-base64:'
          text = '\n'.join(line for line in text.splitlines() if not line.startswith(prefix)).rstrip()
          path.write_text(f'{text}\n{prefix} {report}\n')
          PY
