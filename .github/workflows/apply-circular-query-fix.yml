name: Apply circular query fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'fix/circular-journey-segments'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/circular-journey-segments
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply circular route query changes
        run: |
          python3 <<'PY'
          from pathlib import Path

          journey = Path('src/domain/map/journey-segment.ts')
          text = journey.read_text()
          text = text.replace('function isCircularShape(shape: ShapePosition[]): boolean {', 'export function isCircularShape(shape: ShapePosition[]): boolean {')
          journey.write_text(text)

          repository = Path('src/infrastructure/transit/snapshot-repository.ts')
          text = repository.read_text()
          import_anchor = "import type { RouteMapVariant } from '../../domain/map/map-model'\n"
          if "import { isCircularShape } from '../../domain/map/journey-segment'" not in text:
              text = text.replace(import_anchor, "import { isCircularShape } from '../../domain/map/journey-segment'\n" + import_anchor)

          bindings = """export type TransitBindings = {
            TRANSIT_DB: D1Database
            TRANSIT_SHAPES: R2Bucket
          }
          """
          helpers = """export type TransitBindings = {
            TRANSIT_DB: D1Database
            TRANSIT_SHAPES: R2Bucket
          }

          type ReachableLegRow = {
            shape_key: string
            board_sequence: number
            alight_sequence: number
            min_sequence: number
            max_sequence: number
          }

          type ReachableLeg<T extends ReachableLegRow> = T & { stop_count: number }

          function journeyStopCount(row: ReachableLegRow): number {
            if (row.alight_sequence > row.board_sequence) return row.alight_sequence - row.board_sequence
            return row.max_sequence - row.board_sequence
              + row.alight_sequence - row.min_sequence + 1
          }

          async function isCircularPatternShape(env: TransitBindings, shapeKey: string): Promise<boolean> {
            const object = await env.TRANSIT_SHAPES.get(shapeKey)
            if (!object) return false
            try {
              const shape = await object.json<ShapeFeature>()
              return isCircularShape(shape.geometry.coordinates as Array<[number, number]>)
            } catch {
              return false
            }
          }

          async function reachableLegs<T extends ReachableLegRow>(
            env: TransitBindings,
            rows: T[],
            circularity = new Map<string, Promise<boolean>>(),
          ): Promise<Array<ReachableLeg<T>>> {
            const checked = await Promise.all(rows.map(async (row): Promise<ReachableLeg<T> | null> => {
              if (row.alight_sequence < row.board_sequence) {
                let check = circularity.get(row.shape_key)
                if (!check) {
                  check = isCircularPatternShape(env, row.shape_key)
                  circularity.set(row.shape_key, check)
                }
                if (!await check) return null
              }
              return { ...row, stop_count: journeyStopCount(row) }
            }))
            return checked.filter((row): row is ReachableLeg<T> => row !== null)
          }
          """
          if 'type ReachableLegRow = {' not in text:
              if bindings not in text:
                  raise SystemExit('TransitBindings anchor not found')
              text = text.replace(bindings, helpers)

          direct_start = text.index('export async function getDirectRoutes(')
          direct_end = text.index('export async function getOneTransferRoutes(')
          direct_block = """export async function getDirectRoutes(
            env: TransitBindings,
            city: string,
            fromPlaceId: string,
            toPlaceId: string,
          ) {
            const version = await getActiveVersion(env, city)
            if (!version || fromPlaceId === toPlaceId) return []

            const result = await env.TRANSIT_DB.prepare(`
              SELECT DISTINCT r.route_name, p.pattern_id, p.direction, p.subroute_name,
                p.departure_name, p.destination_name, p.shape_key,
                board.stop_sequence AS board_sequence,
                alight.stop_sequence AS alight_sequence,
                (SELECT MIN(path.stop_sequence)
                  FROM pattern_stops path
                  WHERE path.version = board.version AND path.pattern_id = board.pattern_id) AS min_sequence,
                (SELECT MAX(path.stop_sequence)
                  FROM pattern_stops path
                  WHERE path.version = board.version AND path.pattern_id = board.pattern_id) AS max_sequence
              FROM pattern_stops board
              JOIN pattern_stops alight
                ON alight.version = board.version
                AND alight.pattern_id = board.pattern_id
                AND alight.stop_sequence != board.stop_sequence
              JOIN patterns p
                ON p.version = board.version AND p.pattern_id = board.pattern_id
              JOIN routes r
                ON r.version = p.version AND r.route_uid = p.route_uid
              WHERE board.version = ? AND p.city_code = ?
                AND board.place_id = ? AND alight.place_id = ?
            `).bind(version, city, fromPlaceId, toPlaceId).all<DirectLegRow>()

            const best = new Map<string, ReachableLeg<DirectLegRow>>()
            for (const row of await reachableLegs(env, result.results)) {
              const existing = best.get(row.pattern_id)
              if (!existing || row.stop_count < existing.stop_count) best.set(row.pattern_id, row)
            }

            return [...best.values()]
              .sort((a, b) => a.stop_count - b.stop_count || a.route_name.localeCompare(b.route_name, 'zh-Hant', { numeric: true }))
              .slice(0, 24)
              .map((row) => ({
                routeName: row.route_name,
                variantKey: row.pattern_id,
                direction: row.direction,
                label: `${row.departure_name} → ${row.destination_name}`,
                subRouteName: row.subroute_name,
                boardSequence: row.board_sequence,
                alightSequence: row.alight_sequence,
                stopCount: row.stop_count,
              }))
          }

          type DirectLegRow = ReachableLegRow & {
            route_name: string
            pattern_id: string
            direction: 0 | 1
            subroute_name: string
            departure_name: string
            destination_name: string
          }

          type TransferLegRow = ReachableLegRow & {
            pattern_id: string
            route_uid: string
            route_name: string
            departure_name: string
            destination_name: string
            transfer_place_id: string
            place_name: string
            latitude: number
            longitude: number
          }

          """
          text = text[:direct_start] + direct_block + text[direct_end:]

          transfer_start = text.index('export async function getOneTransferRoutes(')
          transfer_end = text.index('export async function getJourneyLegStopRefs(')
          transfer_block = """export async function getOneTransferRoutes(
            env: TransitBindings,
            city: string,
            fromPlaceId: string,
            toPlaceId: string,
          ) {
            const version = await getActiveVersion(env, city)
            if (!version || fromPlaceId === toPlaceId) return []

            // SQL 只做便宜的兩端展開(各數百列、走索引),步行距離的空間接合交給
            // pairTransferLegs 在記憶體用網格做。環狀 pattern 可能需要跨過站序首尾，
            // 因此先取同 pattern 的所有其他站；只有反向站序會再讀 R2 shape 驗證閉環。
            const [forward, backward] = await env.TRANSIT_DB.batch([
              env.TRANSIT_DB.prepare(`
                WITH anchor AS MATERIALIZED (
                  SELECT version, pattern_id, stop_sequence
                  FROM pattern_stops
                  WHERE version = ? AND place_id = ?
                )
                SELECT p.pattern_id, p.route_uid, r.route_name,
                  p.departure_name, p.destination_name, p.shape_key,
                  anchor.stop_sequence AS board_sequence,
                  transfer.stop_sequence AS alight_sequence,
                  transfer.place_id AS transfer_place_id,
                  place.place_name, place.latitude, place.longitude,
                  (SELECT MIN(path.stop_sequence)
                    FROM pattern_stops path
                    WHERE path.version = anchor.version AND path.pattern_id = anchor.pattern_id) AS min_sequence,
                  (SELECT MAX(path.stop_sequence)
                    FROM pattern_stops path
                    WHERE path.version = anchor.version AND path.pattern_id = anchor.pattern_id) AS max_sequence
                FROM anchor
                CROSS JOIN pattern_stops transfer
                  ON transfer.version = anchor.version
                  AND transfer.pattern_id = anchor.pattern_id
                  AND transfer.stop_sequence != anchor.stop_sequence
                JOIN patterns p ON p.version = anchor.version AND p.pattern_id = anchor.pattern_id
                JOIN routes r ON r.version = p.version AND r.route_uid = p.route_uid
                JOIN stop_places place ON place.version = anchor.version AND place.place_id = transfer.place_id
                WHERE p.city_code = ?
              `).bind(version, fromPlaceId, city),
              env.TRANSIT_DB.prepare(`
                WITH anchor AS MATERIALIZED (
                  SELECT version, pattern_id, stop_sequence
                  FROM pattern_stops
                  WHERE version = ? AND place_id = ?
                )
                SELECT p.pattern_id, p.route_uid, r.route_name,
                  p.departure_name, p.destination_name, p.shape_key,
                  transfer.stop_sequence AS board_sequence,
                  anchor.stop_sequence AS alight_sequence,
                  transfer.place_id AS transfer_place_id,
                  place.place_name, place.latitude, place.longitude,
                  (SELECT MIN(path.stop_sequence)
                    FROM pattern_stops path
                    WHERE path.version = anchor.version AND path.pattern_id = anchor.pattern_id) AS min_sequence,
                  (SELECT MAX(path.stop_sequence)
                    FROM pattern_stops path
                    WHERE path.version = anchor.version AND path.pattern_id = anchor.pattern_id) AS max_sequence
                FROM anchor
                CROSS JOIN pattern_stops transfer
                  ON transfer.version = anchor.version
                  AND transfer.pattern_id = anchor.pattern_id
                  AND transfer.stop_sequence != anchor.stop_sequence
                JOIN patterns p ON p.version = anchor.version AND p.pattern_id = anchor.pattern_id
                JOIN routes r ON r.version = p.version AND r.route_uid = p.route_uid
                JOIN stop_places place ON place.version = anchor.version AND place.place_id = transfer.place_id
                WHERE p.city_code = ?
              `).bind(version, toPlaceId, city),
            ])

            const circularity = new Map<string, Promise<boolean>>()
            const [forwardRows, backwardRows] = await Promise.all([
              reachableLegs(env, forward.results as TransferLegRow[], circularity),
              reachableLegs(env, backward.results as TransferLegRow[], circularity),
            ])
            const toCandidate = (row: ReachableLeg<TransferLegRow>): TransferLegCandidate => ({
              patternId: row.pattern_id,
              routeUid: row.route_uid,
              routeName: row.route_name,
              label: `${row.departure_name} → ${row.destination_name}`,
              placeId: row.transfer_place_id,
              placeName: row.place_name,
              latitude: row.latitude,
              longitude: row.longitude,
              boardSequence: row.board_sequence,
              alightSequence: row.alight_sequence,
              stopCount: row.stop_count,
            })

            return pairTransferLegs(forwardRows.map(toCandidate), backwardRows.map(toCandidate))
          }

          """
          text = text[:transfer_start] + transfer_block + text[transfer_end:]
          repository.write_text(text)

          tests = Path('src/infrastructure/transit/snapshot-repository.test.ts')
          text = tests.read_text()
          text = text.replace(
              "import { findNearbyStopPlaces, getCityNetwork, type TransitBindings } from './snapshot-repository'",
              "import { findNearbyStopPlaces, getCityNetwork, getDirectRoutes, getOneTransferRoutes, type TransitBindings } from './snapshot-repository'",
          )
          marker = "describe('circular route queries', () => {"
          if marker not in text:
              text += r'''

          describe('circular route queries', () => {
            beforeEach(() => resetMemoryCacheForTests())

            const meta = {
              duration: 0, size_after: 0, rows_read: 0, rows_written: 0, last_row_id: 0, changed_db: false, changes: 0,
            }
            const result = <T>(rows: T[]): D1Result<T> => ({ success: true, meta, results: rows })
            const circularShape = {
              type: 'Feature' as const,
              properties: {},
              geometry: { type: 'LineString' as const, coordinates: [[0, 0], [1, 0], [1, 1], [0, 1], [0, 0]] as [number, number][] },
            }
            const openShape = {
              type: 'Feature' as const,
              properties: {},
              geometry: { type: 'LineString' as const, coordinates: [[0, 0], [1, 0], [2, 0]] as [number, number][] },
            }

            it('accepts reverse stop order only for a shape that is actually circular', async () => {
              const queries: string[] = []
              const rows = [
                {
                  route_name: 'Forward', pattern_id: 'forward', direction: 0 as const, subroute_name: 'Forward',
                  departure_name: 'A', destination_name: 'B', shape_key: 'forward.json',
                  board_sequence: 1, alight_sequence: 3, min_sequence: 1, max_sequence: 5,
                },
                {
                  route_name: 'Loop', pattern_id: 'loop', direction: 0 as const, subroute_name: 'Loop',
                  departure_name: 'A', destination_name: 'A', shape_key: 'loop.json',
                  board_sequence: 4, alight_sequence: 2, min_sequence: 1, max_sequence: 5,
                },
                {
                  route_name: 'Not loop', pattern_id: 'open', direction: 0 as const, subroute_name: 'Not loop',
                  departure_name: 'A', destination_name: 'B', shape_key: 'open.json',
                  board_sequence: 4, alight_sequence: 2, min_sequence: 1, max_sequence: 5,
                },
              ]
              const database = {
                prepare(query: string) {
                  queries.push(query)
                  const statement = {
                    bind: () => statement,
                    first: async <T>() => ({ active_version: 'v1' }) as T,
                    all: async <T>() => result(rows as T[]),
                  } as D1PreparedStatement
                  return statement
                },
              } as D1Database
              const reads: string[] = []
              const bucket = {
                async get(key: string) {
                  reads.push(key)
                  const shape = key === 'loop.json' ? circularShape : openShape
                  return { json: async <T>() => shape as T } as unknown as R2ObjectBody
                },
              } as unknown as R2Bucket

              const routes = await getDirectRoutes({ TRANSIT_DB: database, TRANSIT_SHAPES: bucket }, 'Test', 'from', 'to')

              expect(routes.map((route) => route.routeName)).toEqual(['Forward', 'Loop'])
              expect(routes.find((route) => route.routeName === 'Loop')?.stopCount).toBe(3)
              expect(reads.sort()).toEqual(['loop.json', 'open.json'])
              expect(queries.at(-1)).toContain('alight.stop_sequence != board.stop_sequence')
              expect(queries.at(-1)).not.toContain('alight.stop_sequence > board.stop_sequence')
            })

            it('allows either transfer leg to cross the seam of a circular pattern', async () => {
              const queries: string[] = []
              const forwardRows = [{
                pattern_id: 'loop', route_uid: 'R1', route_name: 'Loop', departure_name: 'A', destination_name: 'A',
                shape_key: 'loop.json', board_sequence: 4, alight_sequence: 2, min_sequence: 1, max_sequence: 5,
                transfer_place_id: 'T1', place_name: 'Transfer A', latitude: 25, longitude: 121,
              }]
              const backwardRows = [{
                pattern_id: 'second', route_uid: 'R2', route_name: 'Second', departure_name: 'C', destination_name: 'D',
                shape_key: 'second.json', board_sequence: 1, alight_sequence: 3, min_sequence: 1, max_sequence: 5,
                transfer_place_id: 'T2', place_name: 'Transfer B', latitude: 25, longitude: 121,
              }]
              const database = {
                prepare(query: string) {
                  queries.push(query)
                  const statement = {
                    bind: () => statement,
                    first: async <T>() => ({ active_version: 'v1' }) as T,
                  } as D1PreparedStatement
                  return statement
                },
                batch: async () => [result(forwardRows), result(backwardRows)],
              } as unknown as D1Database
              const bucket = {
                async get(key: string) {
                  if (key !== 'loop.json') return null
                  return { json: async <T>() => circularShape as T } as unknown as R2ObjectBody
                },
              } as unknown as R2Bucket

              const plans = await getOneTransferRoutes({ TRANSIT_DB: database, TRANSIT_SHAPES: bucket }, 'Test', 'from', 'to')

              expect(plans).toHaveLength(1)
              expect(plans[0].first.stopCount).toBe(3)
              expect(plans[0].second.stopCount).toBe(2)
              expect(plans[0].totalStops).toBe(5)
              expect(queries.filter((query) => query.includes('CROSS JOIN pattern_stops transfer'))).toHaveLength(2)
              expect(queries.some((query) => query.includes('transfer.stop_sequence > anchor.stop_sequence'))).toBe(false)
              expect(queries.some((query) => query.includes('transfer.stop_sequence < anchor.stop_sequence'))).toBe(false)
            })
          })
          '''
          tests.write_text(text)
          PY
      - run: npm ci
      - run: npm run check
      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/domain/map/journey-segment.ts src/infrastructure/transit/snapshot-repository.ts src/infrastructure/transit/snapshot-repository.test.ts
          git diff --cached --quiet && exit 0
          git commit -m 'fix(map): support circular route queries'
          git push origin HEAD:fix/circular-journey-segments
