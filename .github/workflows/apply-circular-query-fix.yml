name: Apply circular query fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'fix/circular-journey-segments'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/circular-journey-segments
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply previous workflow script
        run: |
          python3 <<'PY'
          import subprocess
          import textwrap

          source = subprocess.check_output(
              ['git', 'show', 'HEAD^:.github/workflows/apply-circular-query-fix.yml'],
              text=True,
          )
          lines = source.splitlines()
          start = next(index for index, line in enumerate(lines) if "python3 <<'PY'" in line)
          end = next(index for index in range(start + 1, len(lines)) if lines[index].strip() == 'PY')
          script = textwrap.dedent('\n'.join(lines[start + 1:end]))
          exec(compile(script, 'apply-circular-query.py', 'exec'))
          PY
      - name: Commit generated files locally
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/domain/map/journey-segment.ts src/infrastructure/transit/snapshot-repository.ts src/infrastructure/transit/snapshot-repository.test.ts
          git commit -m 'fix(map): support circular route queries'
      - run: npm ci --silent
      - name: Run checks
        id: check
        continue-on-error: true
        run: npm run check
      - name: Push generated commit
        if: always()
        run: git push origin HEAD:fix/circular-journey-segments
      - name: Report failed checks
        if: steps.check.outcome == 'failure'
        run: exit 1
