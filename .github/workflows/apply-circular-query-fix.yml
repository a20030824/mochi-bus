name: Circular direction unit failure diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  payload:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Payload read by the existing one-time runner
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import json
          import subprocess

          subprocess.run(['npm', 'ci', '--silent'], check=True)
          completed = subprocess.run([
              'npx', 'vitest', 'run', '--reporter=json', '--outputFile=/tmp/vitest-results.json',
          ], text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
          failures = []
          result_file = Path('/tmp/vitest-results.json')
          if result_file.exists():
              report = json.loads(result_file.read_text())
              for suite in report.get('testResults', []):
                  failed = []
                  for assertion in suite.get('assertionResults', []):
                      if assertion.get('status') == 'failed':
                          failed.append({
                              'title': ' > '.join(assertion.get('ancestorTitles', []) + [assertion.get('title', '')]),
                              'messages': assertion.get('failureMessages', [])[-2:],
                          })
                  if failed:
                      failures.append({'file': suite.get('name'), 'tests': failed})
          diagnostic = {'code': completed.returncode, 'failures': failures}
          encoded = base64.b64encode(json.dumps(diagnostic, ensure_ascii=False).encode()).decode()
          path = Path('src/infrastructure/transit/snapshot-repository.ts')
          text = path.read_text()
          marker = '\n// tdx-direction-diagnostic-base64: '
          if marker in text:
              text = text.split(marker, 1)[0]
          path.write_text(text.rstrip() + f'\n// tdx-direction-diagnostic-base64: {encoded}\n')

          Path('.github/workflows/apply-circular-query-fix.yml').unlink()
          Path('docs/TDX-CIRCULAR-DIRECTION-STAGING.txt').unlink()
          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
          subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], check=True)
          subprocess.run(['git', 'add', '-A'], check=True)
          subprocess.run(['git', 'reset', '--', 'src/infrastructure/transit/snapshot-repository.ts'], check=True)
          subprocess.run(['git', 'commit', '-m', 'chore: stage unit failure diagnostics'], check=True)
          PY
