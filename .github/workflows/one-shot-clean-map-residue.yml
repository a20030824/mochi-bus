name: One-shot clean map residue

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  apply-cleanup:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'chore/clean-map-camera-residue'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply the two cleanup edits
        shell: python
        run: |
          from pathlib import Path

          path = Path('web/map/main.ts')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "        activeCity = city\n              if (routeName) {",
                  "        activeCity = city\n        if (routeName) {",
              ),
              (
                  "  selectedDirectIndex = 0\n  map.setView(city.center, 11)\n  setDocumentTitle",
                  "  selectedDirectIndex = 0\n  setDocumentTitle",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one match, got {count}: {old!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/one-shot-clean-map-residue.yml').unlink()
      - run: npm ci
      - run: npm run check
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add web/map/main.ts .github/workflows/one-shot-clean-map-residue.yml
          git diff --cached --check
          git commit -m "chore(map): clean camera setup residue"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
