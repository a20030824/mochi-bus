name: Apply Trip results extraction

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/extract-trip-results-view'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply reviewed main integration patch
        run: |
          git apply --check scripts/trip-results-main.patch
          git apply scripts/trip-results-main.patch
      - run: npm ci
      - name: Run focused Trip presentation tests
        run: npx vitest run web/map/trip-results-view.test.ts web/map/trip-controller.test.ts web/map/main-size.test.ts
      - run: npm run check
      - name: Install Chromium
        run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Test desktop and touch interaction flows
        run: >-
          npx playwright test
          --project=desktop-chromium
          --project=mobile-touch
          --reporter=line,html
      - run: git diff --check
      - name: Commit clean product diff
        run: |
          rm .github/workflows/export-trip-results-view.yml
          rm scripts/trip-results-main.patch
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor(map): extract Trip results view"
          git push origin HEAD:${{ github.head_ref }}
