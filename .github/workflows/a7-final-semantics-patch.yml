name: Apply A7 final semantics patch

on:
  push:
    branches:
      - agent/snapshot-rollback-authority
    paths:
      - .github/workflows/a7-final-semantics-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/snapshot-rollback-authority
      - name: Preserve source metadata and unknown diagnostics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          publisher = Path('scripts/sync-transit-snapshot.mjs')
          source = publisher.read_text()
          source = source.replace(
              "const restored = guardedActivateSnapshot(rejectedVersion, targetVersion, new Date().toISOString())",
              "const restored = guardedActivateSnapshot(rejectedVersion, targetVersion, new Date().toISOString(), false)",
              1,
          )
          old = '''function guardedActivateSnapshot(expectedVersion, targetVersion, changedAt) {
            const statement = expectedVersion
              ? `UPDATE dataset_versions SET active_version=${sqlValue(targetVersion)}, source_updated_at=${sqlValue(changedAt)}, imported_at=${sqlValue(changedAt)} WHERE city_code=${sqlValue(CITY)} AND active_version=${sqlValue(expectedVersion)} RETURNING active_version`
              : `INSERT INTO dataset_versions(city_code, active_version, source_updated_at, imported_at) VALUES (${values(CITY, targetVersion, changedAt, changedAt)}) ON CONFLICT(city_code) DO NOTHING RETURNING active_version`
          '''
          new = '''function guardedActivateSnapshot(expectedVersion, targetVersion, changedAt, updateSource = true) {
            const assignments = updateSource
              ? `active_version=${sqlValue(targetVersion)}, source_updated_at=${sqlValue(changedAt)}, imported_at=${sqlValue(changedAt)}`
              : `active_version=${sqlValue(targetVersion)}, imported_at=${sqlValue(changedAt)}`
            const statement = expectedVersion
              ? `UPDATE dataset_versions SET ${assignments} WHERE city_code=${sqlValue(CITY)} AND active_version=${sqlValue(expectedVersion)} RETURNING active_version`
              : `INSERT INTO dataset_versions(city_code, active_version, source_updated_at, imported_at) VALUES (${values(CITY, targetVersion, changedAt, changedAt)}) ON CONFLICT(city_code) DO NOTHING RETURNING active_version`
          '''
          if old not in source and 'function guardedActivateSnapshot(expectedVersion, targetVersion, changedAt, updateSource = true)' not in source:
              raise SystemExit('guarded activation helper mismatch')
          source = source.replace(old, new, 1)
          publisher.write_text(source)

          operations = Path('scripts/transit-snapshot/rollback-operations.mjs')
          source = operations.read_text()
          if "  'unknown',\n" not in source:
              source = source.replace("  'reconcile_failed',\n])", "  'reconcile_failed',\n  'unknown',\n])", 1)
              source = source.replace("this.code = OPERATION_CODES.has(code) ? code : 'reconcile_failed'", "this.code = OPERATION_CODES.has(code) ? code : 'unknown'", 1)
              source = source.replace("? error.code : 'reconcile_failed'", "? error.code : 'unknown'", 1)
          operations.write_text(source)

          test = Path('scripts/transit-snapshot/rollback-operations.test.mjs')
          source = test.read_text()
          anchor = "    expect(JSON.stringify(diagnostic)).not.toMatch(/secret|token|https|stack/)\n"
          addition = anchor + "    expect(safeOperationDiagnostic(new Error('raw secret'), 'rollback', 'Taipei').outcome).toBe('unknown')\n"
          if anchor not in source and "toBe('unknown')" not in source:
              raise SystemExit('diagnostic test anchor mismatch')
          source = source.replace(anchor, addition, 1)
          test.write_text(source)
          PY
          node --check scripts/sync-transit-snapshot.mjs
          node --check scripts/transit-snapshot/rollback-operations.mjs
          git diff --check
      - name: Commit final semantics
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/sync-transit-snapshot.mjs scripts/transit-snapshot/rollback-operations.mjs scripts/transit-snapshot/rollback-operations.test.mjs
          git commit -m "fix(snapshot): preserve rollback metadata semantics [skip ci]"
          git push origin HEAD:agent/snapshot-rollback-authority
